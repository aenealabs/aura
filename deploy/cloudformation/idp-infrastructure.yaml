AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Layer 4.5 - Identity Provider Infrastructure (Multi-IdP Authentication)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

  SecondaryRegion:
    Type: String
    Default: us-west-2
    Description: |
      Secondary AWS region for Tier 1 secret replication (DR-6 / #149).
      Native Secrets Manager replicas are created in this region for
      production environments only.

  DRAlertTopicArn:
    Type: String
    Default: ''
    Description: |
      Optional SNS topic ARN for DR alert routing (DR-9 / #152).
      Default empty -- replication-lag alarms have no action target
      unless this is supplied. Pass via:
        --parameter-overrides DRAlertTopicArn=$(aws cloudformation
        list-exports --query "Exports[?Name=='aura-dr-alert-topic-arn-${ENV}'].Value | [0]"
        --output text)

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]
  HasDRAlertTopic: !Not [!Equals [!Ref DRAlertTopicArn, '']]

Resources:
  # ===========================================================================
  # IdP Configuration Table
  # ===========================================================================
  # Stores identity provider configurations per organization
  # Supports multiple IdPs per org with priority-based routing
  IdPConfigurationsTable:
    Type: AWS::DynamoDB::GlobalTable
    # DR-1 PR2 (#144): Tier 1 GlobalTable. Replicates to ${SecondaryRegion}
    # in production. Per-region customer-managed CMKs (DR-1.0 / #153) for
    # auth-credential encryption. Returns to Retain (safe default) now that
    # the type swap is complete. Replication-lag alarm tracked separately
    # under DR-9 partial (#152).
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-idp-configurations-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: idp_id
          AttributeType: S
        - AttributeName: organization_id
          AttributeType: S
        - AttributeName: priority
          AttributeType: N
        - AttributeName: email_domain
          AttributeType: S
      KeySchema:
        - AttributeName: idp_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        # Query all IdPs for an organization, ordered by priority.
        - IndexName: organization-priority-index
          KeySchema:
            - AttributeName: organization_id
              KeyType: HASH
            - AttributeName: priority
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # Route authentication based on email domain.
        - IndexName: email-domain-index
          KeySchema:
            - AttributeName: email_domain
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      # StreamSpecification is REQUIRED on GlobalTable; the streams power the
      # cross-region replication itself. Application-layer stream consumers
      # are unaffected (none on this table per the pre-conversion audit).
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      SSESpecification:
        SSEEnabled: true
      Replicas:
        # Primary region replica. Uses the regional CMK alias from kms.yaml
        # (DR-1.0); the alias resolves in the deployed region's KMS context.
        - Region: !Ref AWS::Region
          PointInTimeRecoverySpecification:
            PointInTimeRecoveryEnabled: true
          SSESpecification:
            KMSMasterKeyId: !Sub 'alias/${ProjectName}-auth-credentials-${Environment}'
          Tags:
            - Key: Name
              Value: !Sub '${ProjectName}-idp-configurations-${Environment}'
            - Key: Project
              Value: !Ref ProjectName
            - Key: Environment
              Value: !Ref Environment
            - Key: Component
              Value: identity
        # Secondary region replica (production only). Uses the independent
        # CMK alias from kms-replica-secondary.yaml (DR-1.0); the alias
        # resolves in the secondary region's KMS context where DynamoDB
        # creates the replica.
        - !If
          - IsProduction
          - Region: !Ref SecondaryRegion
            PointInTimeRecoverySpecification:
              PointInTimeRecoveryEnabled: true
            SSESpecification:
              KMSMasterKeyId: !Sub 'alias/${ProjectName}-auth-credentials-${Environment}-dr'
            Tags:
              - Key: Name
                Value: !Sub '${ProjectName}-idp-configurations-${Environment}-dr'
              - Key: Project
                Value: !Ref ProjectName
              - Key: Environment
                Value: !Ref Environment
              - Key: Component
                Value: identity
              - Key: Role
                Value: dr-replica
          - !Ref AWS::NoValue

  # ===========================================================================
  # Replication-lag alarm for IdPConfigurationsTable (DR-9 partial / #152)
  # ===========================================================================
  # Per Macy's review: claiming Tier 1 RPO 15min compliance without lag
  # telemetry is an audit finding waiting to happen. Threshold is 5min
  # (1/3 of RPO 15min budget). No SNS action yet; DR-9 full wires
  # notifications. Metric is collected by AWS automatically; alarm state
  # is queryable via CloudWatch console / API.
  IdPConfigurationsReplicationLagAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProduction
    Properties:
      AlarmName: !Sub '${ProjectName}-idp-configurations-replication-lag-${Environment}'
      AlarmDescription: 'IdPConfigurationsTable cross-region replication latency exceeded 5min threshold (RPO 15min budget)'
      Namespace: AWS/DynamoDB
      MetricName: ReplicationLatency
      Dimensions:
        - Name: TableName
          Value: !Sub '${ProjectName}-idp-configurations-${Environment}'
        - Name: ReceivingRegion
          Value: !Ref SecondaryRegion
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 300000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasDRAlertTopic
        - - !Ref DRAlertTopicArn
        - !Ref AWS::NoValue
      OKActions: !If
        - HasDRAlertTopic
        - - !Ref DRAlertTopicArn
        - !Ref AWS::NoValue

  # ===========================================================================
  # IdP Audit Log Table
  # ===========================================================================
  # Audit trail for IdP configuration changes and authentication events
  IdPAuditTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-idp-audit-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: audit_id
          AttributeType: S
        - AttributeName: idp_id
          AttributeType: S
        - AttributeName: organization_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: action_type
          AttributeType: S
      KeySchema:
        - AttributeName: audit_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        # Query audit logs for specific IdP
        - IndexName: idp-timestamp-index
          KeySchema:
            - AttributeName: idp_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # Query audit logs for organization
        - IndexName: organization-timestamp-index
          KeySchema:
            - AttributeName: organization_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # Query by action type (config_change, auth_success, auth_failure)
        - IndexName: action-timestamp-index
          KeySchema:
            - AttributeName: action_type
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      # DR-1.1 (#154): IdPAuditTable does NOT use Global Tables (last-writer-wins
      # would violate NIST AU-9(1)). Instead, the table's writes are forwarded
      # to the audit pipeline (Kinesis -> Firehose -> S3 with Object Lock).
      # Requires the audit-pipeline.yaml stack to be deployed first.
      KinesisStreamSpecification:
        StreamArn: !ImportValue
          'Fn::Sub': '${ProjectName}-idp-audit-kinesis-stream-arn-${Environment}'
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-idp-audit-${Environment}'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: identity

  # ===========================================================================
  # Auth Sessions Table
  # ===========================================================================
  # Tracks active authentication sessions for token refresh and revocation
  AuthSessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-auth-sessions-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: user_sub
          AttributeType: S
        - AttributeName: refresh_token_jti
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        # Query sessions by user for listing/revocation
        - IndexName: user-sub-index
          KeySchema:
            - AttributeName: user_sub
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        # Lookup by refresh token JTI for validation
        - IndexName: refresh-token-index
          KeySchema:
            - AttributeName: refresh_token_jti
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-auth-sessions-${Environment}'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: identity

  # ===========================================================================
  # SAML State Table
  # ===========================================================================
  # Tracks SAML request state for SP-initiated SSO
  SAMLStateTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-saml-state-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: request_id
          AttributeType: S
      KeySchema:
        - AttributeName: request_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-saml-state-${Environment}'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ===========================================================================
  # OIDC State Table
  # ===========================================================================
  # Tracks OIDC authorization state and PKCE verifiers
  OIDCStateTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-oidc-state-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: state
          AttributeType: S
      KeySchema:
        - AttributeName: state
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-oidc-state-${Environment}'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ===========================================================================
  # Secrets Manager - JWT Signing Key
  # ===========================================================================
  JWTSigningKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/identity/jwt-signing-key'
      Description: RSA private key for signing Aura JWTs (generate RSA-2048 key manually)
      # DR-6 (#149): Tier 1 -- JWT signing key must replicate so
      # tokens issued in primary remain validatable after failover.
      ReplicaRegions: !If
        - IsProduction
        - - Region: !Ref SecondaryRegion
        - !Ref AWS::NoValue
      SecretString: '{"private_key": "GENERATE_RSA_KEY_AND_UPDATE", "public_key": "GENERATE_RSA_KEY_AND_UPDATE"}'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: identity
        - Key: Rotation
          Value: annual

  # ===========================================================================
  # Secrets Manager - IdP Credentials Template
  # ===========================================================================
  # Template secret for LDAP bind credentials
  LDAPCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/identity/ldap-credentials'
      Description: Template for LDAP service account credentials
      # DR-6 (#149): Tier 1 -- IdP credentials needed in secondary
      # region for failover auth. Only the active credential payload
      # replicates; rotation procedure must update both copies.
      ReplicaRegions: !If
        - IsProduction
        - - Region: !Ref SecondaryRegion
        - !Ref AWS::NoValue
      SecretString: '{"bind_dn": "", "bind_password": ""}'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: identity
        - Key: IdPType
          Value: ldap

  # Template secret for OIDC client credentials
  OIDCCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/identity/oidc-credentials'
      Description: Template for OIDC client credentials
      # DR-6 (#149): Tier 1 -- IdP credentials for failover auth.
      ReplicaRegions: !If
        - IsProduction
        - - Region: !Ref SecondaryRegion
        - !Ref AWS::NoValue
      SecretString: '{"client_id": "", "client_secret": ""}'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: identity
        - Key: IdPType
          Value: oidc

  # Template secret for SAML SP private key
  SAMLCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/identity/saml-sp-credentials'
      Description: SAML Service Provider private key and certificate
      # DR-6 (#149): Tier 1 -- IdP credentials for failover auth.
      ReplicaRegions: !If
        - IsProduction
        - - Region: !Ref SecondaryRegion
        - !Ref AWS::NoValue
      SecretString: '{"private_key": "", "certificate": ""}'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: identity
        - Key: IdPType
          Value: saml

  # Template secret for PingID credentials
  PingIDCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/identity/pingid-credentials'
      Description: Template for PingID/PingFederate credentials
      # DR-6 (#149): Tier 1 -- IdP credentials for failover auth.
      ReplicaRegions: !If
        - IsProduction
        - - Region: !Ref SecondaryRegion
        - !Ref AWS::NoValue
      SecretString: '{"client_id": "", "client_secret": "", "connection_id": ""}'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: identity
        - Key: IdPType
          Value: pingid

  # ===========================================================================
  # KMS Key for Identity Services
  # ===========================================================================
  IdentityKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for Identity Provider service encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: Allow Identity Service Access
            Effect: Allow
            Principal:
              Service:
                - secretsmanager.amazonaws.com
                - dynamodb.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                kms:CallerAccount: !Ref AWS::AccountId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-identity-kms-${Environment}'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  IdentityKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${ProjectName}-identity-${Environment}'
      TargetKeyId: !Ref IdentityKMSKey

  # ===========================================================================
  # SSM Parameters for Service Discovery
  # ===========================================================================
  IdPConfigTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/aura/${Environment}/identity/idp-config-table'
      Type: String
      Value: !Ref IdPConfigurationsTable
      Description: DynamoDB table name for IdP configurations
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment

  IdPAuditTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/aura/${Environment}/identity/audit-table'
      Type: String
      Value: !Ref IdPAuditTable
      Description: DynamoDB table name for IdP audit logs
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment

  AuthSessionsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/aura/${Environment}/identity/sessions-table'
      Type: String
      Value: !Ref AuthSessionsTable
      Description: DynamoDB table name for auth sessions
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment

  JWTSigningKeyArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/aura/${Environment}/identity/jwt-signing-key-arn'
      Type: String
      Value: !Ref JWTSigningKeySecret
      Description: Secrets Manager ARN for JWT signing key
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  IdPConfigurationsTableName:
    Description: IdP configurations table name
    Value: !Ref IdPConfigurationsTable
    Export:
      Name: !Sub '${AWS::StackName}-IdPConfigurationsTableName'

  IdPConfigurationsTableArn:
    Description: IdP configurations table ARN
    Value: !GetAtt IdPConfigurationsTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IdPConfigurationsTableArn'

  IdPAuditTableName:
    Description: IdP audit table name
    Value: !Ref IdPAuditTable
    Export:
      Name: !Sub '${AWS::StackName}-IdPAuditTableName'

  IdPAuditTableArn:
    Description: IdP audit table ARN
    Value: !GetAtt IdPAuditTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IdPAuditTableArn'

  AuthSessionsTableName:
    Description: Auth sessions table name
    Value: !Ref AuthSessionsTable
    Export:
      Name: !Sub '${AWS::StackName}-AuthSessionsTableName'

  AuthSessionsTableArn:
    Description: Auth sessions table ARN
    Value: !GetAtt AuthSessionsTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AuthSessionsTableArn'

  SAMLStateTableName:
    Description: SAML state table name
    Value: !Ref SAMLStateTable
    Export:
      Name: !Sub '${AWS::StackName}-SAMLStateTableName'

  OIDCStateTableName:
    Description: OIDC state table name
    Value: !Ref OIDCStateTable
    Export:
      Name: !Sub '${AWS::StackName}-OIDCStateTableName'

  JWTSigningKeySecretArn:
    Description: JWT signing key secret ARN
    Value: !Ref JWTSigningKeySecret
    Export:
      Name: !Sub '${AWS::StackName}-JWTSigningKeySecretArn'

  LDAPCredentialsSecretArn:
    Description: LDAP credentials template secret ARN
    Value: !Ref LDAPCredentialsSecret
    Export:
      Name: !Sub '${AWS::StackName}-LDAPCredentialsSecretArn'

  OIDCCredentialsSecretArn:
    Description: OIDC credentials template secret ARN
    Value: !Ref OIDCCredentialsSecret
    Export:
      Name: !Sub '${AWS::StackName}-OIDCCredentialsSecretArn'

  SAMLCredentialsSecretArn:
    Description: SAML SP credentials secret ARN
    Value: !Ref SAMLCredentialsSecret
    Export:
      Name: !Sub '${AWS::StackName}-SAMLCredentialsSecretArn'

  PingIDCredentialsSecretArn:
    Description: PingID credentials template secret ARN
    Value: !Ref PingIDCredentialsSecret
    Export:
      Name: !Sub '${AWS::StackName}-PingIDCredentialsSecretArn'

  IdentityKMSKeyArn:
    Description: Identity services KMS key ARN
    Value: !GetAtt IdentityKMSKey.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IdentityKMSKeyArn'

  IdentityKMSKeyId:
    Description: Identity services KMS key ID
    Value: !Ref IdentityKMSKey
    Export:
      Name: !Sub '${AWS::StackName}-IdentityKMSKeyId'
