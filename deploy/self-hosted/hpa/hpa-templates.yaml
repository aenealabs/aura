---
# vLLM Inference HPA (GPU-aware)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-hpa
  namespace: aura-llm
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: aura
  annotations:
    description: "GPU-aware scaling - requires DCGM exporter for GPU metrics"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-inference
  minReplicas: 1
  maxReplicas: 4
  metrics:
    # Fallback to CPU for non-GPU deployments
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 900  # 15 min - GPU pods expensive to restart
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300

