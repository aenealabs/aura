# Project Aura - API Kustomization
# Use kustomize to deploy all API resources
#
# This is a convenience wrapper that deploys the dev environment by default.
# For other environments, use the overlays directly:
#   kubectl apply -k deploy/kubernetes/aura-api/overlays/qa/
#   kubectl apply -k deploy/kubernetes/aura-api/overlays/prod/
#
# Usage (dev):
#   kubectl apply -k deploy/kubernetes/aura-api/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - overlays/dev
