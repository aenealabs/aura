apiVersion: v1
kind: ResourceQuota
metadata:
  name: gpu-quota
  namespace: aura-gpu-workloads
  labels:
    app: gpu-scheduler
    app.kubernetes.io/part-of: aura
spec:
  hard:
    # GPU limits
    requests.nvidia.com/gpu: "4"
    limits.nvidia.com/gpu: "4"
    # Job limits
    count/jobs.batch: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: gpu-limits
  namespace: aura-gpu-workloads
  labels:
    app: gpu-scheduler
    app.kubernetes.io/part-of: aura
spec:
  limits:
    - type: Container
      default:
        memory: "16Gi"
        nvidia.com/gpu: "1"
      defaultRequest:
        memory: "8Gi"
        nvidia.com/gpu: "1"
      max:
        memory: "24Gi"
        nvidia.com/gpu: "1"
      min:
        memory: "4Gi"
