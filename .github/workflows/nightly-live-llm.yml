name: Nightly Live-LLM Smoke

# ADR-090 Tier 3 resolver live-Bedrock smoke (#120, P2).
#
# Catches model-version regressions and Bedrock API drift that mocked
# tests miss by construction. Opt-in nightly run on a separate workflow
# so PR pipeline cost is unaffected. Hard cost cap of USD 0.50 per run
# enforced inside the test.

on:
  # The schedule trigger is intentionally commented out below. This
  # workflow has had ``startup_failure`` on every single scheduled run
  # since inception (May 9, 2026) because the required AWS OIDC role
  # secret (``AURA_LIVE_LLM_ROLE_ARN``) and the ``LIVE_LLM_ENABLED``
  # repo variable are not yet configured -- and ``id-token: write``
  # under the permissions block requires the OIDC handshake even when
  # the job-level ``if:`` would skip the body. A daily ``startup_failure``
  # is louder than useful (audit #185 cluster C4).
  #
  # To re-enable the schedule:
  #   1. Configure the ``AURA_LIVE_LLM_ROLE_ARN`` secret with a Bedrock-
  #      invoke role ARN that trusts the GitHub OIDC provider for this
  #      repo.
  #   2. Set the ``LIVE_LLM_ENABLED`` repo variable to ``"true"``.
  #   3. Uncomment the ``schedule:`` block below.
  #
  # ``workflow_dispatch`` is kept enabled so a maintainer can do an
  # ad-hoc validation run once the secrets land, without needing to
  # land a second commit to flip the schedule back on.
  #
  # schedule:
  #   - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # for AWS OIDC role assumption
  issues: write    # to post the summary as a comment on the tracking issue

concurrency:
  # Only one live-LLM smoke at a time so the cost cap is per-run not
  # per-concurrent-run.
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  smoke:
    name: Tier 3 Live-LLM Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Gate the run on a repo variable so the scheduled trigger does
    # not startup_failure when the OIDC role + AWS account are not yet
    # configured. To enable: set `LIVE_LLM_ENABLED` to `true` as a repo
    # variable AND configure the `AURA_LIVE_LLM_ROLE_ARN` secret with
    # the Bedrock-invoke role to assume. (#163 closed the persistent
    # startup_failure noise from the unconfigured-secret path.)
    if: vars.LIVE_LLM_ENABLED == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # pytest + pytest-asyncio are pinned in requirements.txt;
          # the live-LLM smoke uses only stdlib + the project's own
          # BedrockLLMService -- no extra test deps.
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ secrets.AURA_LIVE_LLM_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run live-LLM smoke
        env:
          # Required by tests/live/test_tier3_live_llm.py module-level
          # skip; the test will not run without this set.
          AWS_BEDROCK_AVAILABLE: '1'
        run: |
          # --no-cov: this hits a real external service; coverage
          # numbers from a single test file are meaningless.
          # tests/live/: explicit path because pyproject.toml addopts
          # ignores this directory in the default collection.
          # -m live_llm: belt-and-suspenders gate alongside the
          # module-level pytestmark.
          pytest tests/live/ -m live_llm --no-cov -v

      - name: Post summary to tracking issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Read the GITHUB_STEP_SUMMARY content the test wrote and
          # post it as a comment on the tracking issue (#120). Fail
          # softly if posting fails -- the workflow run itself is the
          # source of truth.
          if [ -f "$GITHUB_STEP_SUMMARY" ]; then
            BODY="$(cat "$GITHUB_STEP_SUMMARY")"
            STATUS_LINE="**Workflow status: ${{ job.status }}**"
            COMMENT="${STATUS_LINE}\n\n${BODY}\n\n_See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}_"
            echo -e "$COMMENT" | gh issue comment 120 \
              --repo ${{ github.repository }} \
              --body-file - || \
              echo '::warning::Failed to post summary to issue #120; check workflow logs.'
          fi
