{{- if and (include "aura.isSelfHosted" .) .Values.databases.document.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "aura.fullname" . }}-postgres
  labels:
    {{- include "aura.componentLabels" (dict "component" "postgres" "context" .) | nindent 4 }}
spec:
  serviceName: {{ include "aura.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "aura.componentSelectorLabels" (dict "component" "postgres" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aura.componentSelectorLabels" (dict "component" "postgres" "context" .) | nindent 8 }}
    spec:
      {{- include "aura.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "aura.serviceAccountName" . }}
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: {{ include "aura.imagePullPolicy" . }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.databases.document.postgres.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databases.document.postgres.existingPasswordSecret | default (printf "%s-postgres" (include "aura.fullname" .)) }}
                  key: postgres-password
            - name: POSTGRES_DB
              value: {{ .Values.databases.document.postgres.database | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            {{- if .Values.databases.document.postgres.tls.enabled }}
            - name: POSTGRES_SSL
              value: "on"
            {{- end }}
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.databases.document.postgres.username | quote }}
                - -d
                - {{ .Values.databases.document.postgres.database | quote }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.databases.document.postgres.username | quote }}
                - -d
                - {{ .Values.databases.document.postgres.database | quote }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.databases.document.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            {{- if .Values.databases.document.postgres.tls.enabled }}
            - name: tls-certs
              mountPath: /var/lib/postgresql/certs
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.databases.document.postgres.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.databases.document.postgres.tls.existingSecret | default (printf "%s-postgres-tls" (include "aura.fullname" .)) }}
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.databases.document.postgres.persistence.storageClass }}
        storageClassName: {{ .Values.databases.document.postgres.persistence.storageClass }}
        {{- else if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.databases.document.postgres.persistence.size }}
{{- end }}
