{{- if and (include "aura.isSelfHosted" .) .Values.llm.ollama.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aura.fullname" . }}-ollama
  labels:
    {{- include "aura.componentLabels" (dict "component" "ollama" "context" .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "aura.componentSelectorLabels" (dict "component" "ollama" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aura.componentSelectorLabels" (dict "component" "ollama" "context" .) | nindent 8 }}
    spec:
      {{- include "aura.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "aura.serviceAccountName" . }}
      securityContext:
        fsGroup: 1000
      initContainers:
        # Pre-pull models on startup
        - name: model-pull
          image: {{ .Values.llm.ollama.image.repository }}:{{ .Values.llm.ollama.image.tag }}
          command:
            - /bin/sh
            - -c
            - |
              {{- range .Values.llm.ollama.models }}
              ollama pull {{ . }} || true
              {{- end }}
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: {{ .Values.llm.ollama.image.repository }}:{{ .Values.llm.ollama.image.tag }}
          imagePullPolicy: {{ include "aura.imagePullPolicy" . }}
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.llm.ollama.resources | nindent 12 }}
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      volumes:
        {{- if not .Values.llm.ollama.persistence.enabled }}
        - name: models
          emptyDir: {}
        {{- end }}
  {{- if .Values.llm.ollama.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: models
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.llm.ollama.persistence.storageClass }}
        storageClassName: {{ .Values.llm.ollama.persistence.storageClass }}
        {{- else if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.llm.ollama.persistence.size }}
  {{- end }}
{{- end }}
