{{- if and (include "aura.isSelfHosted" .) .Values.databases.vector.opensearch.enabled }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "aura.fullname" . }}-test-opensearch
  labels:
    {{- include "aura.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  {{- include "aura.imagePullSecrets" . | nindent 2 }}
  serviceAccountName: {{ include "aura.serviceAccountName" . }}
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
  containers:
    - name: opensearch-test
      image: curlimages/curl:8.5.0
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Testing OpenSearch cluster health..."
          curl -sf{{ if .Values.databases.vector.opensearch.tls.enabled }}k{{ end }} \
            -u admin:$OPENSEARCH_PASSWORD \
            {{ if .Values.databases.vector.opensearch.tls.enabled }}https{{ else }}http{{ end }}://{{ include "aura.fullname" . }}-opensearch:9200/_cluster/health
          echo ""
          echo "OpenSearch connection test passed!"
      env:
        - name: OPENSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.databases.vector.opensearch.existingPasswordSecret | default (printf "%s-opensearch" (include "aura.fullname" .)) }}
              key: admin-password
  restartPolicy: Never
{{- end }}
{{- if and (include "aura.isSelfHosted" .) .Values.databases.document.postgres.enabled }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "aura.fullname" . }}-test-postgres
  labels:
    {{- include "aura.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  {{- include "aura.imagePullSecrets" . | nindent 2 }}
  serviceAccountName: {{ include "aura.serviceAccountName" . }}
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
  containers:
    - name: postgres-test
      image: postgres:16-alpine
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Testing PostgreSQL connection..."
          PGPASSWORD=$POSTGRES_PASSWORD pg_isready -h {{ include "aura.fullname" . }}-postgres -p 5432 -U {{ .Values.databases.document.postgres.username }}
          echo "PostgreSQL connection test passed!"
      env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.databases.document.postgres.existingPasswordSecret | default (printf "%s-postgres" (include "aura.fullname" .)) }}
              key: postgres-password
  restartPolicy: Never
{{- end }}
