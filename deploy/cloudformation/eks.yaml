AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Layer 3.1 - EKS (Kubernetes Control Plane)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

  PrivateSubnetIds:
    Type: CommaDelimitedList
    Description: Private subnet IDs

  EKSSecurityGroupId:
    Type: String
    Description: EKS cluster security group ID

  EKSClusterRoleArn:
    Type: String
    Description: EKS cluster role ARN

  # Note: Node group parameters removed - nodes now managed by dedicated stacks per ADR-058
  # See: eks-nodegroup-general.yaml, eks-nodegroup-memory.yaml, eks-nodegroup-gpu.yaml

  KubernetesVersion:
    Type: String
    Default: '1.34'
    Description: Kubernetes version for cluster and node group
    AllowedValues:
      - '1.28'
      - '1.29'
      - '1.30'
      - '1.31'
      - '1.32'
      - '1.33'
      - '1.34'

  AdminRoleArn:
    Type: String
    Default: ''
    Description: IAM role ARN for cluster admin access (e.g., SSO AdministratorAccess role)

  # Note: EnableSTIGHardening moved to dedicated nodegroup stacks (ADR-058)

Conditions:
  HasAdminRole: !Not [!Equals [!Ref AdminRoleArn, '']]

Resources:
  # EKS Cluster
  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub '${ProjectName}-cluster-${Environment}'
      Version: !Ref KubernetesVersion
      RoleArn: !Ref EKSClusterRoleArn
      AccessConfig:
        AuthenticationMode: API_AND_CONFIG_MAP
      ResourcesVpcConfig:
        SecurityGroupIds:
          - !Ref EKSSecurityGroupId
        SubnetIds: !Ref PrivateSubnetIds
        EndpointPrivateAccess: true
        EndpointPublicAccess: true
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator
            - Type: controllerManager
            - Type: scheduler
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-cluster-${Environment}'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # NOTE: Node groups are now managed by dedicated stacks per ADR-058:
  # - eks-nodegroup-general.yaml (aura-nodegroup-general-{env})
  # - eks-nodegroup-memory.yaml (aura-nodegroup-memory-{env})
  # - eks-nodegroup-gpu.yaml (aura-nodegroup-gpu-{env})
  # The legacy EKSNodeGroup resource was removed to avoid conflicts.

  # OIDC Provider for IRSA (IAM Roles for Service Accounts)
  EKSOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !GetAtt EKSCluster.OpenIdConnectIssuerUrl
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 9e99a48a9960b14926bb7f3b02e22da2b0ab7280
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # EKS Access Entry for Admin Role (SSO or IAM role)
  # Only created if AdminRoleArn parameter is provided
  EKSAdminAccessEntry:
    Type: AWS::EKS::AccessEntry
    Condition: HasAdminRole
    Properties:
      ClusterName: !Ref EKSCluster
      PrincipalArn: !Ref AdminRoleArn
      Type: STANDARD
      AccessPolicies:
        - PolicyArn: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope:
            Type: cluster

  # IAM Role for CloudWatch Observability Addon (IRSA)
  # Enables Container Insights for full cluster observability
  CloudWatchObservabilityRole:
    Type: AWS::IAM::Role
    # Dependency on EKSOIDCProvider is implicit via GetAtt
    Properties:
      RoleName: !Sub '${ProjectName}-cloudwatch-observability-${Environment}'
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {
                    "Federated": "${OIDCArn}"
                  },
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${OIDCUrl}:aud": "sts.amazonaws.com"
                    },
                    "StringLike": {
                      "${OIDCUrl}:sub": "system:serviceaccount:amazon-cloudwatch:*"
                    }
                  }
                }
              ]
            }
          - OIDCArn: !GetAtt EKSOIDCProvider.Arn
            OIDCUrl: !Select [1, !Split ['https://', !GetAtt EKSCluster.OpenIdConnectIssuerUrl]]
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/CloudWatchAgentServerPolicy'
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AWSXrayWriteOnlyAccess'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # CloudWatch Observability Addon for Container Insights
  # Provides: CPU/Memory metrics, container logs, application traces
  CloudWatchObservabilityAddon:
    Type: AWS::EKS::Addon
    # Note: Addon deploys without waiting for nodes - nodes managed by separate stacks
    Properties:
      ClusterName: !Ref EKSCluster
      AddonName: amazon-cloudwatch-observability
      ServiceAccountRoleArn: !GetAtt CloudWatchObservabilityRole.Arn
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

Outputs:
  ClusterName:
    Description: EKS cluster name
    Value: !Ref EKSCluster
    Export:
      Name: !Sub '${AWS::StackName}-ClusterName'

  ClusterEndpoint:
    Description: EKS cluster endpoint
    Value: !GetAtt EKSCluster.Endpoint
    Export:
      Name: !Sub '${AWS::StackName}-ClusterEndpoint'

  ClusterArn:
    Description: EKS cluster ARN
    Value: !GetAtt EKSCluster.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ClusterArn'

  OIDCProviderArn:
    Description: OIDC provider ARN
    Value: !Ref EKSOIDCProvider
    Export:
      Name: !Sub '${AWS::StackName}-OIDCProviderArn'

  OIDCProviderUrl:
    Description: OIDC provider URL (without https://) for IRSA trust policies
    Value: !Select [1, !Split ['https://', !GetAtt EKSCluster.OpenIdConnectIssuerUrl]]
    Export:
      Name: !Sub '${AWS::StackName}-OIDCProviderUrl'

  # Note: NodeGroupName output removed - nodes now managed by dedicated stacks per ADR-058
