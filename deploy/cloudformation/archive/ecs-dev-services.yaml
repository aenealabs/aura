          Value: ProjectAura

  # ========================================
  # Validator Agent Service
  # ========================================

  ValidatorAgentTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub validator-agent-${Environment}
      NetworkMode: awsvpc
      RequiresCompatibilities:
