# Project Aura - Self-Hosted Default-Deny NetworkPolicy
#
# CRITICAL: This file implements namespace-level default-deny policies.
# All traffic is blocked by default; explicit allow rules are required.
#
# ADR-049 Phase 0 Prerequisite - Security Requirement P0
#
# Apply order:
#   1. Apply this file FIRST to establish default-deny baseline
#   2. Apply service-specific policies to allow necessary traffic
#
# Usage:
#   kubectl apply -f 00-namespace-defaults.yaml
#   kubectl apply -f 01-aura-api.yaml
#   kubectl apply -f 02-agent-orchestrator.yaml
#   ... (remaining service policies)
#
---
# Namespace: aura (main application namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: aura
  labels:
    app.kubernetes.io/name: default-deny
    app.kubernetes.io/component: network-security
    app.kubernetes.io/part-of: aura
    security.aura.io/policy-type: default-deny
  annotations:
    description: "Block all ingress and egress by default in aura namespace"
spec:
  podSelector: {}  # Applies to ALL pods in namespace
  policyTypes:
    - Ingress
    - Egress
  # Empty ingress/egress = deny all
  ingress: []
  egress: []

