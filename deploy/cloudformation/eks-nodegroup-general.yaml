AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Layer 3.2 - EKS General-Purpose Node Group'

# Purpose: Provides compute capacity for lightweight workloads
# Workloads: aura-frontend, aura-api, agent-orchestrator, dnsmasq
# Instance: t3.large (8GB) - burstable, cost-effective
# Scaling: Cluster Autoscaler compatible, Spot-enabled, MinSize=1 in dev for cost savings

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

  ClusterName:
    Type: String
    Description: EKS cluster name

  NodeRoleArn:
    Type: String
    Description: IAM role ARN for EKS nodes

  PrivateSubnetIds:
    Type: CommaDelimitedList
    Description: Private subnet IDs for node placement

  InstanceTypes:
    Type: CommaDelimitedList
    Default: 't3.large,t3a.large,t3.xlarge'
    Description: Instance types (in order of preference)

  MinSize:
    Type: Number
    Default: 2
    Description: Minimum number of nodes

  MaxSize:
    Type: Number
    Default: 6
    Description: Maximum number of nodes

  DesiredSize:
    Type: Number
    Default: 2
    Description: Desired number of nodes

  CapacityType:
    Type: String
    Default: SPOT
    AllowedValues: [ON_DEMAND, SPOT]
    Description: Capacity type (SPOT recommended for cost savings)

  KubernetesVersion:
    Type: String
    Default: '1.34'
    Description: Kubernetes version

  AmiType:
    Type: String
    Default: AL2023_x86_64_STANDARD
    AllowedValues: [AL2_x86_64, AL2023_x86_64_STANDARD, BOTTLEROCKET_x86_64]
    Description: AMI type for nodes

  NodeSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group ID for EKS nodes (must have VPC endpoint access)

Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  IsDevEnv: !Equals [!Ref Environment, dev]

Resources:
  # Launch template with correct security group for VPC endpoint access
  NodeLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${ProjectName}-general-lt-${Environment}'
      LaunchTemplateData:
        # Security group must be in network interface, not at top level
        NetworkInterfaces:
          - DeviceIndex: 0
            Groups:
              - !Ref NodeSecurityGroupId
        MetadataOptions:
          HttpEndpoint: enabled
          HttpTokens: required
          HttpPutResponseHopLimit: 2
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub '${ProjectName}-general-${Environment}'
              - Key: Project
                Value: !Ref ProjectName
              - Key: Environment
                Value: !Ref Environment

  GeneralPurposeNodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref ClusterName
      NodegroupName: !Sub '${ProjectName}-general-${Environment}'
      NodeRole: !Ref NodeRoleArn
      Subnets: !Ref PrivateSubnetIds
      LaunchTemplate:
        Id: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      InstanceTypes: !Ref InstanceTypes
      CapacityType: !If [IsProd, ON_DEMAND, !Ref CapacityType]
      AmiType: !Ref AmiType
      Version: !Ref KubernetesVersion
      ScalingConfig:
        # Dev: MinSize=1 for cost savings (Cluster Autoscaler scales up as needed)
        # QA/Prod: MinSize=2 for production parity and availability
        MinSize: !If [IsDevEnv, 1, !Ref MinSize]
        MaxSize: !Ref MaxSize
        DesiredSize: !If [IsDevEnv, 1, !Ref DesiredSize]
      Labels:
        workload-type: general-purpose
        environment: !Ref Environment
        project: !Ref ProjectName
      # No taints - general-purpose nodes accept all workloads
      UpdateConfig:
        MaxUnavailable: 1
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Layer: compute
        NodeGroupType: general-purpose
        CostCenter: platform
        # Note: Cluster Autoscaler discovery tags (k8s.io/cluster-autoscaler/*) are
        # automatically added to the underlying ASG by EKS. CloudFormation Tags don't
        # support forward slashes in tag keys.

Outputs:
  NodeGroupName:
    Description: Name of the general-purpose node group
    Value: !Ref GeneralPurposeNodeGroup
    Export:
      Name: !Sub '${ProjectName}-general-nodegroup-${Environment}'

  NodeGroupArn:
    Description: ARN of the general-purpose node group
    Value: !GetAtt GeneralPurposeNodeGroup.Arn
    Export:
      Name: !Sub '${ProjectName}-general-nodegroup-arn-${Environment}'
