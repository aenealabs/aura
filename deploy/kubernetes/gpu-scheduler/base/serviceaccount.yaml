apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-scheduler
  namespace: aura-gpu-workloads
  annotations:
    description: "Service account for GPU scheduler with IRSA for AWS access"
    eks.amazonaws.com/audience: sts.amazonaws.com
    eks.amazonaws.com/sts-regional-endpoints: "true"
  labels:
    app: gpu-scheduler
    app.kubernetes.io/part-of: aura
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gpu-scheduler
  namespace: aura-gpu-workloads
  labels:
    app: gpu-scheduler
    app.kubernetes.io/part-of: aura
rules:
  # Manage batch jobs for GPU workloads
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # Read pod status and logs
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Watch events for job status updates
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gpu-scheduler
  namespace: aura-gpu-workloads
  labels:
    app: gpu-scheduler
    app.kubernetes.io/part-of: aura
subjects:
  - kind: ServiceAccount
    name: gpu-scheduler
    namespace: aura-gpu-workloads
roleRef:
  kind: Role
  name: gpu-scheduler
  apiGroup: rbac.authorization.k8s.io
