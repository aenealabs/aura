clusterName: aura-cluster-dev
region: us-east-1
vpcId: vpc-0abcdef1234567890

serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/aura-alb-controller-role-dev

replicaCount: 2

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

enableShield: true
enableWaf: true
