{{- if and (include "aura.isSelfHosted" .) .Values.databases.graph.neo4j.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aura.fullname" . }}-neo4j
  labels:
    {{- include "aura.componentLabels" (dict "component" "neo4j" "context" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 7474
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.databases.graph.neo4j.tls.httpsPort }}
      targetPort: https
      protocol: TCP
      name: https
    - port: {{ .Values.databases.graph.neo4j.tls.boltPort }}
      targetPort: bolt
      protocol: TCP
      name: bolt
  selector:
    {{- include "aura.componentSelectorLabels" (dict "component" "neo4j" "context" .) | nindent 4 }}
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aura.fullname" . }}-neo4j-headless
  labels:
    {{- include "aura.componentLabels" (dict "component" "neo4j" "context" .) | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.databases.graph.neo4j.tls.boltPort }}
      targetPort: bolt
      protocol: TCP
      name: bolt
  selector:
    {{- include "aura.componentSelectorLabels" (dict "component" "neo4j" "context" .) | nindent 4 }}
{{- end }}
