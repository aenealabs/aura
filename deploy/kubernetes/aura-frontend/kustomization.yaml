# Project Aura - Frontend Kustomization
# Uses Argo Rollouts for progressive delivery (ADR-022 Phase 3)
#
# IMPORTANT: Do not use this directory directly for deployments.
# Use environment-specific overlays instead:
#
#   DEV:  kubectl apply -k deploy/kubernetes/aura-frontend/overlays/dev/
#   QA:   kubectl apply -k deploy/kubernetes/aura-frontend/overlays/qa/
#   PROD: kubectl apply -k deploy/kubernetes/aura-frontend/overlays/prod/
#
# This root kustomization references the base for backward compatibility,
# but overlays should always be used for environment-specific deployments.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

# Reference the base directory - overlays add environment-specific values
resources:
  - base
