{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aura.fullname" . }}-api
  labels:
    {{- include "aura.componentLabels" (dict "component" "api" "context" .) | nindent 4 }}
  {{- with (include "aura.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "aura.componentSelectorLabels" (dict "component" "api" "context" .) | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "aura.configChecksum" . | nindent 8 }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "aura.componentSelectorLabels" (dict "component" "api" "context" .) | nindent 8 }}
    spec:
      {{- include "aura.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "aura.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.api.securityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ include "aura.image" (dict "component" .Values.api "context" .) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy | default (include "aura.imagePullPolicy" .) }}
          securityContext:
            {{- toYaml .Values.api.containerSecurityContext | nindent 12 }}
          ports:
            - name: https
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          env:
            {{- include "aura.commonEnv" . | nindent 12 }}
            {{- include "aura.databaseEnv" . | nindent 12 }}
            {{- include "aura.llmEnv" . | nindent 12 }}
            {{- include "aura.redisEnv" . | nindent 12 }}
            {{- include "aura.storageEnv" . | nindent 12 }}
            {{- if .Values.license.key }}
            - name: AURA_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.license.existingSecret | default (printf "%s-license" (include "aura.fullname" .)) }}
                  key: {{ .Values.license.existingSecretKey | default "license-key" }}
            {{- end }}
            {{- with .Values.api.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- include "aura.livenessProbe" .Values.api.healthChecks.liveness | nindent 10 }}
          {{- include "aura.readinessProbe" .Values.api.healthChecks.readiness | nindent 10 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
            {{- if .Values.global.tls.enabled }}
            - name: tls-certs
              mountPath: /etc/ssl/certs/aura
              readOnly: true
            {{- end }}
            {{- with .Values.api.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        {{- if .Values.global.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ include "aura.tlsSecretName" (dict "component" "api" "context" .) }}
        {{- end }}
        {{- with .Values.api.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
