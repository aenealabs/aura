Outputs:
  CodeBuildProjectName:
    Description: CodeBuild project name
    Value: !Ref CodeBuildProject
    Export:
      Name: !Sub '${AWS::StackName}-CodeBuildProjectName'

  CodeBuildProjectArn:
    Description: CodeBuild project ARN
    Value: !GetAtt CodeBuildProject.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CodeBuildProjectArn'

  BuildArtifactsBucketName:
    Description: Build artifacts bucket name
    Value: !Ref BuildArtifactsBucket
    Export:
      Name: !Sub '${AWS::StackName}-BuildArtifactsBucketName'

  BuildNotificationTopicArn:
    Description: Build notification SNS topic ARN
    Value: !Ref BuildNotificationTopic
    Export:
      Name: !Sub '${AWS::StackName}-BuildNotificationTopicArn'

  StartBuildCommand:
    Description: AWS CLI command to start a build
    Value: !Sub 'aws codebuild start-build --project-name ${CodeBuildProject} --region ${AWS::Region}'
