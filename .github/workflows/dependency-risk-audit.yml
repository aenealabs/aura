name: Dependency Risk Audit

# Recurring weekly audit per docs/security/DEPENDENCY_RISK_REGISTER.md.
#
# Runs pip-audit + npm audit + a maintainer-staleness check against the
# Watch / At-Risk tiers from the register.
#
# Output behaviour by trigger:
#
# * schedule / workflow_dispatch -- writes the report to
#   docs/security/audits/YYYY-WNN.md and opens (or updates) a PR
#   with that file. The PR is labelled `audit-green` when both
#   pip-audit and npm audit (high+) return clean, or `audit-findings`
#   otherwise. Operator review + merge is required; no bot self-
#   approval, no auto-merge -- consistent with the main-protection
#   PR-review enforcement.
#
# * pull_request -- generates the report into the workflow summary
#   only (no file commit). Lets reviewers see the audit impact of
#   the PR they're reviewing.
#
# See docs/security/audits/README.md for the artifact layout, and
# docs/runbooks/DEPENDENCY_RISK_AUDIT_RUNBOOK.md for triage.

on:
  schedule:
    # 14:00 UTC every Monday (start-of-week, off-peak in us-east-1).
    - cron: '0 14 * * 1'
  workflow_dispatch:
  pull_request:
    # Run on PRs that touch deps so reviewers see the impact of the change.
    paths:
      - 'requirements*.txt'
      - 'deploy/docker/**/requirements*.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'docs/security/DEPENDENCY_RISK_REGISTER.md'
      - '.github/workflows/dependency-risk-audit.yml'
      - 'scripts/security/dep_risk_audit.py'

permissions:
  contents: write          # commit the audit-week branch
  pull-requests: write     # open / update the audit PR

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    name: Dependency Risk Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need full history so branch creation works cleanly.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install audit tools
        run: |
          # pip-audit: PyPA official tool for Python CVE scanning.
          # No other audit deps -- the script uses stdlib only and
          # the npm CLI ships with the runner.
          pip install --upgrade pip
          pip install pip-audit

      - name: Install project deps for staleness check
        run: |
          # Staleness check uses `pip show` to read installed metadata,
          # so we install the tracked Watch / At-Risk packages. This
          # is intentionally narrow -- the audit doesn't need the full
          # project install, only the deps it tracks for staleness.
          pip install -r requirements.txt || true

      - name: Install frontend deps for npm audit
        working-directory: frontend
        # --legacy-peer-deps is the documented workaround for the
        # eslint-plugin-react@7.37.5 peer-cap issue (caps at ^9.7 vs
        # eslint@10 in the project) tracked in
        # docs/security/DEPENDENCY_RISK_REGISTER.md.
        run: npm ci --legacy-peer-deps

      - name: Compute paths
        id: paths
        run: |
          # ISO 8601 week (YYYY-WNN, e.g., 2026-W20).
          WEEK=$(date -u +%G-W%V)
          BRANCH="deps/audit/${WEEK}"
          REPORT="docs/security/audits/${WEEK}.md"
          echo "week=${WEEK}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "report=${REPORT}" >> $GITHUB_OUTPUT

      - name: Run audit
        id: audit
        run: |
          mkdir -p "$(dirname "${{ steps.paths.outputs.report }}")"
          python -m scripts.security.dep_risk_audit \
            --output "${{ steps.paths.outputs.report }}"
          # Surface the report into the workflow summary.
          cat "${{ steps.paths.outputs.report }}" >> $GITHUB_STEP_SUMMARY

      - name: Determine green vs findings
        id: greenness
        # Re-runs pip-audit + npm audit separately to derive a CI-shaped
        # exit code (the audit script itself always returns 0; it just
        # writes a report). "Green" = both tools return clean at the
        # high-severity threshold; anything else flips the PR label
        # to `audit-findings` for operator triage.
        run: |
          set +e
          GREEN=true
          for f in requirements.txt requirements-api.txt requirements-agents.txt; do
            if [ -f "$f" ]; then
              pip-audit -r "$f" --strict
              if [ $? -ne 0 ]; then
                GREEN=false
                echo "pip-audit found findings in $f"
              fi
            fi
          done
          if [ -f deploy/docker/memory-service/requirements.txt ]; then
            pip-audit -r deploy/docker/memory-service/requirements.txt --strict
            if [ $? -ne 0 ]; then
              GREEN=false
              echo "pip-audit found findings in memory-service requirements"
            fi
          fi
          ( cd frontend && npm audit --audit-level=high )
          if [ $? -ne 0 ]; then
            GREEN=false
            echo "npm audit found high+ findings"
          fi
          echo "is_green=${GREEN}" >> $GITHUB_OUTPUT
          echo "is_green=${GREEN}"

      - name: Upload audit report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dependency-risk-audit-${{ github.run_number }}
          path: ${{ steps.paths.outputs.report }}
          retention-days: 90

      - name: Open or update audit PR
        # Skip on pull_request (workflow summary covers it; we don't
        # commit audit files from a PR-triggered run because the run
        # is reviewing someone else's changes, not the audit itself).
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="${{ steps.paths.outputs.branch }}"
          REPORT="${{ steps.paths.outputs.report }}"
          WEEK="${{ steps.paths.outputs.week }}"
          IS_GREEN="${{ steps.greenness.outputs.is_green }}"

          if [ "$IS_GREEN" = "true" ]; then
            LABEL="audit-green"
            HEADER="✅ Green -- pip-audit and npm audit (high+) both clean."
          else
            LABEL="audit-findings"
            HEADER="⚠️ Findings -- one or more tools reported issues at the high-severity threshold. Triage per \`docs/runbooks/DEPENDENCY_RISK_AUDIT_RUNBOOK.md\`."
          fi

          # Push the audit file on the week's branch.  Force-push is
          # safe here because the branch is scoped to one week's audit
          # and only this workflow writes to it.
          git checkout -B "$BRANCH"
          git add "$REPORT"
          if git diff --cached --quiet; then
            echo "No changes to commit; the week's audit report already matches main."
            exit 0
          fi
          git commit -m "audit(deps): weekly report ${WEEK}"
          git push origin "$BRANCH" --force

          # Open or update the PR.
          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "Updating existing PR for ${BRANCH}"
            if [ "$LABEL" = "audit-green" ]; then
              gh pr edit "$BRANCH" --add-label "audit-green" --remove-label "audit-findings" 2>/dev/null || \
                gh pr edit "$BRANCH" --add-label "audit-green"
            else
              gh pr edit "$BRANCH" --add-label "audit-findings" --remove-label "audit-green" 2>/dev/null || \
                gh pr edit "$BRANCH" --add-label "audit-findings"
            fi
          else
            BODY=$(cat <<EOF
          # Dependency risk audit -- ${WEEK}

          ${HEADER}

          The full report is committed in [\`${REPORT}\`](https://github.com/${{ github.repository }}/blob/${BRANCH}/${REPORT}).

          - **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - **Triage:** see [\`docs/runbooks/DEPENDENCY_RISK_AUDIT_RUNBOOK.md\`](https://github.com/${{ github.repository }}/blob/main/docs/runbooks/DEPENDENCY_RISK_AUDIT_RUNBOOK.md)
          - **Register:** [\`docs/security/DEPENDENCY_RISK_REGISTER.md\`](https://github.com/${{ github.repository }}/blob/main/docs/security/DEPENDENCY_RISK_REGISTER.md)
          - **Audit history:** [\`docs/security/audits/\`](https://github.com/${{ github.repository }}/tree/main/docs/security/audits)

          Operator action:
          - If green: review the report file and merge. No tier changes should be needed.
          - If findings: triage each finding via the runbook decision tree. Update the register row(s) and commit the changes to this PR before merging.
          EOF
          )
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "audit(deps): weekly report ${WEEK}" \
              --body "$BODY" \
              --label "$LABEL"
          fi
