# Project Aura - Frontend Services NetworkPolicy
#
# Network policies for frontend services:
#   - Frontend (React SPA served by nginx/node)
#   - Ingress Controller communication
#
# ADR-049 Phase 0 - Self-Hosted Deployment
#
---
# Frontend Service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-network-policy
  namespace: aura
  labels:
    app.kubernetes.io/name: aura-frontend
    app.kubernetes.io/component: network-security
    app.kubernetes.io/part-of: aura
    security.aura.io/policy-type: service-allow
spec:
  podSelector:
    matchLabels:
      app: aura-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3000  # Next.js dev server

    # Allow traffic from Traefik (if used)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3000

    # Allow direct access within cluster (for canary deployments)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: aura
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3000

    # Allow health checks
    - from:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3000
  egress:
    # Allow connections to aura-api (backend)
    - to:
        - podSelector:
            matchLabels:
              app: aura-api
      ports:
        - protocol: TCP
          port: 8080

    # Allow WebSocket connections to aura-api
    - to:
        - podSelector:
            matchLabels:
              app: aura-api
      ports:
        - protocol: TCP
          port: 8080

---
# Ingress Controller NetworkPolicy (if running in same cluster)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-to-aura
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/component: network-security
    app.kubernetes.io/part-of: aura
    security.aura.io/policy-type: ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
  policyTypes:
    - Egress
  egress:
    # Allow routing to aura-frontend
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aura
          podSelector:
            matchLabels:
              app: aura-frontend
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3000

    # Allow routing to aura-api
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aura
          podSelector:
            matchLabels:
              app: aura-api
      ports:
        - protocol: TCP
          port: 8080
