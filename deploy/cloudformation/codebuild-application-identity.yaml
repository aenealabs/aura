AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Multi-IdP Authentication CodeBuild Project (Layer 4.12: Identity Provider Infrastructure)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

  GitHubRepository:
    Type: String
    Default: https://github.com/aenealabs/aura
    Description: GitHub repository URL

  GitHubBranch:
    Type: String
    Default: main
    AllowedValues: [main, develop]
    Description: GitHub branch to build from

Mappings:
  PartitionMap:
    aws:
      Partition: 'aws'
    aws-us-gov:
      Partition: 'aws-us-gov'

Resources:
  # CloudWatch Log Group for Identity Builds
  IdentityBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${ProjectName}-identity-deploy-${Environment}'
      RetentionInDays: 30

  # IAM Role for Identity CodeBuild
  IdentityCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-identity-codebuild-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub
          - 'arn:${Partition}:iam::aws:policy/ReadOnlyAccess'
          - Partition: !FindInMap [PartitionMap, !Ref 'AWS::Partition', Partition]
      Policies:
        - PolicyName: IdentityDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudWatch Logs
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents, logs:PutRetentionPolicy, logs:TagResource, logs:DeleteLogGroup]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-identity-*'
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-identity-*:*'

              # CloudWatch Metrics
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: 'Aura/CICD/Application'

              # CloudFormation - Identity stack only
              - Effect: Allow
                Action: [cloudformation:CreateStack, cloudformation:UpdateStack, cloudformation:DeleteStack, cloudformation:CreateChangeSet, cloudformation:ExecuteChangeSet, cloudformation:DeleteChangeSet, cloudformation:DescribeChangeSet, cloudformation:DescribeStacks, cloudformation:DescribeStackEvents, cloudformation:DescribeStackResources, cloudformation:GetTemplate, cloudformation:ValidateTemplate, cloudformation:GetTemplateSummary]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-idp-infrastructure-${Environment}/*'

              # DynamoDB - All 5 identity tables from idp-infrastructure.yaml
              - Effect: Allow
                Action: [dynamodb:CreateTable, dynamodb:DeleteTable, dynamodb:DescribeTable, dynamodb:UpdateTable, dynamodb:UpdateTimeToLive, dynamodb:DescribeTimeToLive, dynamodb:TagResource, dynamodb:UntagResource, dynamodb:DescribeContinuousBackups, dynamodb:UpdateContinuousBackups, dynamodb:CreateGlobalSecondaryIndex, dynamodb:DeleteGlobalSecondaryIndex, dynamodb:UpdateGlobalSecondaryIndex]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-idp-configurations-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-idp-configurations-${Environment}/*'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-idp-audit-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-idp-audit-${Environment}/*'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-auth-sessions-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-auth-sessions-${Environment}/*'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-saml-state-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-saml-state-${Environment}/*'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-oidc-state-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-oidc-state-${Environment}/*'

              # Secrets Manager - Identity secrets
              - Effect: Allow
                Action: [secretsmanager:CreateSecret, secretsmanager:DeleteSecret, secretsmanager:DescribeSecret, secretsmanager:GetSecretValue, secretsmanager:PutSecretValue, secretsmanager:TagResource, secretsmanager:UntagResource, secretsmanager:GetResourcePolicy, secretsmanager:PutResourcePolicy, secretsmanager:DeleteResourcePolicy]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/identity/*'

              # KMS - Key creation and management for identity services
              - Effect: Allow
                Action: [kms:CreateKey, kms:ScheduleKeyDeletion, kms:EnableKeyRotation, kms:PutKeyPolicy, kms:TagResource, kms:UntagResource, kms:CreateAlias, kms:DeleteAlias, kms:UpdateAlias, kms:DescribeKey, kms:GenerateDataKey, kms:Decrypt, kms:Encrypt, kms:CreateGrant, kms:ListGrants, kms:RevokeGrant]
                Resource: '*'
                Condition:
                  StringEquals:
                    kms:CallerAccount: !Ref AWS::AccountId

              # KMS Alias operations
              - Effect: Allow
                Action: [kms:CreateAlias, kms:DeleteAlias, kms:UpdateAlias]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/${ProjectName}-identity-*'

              # SSM Parameter Store
              - Effect: Allow
                Action: [ssm:PutParameter, ssm:DeleteParameter, ssm:GetParameter, ssm:GetParameters, ssm:AddTagsToResource, ssm:RemoveTagsFromResource]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aura/${Environment}/identity/*'
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/*'
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/global/*'

              # CodeConnections (for GitHub source access)
              - Effect: Allow
                Action: [codeconnections:UseConnection, codeconnections:GetConnectionToken]
                Resource:
                  - '{{resolve:ssm:/aura/global/codeconnections-arn}}'

  # CodeBuild Project for Identity Infrastructure
  IdentityCodeBuildProject:
    Type: AWS::CodeBuild::Project
    DependsOn: IdentityCodeBuildRole
    Properties:
      Name: !Sub '${ProjectName}-identity-deploy-${Environment}'
      Description: 'Project Aura - Multi-IdP Authentication CodeBuild Project (Layer 4.12: Identity Provider Infrastructure)'
      ServiceRole: !GetAtt IdentityCodeBuildRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: LAYER
            Value: identity
      Source:
        Type: GITHUB
        Location: !Ref GitHubRepository
        BuildSpec: deploy/buildspecs/buildspec-application-identity.yml
        GitCloneDepth: 1
        ReportBuildStatus: true
        Auth:
          Type: CODECONNECTIONS
          Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'
      SourceVersion: !Sub 'refs/heads/${GitHubBranch}'
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref IdentityBuildLogGroup
        S3Logs:
          Status: DISABLED
      Cache:
        Type: LOCAL
        Modes:
          - LOCAL_SOURCE_CACHE
          - LOCAL_CUSTOM_CACHE
      TimeoutInMinutes: 15
      QueuedTimeoutInMinutes: 480
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: identity

  # CloudWatch Alarm - Identity Build Failures
  IdentityBuildFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-identity-build-failures-${Environment}'
      AlarmDescription: 'Alert when Identity has 2+ failures in 1 hour'
      MetricName: FailedBuilds
      Namespace: AWS/CodeBuild
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: ProjectName
          Value: !Ref IdentityCodeBuildProject
      TreatMissingData: notBreaching

Outputs:
  CodeBuildProjectName:
    Description: CodeBuild Project Name
    Value: !Ref IdentityCodeBuildProject
    Export:
      Name: !Sub '${ProjectName}-identity-codebuild-project-${Environment}'

  CodeBuildProjectArn:
    Description: CodeBuild Project ARN
    Value: !GetAtt IdentityCodeBuildProject.Arn
    Export:
      Name: !Sub '${ProjectName}-identity-codebuild-arn-${Environment}'

  CodeBuildRoleArn:
    Description: IAM Role ARN for CodeBuild
    Value: !GetAtt IdentityCodeBuildRole.Arn
    Export:
      Name: !Sub '${ProjectName}-identity-codebuild-role-arn-${Environment}'
