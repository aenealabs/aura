AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Layer 6.21 - Cognito DR Hydrator (Failover Lambda)'

# =============================================================================
# Purpose
# =============================================================================
# Secondary-region Lambda that scans the user-mirror DynamoDB Global Table at
# failover time and creates corresponding users in the standby Cognito user
# pool via AdminCreateUser + AdminAddUserToGroup + AdminResetUserPassword
# (forced reset on first post-failover login).
#
# DR-2 (#145), ADR-091. Companion to:
#   - cognito-secondary.yaml (Layer 4.14): standby user pool in us-west-2
#   - user-mirror-table.yaml (Layer 2.22): DDB Global Table replica in us-west-2
#   - cognito.yaml (Layer 4.4): primary pool with PostConfirmation /
#     PostAuthentication triggers populating the mirror
#
# Deployment: this template is deployed to the SECONDARY region. Until DR-7
# (#150) lands an orchestration pipeline, deploy manually:
#
#   aws cloudformation deploy \
#       --stack-name aura-cognito-dr-hydrator-prod \
#       --template-file deploy/cloudformation/cognito-dr-hydrator.yaml \
#       --parameter-overrides Environment=prod ProjectName=aura \
#       --capabilities CAPABILITY_NAMED_IAM \
#       --region us-west-2 \
#       --no-fail-on-empty-changeset
#
# Production-only: dev/qa do not run failover drills.
#
# Default state: EventBridge schedule is DISABLED. The hydrator runs only
# when an operator explicitly enables the schedule per the failover runbook
# (docs/runbooks/COGNITO_FAILOVER_RUNBOOK.md). A CloudWatch alarm fires if the
# schedule is enabled outside of an active failover drill / incident.
# =============================================================================

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

  HydratorBatchSize:
    Type: Number
    Default: 25
    MinValue: 1
    MaxValue: 100
    Description: |
      Number of users to hydrate per Lambda invocation. AdminCreateUser is
      rate-limited at ~1 RPS effective; 25 users per invocation paired with
      a 5-minute schedule processes ~7,500 users/hour, which exceeds the
      target hydration throughput for Aura's expected pool size at GA.

  DRAlertTopicArn:
    Type: String
    Default: ''
    Description: |
      Optional SNS topic ARN for hydrator alarms. When empty, alarms are
      created without actions (state is observable via CloudWatch console).

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]
  HasDRAlertTopic: !Not [!Equals [!Ref DRAlertTopicArn, '']]

Resources:
  HydratorFunctionRole:
    Type: AWS::IAM::Role
    Condition: IsProduction
    Properties:
      RoleName: !Sub '${ProjectName}-cognito-dr-hydrator-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: UserMirrorRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-user-mirror-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-user-mirror-${Environment}/index/*'
        # Privileged Cognito admin operations. Per Sally's NIST review every
        # invocation is logged to CloudTrail and treated as a Tier 1 audited
        # identity under AC-6(9). Wildcard scope is necessary to reference
        # the standby pool (ARN unknown until cognito-secondary.yaml deploys);
        # contained by the HYDRATOR_USER_POOL_ID env var which the Lambda
        # validates against the SSM parameter at cold-start.
        - PolicyName: CognitoAdminWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminResetUserPassword
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminListGroupsForUser
                Resource:
                  - !Sub 'arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*'
        - PolicyName: KMSDataKey
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kms:GenerateDataKey
                  - kms:Decrypt
                Resource:
                  - !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*'
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub 'dynamodb.${AWS::Region}.amazonaws.com'
                  StringLike:
                    kms:RequestAlias: !Sub 'alias/${ProjectName}-user-mirror-${Environment}-dr'
        - PolicyName: SSMRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aura/${Environment}/cognito-dr/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: cognito-dr

  HydratorFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: IsProduction
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-cognito-dr-hydrator-${Environment}'
      RetentionInDays: 365  # Long retention -- audit evidence per AC-6(9)

  HydratorFunction:
    Type: AWS::Lambda::Function
    Condition: IsProduction
    DependsOn: HydratorFunctionLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-cognito-dr-hydrator-${Environment}'
      Description: 'Hydrates standby user pool from user-mirror Global Table at failover (DR-2 / #145, ADR-091)'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt HydratorFunctionRole.Arn
      Timeout: 600  # Long timeout: hydration is rate-limited by AdminCreateUser
      MemorySize: 512
      ReservedConcurrentExecutions: 1  # Hydrator is single-instance by design
      Environment:
        Variables:
          TABLE_NAME: !Sub '${ProjectName}-user-mirror-${Environment}'
          # Standby pool ID is read from SSM at cold-start (set during
          # cognito-secondary.yaml deploy, separate stack -- avoids cross-
          # template export-import for a value that may not exist yet).
          STANDBY_POOL_ID_SSM_PARAM: !Sub '/aura/${Environment}/cognito-dr/standby-pool-id'
          BATCH_SIZE: !Ref HydratorBatchSize
          LOG_LEVEL: INFO
      Code:
        ZipFile: |
          """Cognito DR hydrator.

          Scans the user-mirror Global Table replica in the secondary region
          and creates each user in the standby pool via AdminCreateUser, then
          reapplies group membership and forces a password reset.

          Idempotent: AdminCreateUser with MessageAction=SUPPRESS returns
          UsernameExistsException for users already present; the hydrator
          treats that as a success and continues.

          The hydrator is single-instance (ReservedConcurrentExecutions=1)
          and intentionally non-idempotent in batch ordering -- it relies on
          DDB Scan pagination for resumability across invocations. A failed
          batch is retried by the next scheduled invocation.

          Compliance bake-ins (per Sally's NIST review, ADR-091):
            - mfa_enabled_flag drives MFA re-enrollment enforcement (ADR-091).
              When True, the hydrated user is required to re-enroll TOTP on
              first login. Implementation: this hydrator does NOT mark the
              user as MFA-enabled in the standby pool (Cognito has no API to
              do so without the secret); the application's auth UI reads
              mfa_enabled_flag from the mirror table on first login and
              forces TOTP enrollment.
            - AdminResetUserPassword forces email-OTP password reset on first
              login -- compensating control for IA-5 since password hashes
              cannot be replicated.
            - Every AdminCreateUser / AdminAddUserToGroup / AdminResetUserPassword
              invocation goes to CloudTrail (treated as Tier 1 audited
              identity under AC-6(9)).
          """
          import json
          import logging
          import os
          from datetime import datetime, timezone

          import boto3
          from botocore.exceptions import ClientError

          LOG_LEVEL = os.environ.get('LOG_LEVEL', 'INFO')
          TABLE_NAME = os.environ['TABLE_NAME']
          STANDBY_POOL_ID_SSM_PARAM = os.environ['STANDBY_POOL_ID_SSM_PARAM']
          BATCH_SIZE = int(os.environ.get('BATCH_SIZE', '25'))

          logger = logging.getLogger()
          logger.setLevel(LOG_LEVEL)

          ddb = boto3.resource('dynamodb')
          table = ddb.Table(TABLE_NAME)
          cognito = boto3.client('cognito-idp')
          ssm = boto3.client('ssm')

          _CACHED_POOL_ID = None


          def _get_standby_pool_id():
              global _CACHED_POOL_ID
              if _CACHED_POOL_ID:
                  return _CACHED_POOL_ID
              resp = ssm.get_parameter(Name=STANDBY_POOL_ID_SSM_PARAM)
              _CACHED_POOL_ID = resp['Parameter']['Value']
              return _CACHED_POOL_ID


          def _hydrate_one(pool_id, item):
              sub = item['sub']
              email = item['email']
              groups = item.get('groups') or []

              if item.get('dr_eligible') is False:
                  logger.info('skip dr_eligible=False sub=%s', sub)
                  return 'skipped'

              try:
                  cognito.admin_create_user(
                      UserPoolId=pool_id,
                      Username=email,
                      UserAttributes=[
                          {'Name': 'email', 'Value': email},
                          {'Name': 'email_verified', 'Value': 'true'},
                      ],
                      MessageAction='SUPPRESS',  # No welcome email
                      DesiredDeliveryMediums=[],
                  )
                  logger.info('created sub=%s email=%s', sub, email)
              except ClientError as exc:
                  code = exc.response.get('Error', {}).get('Code')
                  if code == 'UsernameExistsException':
                      logger.info('exists sub=%s email=%s (idempotent)', sub, email)
                  else:
                      logger.error('admin_create_user failed sub=%s: %s', sub, exc)
                      return 'error'

              for group in groups:
                  try:
                      cognito.admin_add_user_to_group(
                          UserPoolId=pool_id,
                          Username=email,
                          GroupName=group,
                      )
                  except ClientError as exc:
                      logger.error('admin_add_user_to_group failed sub=%s group=%s: %s', sub, group, exc)

              try:
                  cognito.admin_reset_user_password(
                      UserPoolId=pool_id,
                      Username=email,
                  )
                  logger.info('forced password reset sub=%s', sub)
              except ClientError as exc:
                  logger.error('admin_reset_user_password failed sub=%s: %s', sub, exc)
                  return 'error'

              return 'hydrated'


          def handler(event, context):
              pool_id = _get_standby_pool_id()
              start_key = event.get('start_key') if isinstance(event, dict) else None
              processed = 0
              hydrated = 0
              skipped = 0
              errors = 0

              scan_args = {'Limit': BATCH_SIZE}
              if start_key:
                  scan_args['ExclusiveStartKey'] = start_key

              resp = table.scan(**scan_args)
              for item in resp.get('Items', []):
                  status = _hydrate_one(pool_id, item)
                  processed += 1
                  if status == 'hydrated':
                      hydrated += 1
                  elif status == 'skipped':
                      skipped += 1
                  else:
                      errors += 1

              next_key = resp.get('LastEvaluatedKey')
              summary = {
                  'processed': processed,
                  'hydrated': hydrated,
                  'skipped': skipped,
                  'errors': errors,
                  'has_more': bool(next_key),
                  'next_key': next_key,
                  'timestamp': datetime.now(timezone.utc).isoformat(),
              }
              logger.info('hydrator-summary %s', json.dumps(summary, default=str))
              return summary
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: cognito-dr

  # ===========================================================================
  # EventBridge Schedule -- DISABLED by default
  # ===========================================================================
  # Operator enables this schedule per docs/runbooks/COGNITO_FAILOVER_RUNBOOK.md
  # at the start of an active failover. The HydratorScheduleEnabledAlarm fires
  # if the schedule is enabled outside of an active drill / incident.
  HydratorSchedule:
    Type: AWS::Events::Rule
    Condition: IsProduction
    Properties:
      Name: !Sub '${ProjectName}-cognito-dr-hydrator-schedule-${Environment}'
      Description: 'Cognito DR hydrator schedule -- DISABLED by default; enable per failover runbook'
      ScheduleExpression: 'rate(5 minutes)'
      State: DISABLED
      Targets:
        - Id: HydratorFunction
          Arn: !GetAtt HydratorFunction.Arn

  HydratorSchedulePermission:
    Type: AWS::Lambda::Permission
    Condition: IsProduction
    Properties:
      FunctionName: !Ref HydratorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt HydratorSchedule.Arn

  # ===========================================================================
  # Alarm: hydrator schedule enabled outside an incident
  # ===========================================================================
  # Detects unauthorized invocation. Even one Lambda invocation triggers this
  # alarm. Operators clear the alarm by suppressing it during an active
  # failover drill or incident.
  HydratorScheduleEnabledAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProduction
    Properties:
      AlarmName: !Sub '${ProjectName}-cognito-dr-hydrator-invoked-${Environment}'
      AlarmDescription: 'Cognito DR hydrator was invoked. Alarm fires if invocation occurs outside an active failover (DR-2 / #145, ADR-091).'
      Namespace: AWS/Lambda
      MetricName: Invocations
      Dimensions:
        - Name: FunctionName
          Value: !Ref HydratorFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasDRAlertTopic
        - - !Ref DRAlertTopicArn
        - !Ref AWS::NoValue
      OKActions: !If
        - HasDRAlertTopic
        - - !Ref DRAlertTopicArn
        - !Ref AWS::NoValue

Outputs:
  HydratorFunctionArn:
    Condition: IsProduction
    Description: Cognito DR hydrator Lambda ARN (DR-2 / #145, ADR-091)
    Value: !GetAtt HydratorFunction.Arn
    Export:
      Name: !Sub '${ProjectName}-cognito-dr-hydrator-arn-${Environment}'

  HydratorScheduleName:
    Condition: IsProduction
    Description: EventBridge rule name (operator enables at failover)
    Value: !Ref HydratorSchedule
    Export:
      Name: !Sub '${ProjectName}-cognito-dr-hydrator-schedule-${Environment}'
