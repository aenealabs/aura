AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Foundation Layer CodeBuild Project (Layer 1: VPC, IAM, WAF, VPC Endpoints)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - qa
      - prod
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

  GitHubRepository:
    Type: String
    Default: https://github.com/aenealabs/aura
    Description: GitHub repository URL

  GitHubBranch:
    Type: String
    Default: main
    AllowedValues:
      - main
      - develop
    Description: GitHub branch to build from

Resources:
  # S3 Bucket for Foundation Layer Artifacts
  FoundationArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-foundation-artifacts-${AWS::AccountId}-${Environment}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldFoundationArtifacts
            Status: Enabled
            ExpirationInDays: 90  # Foundation changes infrequently
            NoncurrentVersionExpirationInDays: 30
          - Id: TransitionToIntelligentTiering
            Status: Enabled
            Transitions:
              - TransitionInDays: 0
                StorageClass: INTELLIGENT_TIERING
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: foundation
        - Key: CostCenter
          Value: Platform-Team

  # CloudWatch Log Group for Foundation Builds
  FoundationBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${ProjectName}-foundation-deploy-${Environment}'
      RetentionInDays: 30

  # IAM Role for Foundation Layer CodeBuild
  FoundationCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-foundation-codebuild-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess  # For reading existing resources
      Policies:
        - PolicyName: FoundationDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudWatch Logs - All log operations for project log groups
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents, logs:DeleteLogGroup, logs:PutRetentionPolicy, logs:DescribeLogGroups, logs:TagResource, logs:UntagResource, logs:ListTagsForResource]
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-*:*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/vpc/${ProjectName}-${Environment}*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:aws-waf-logs-${ProjectName}-${Environment}*'
              # CloudWatch Logs - Service-level operations (requires '*')
              - Effect: Allow
                Action: [logs:PutResourcePolicy, logs:DeleteResourcePolicy, logs:DescribeResourcePolicies, logs:CreateLogDelivery, logs:GetLogDelivery, logs:UpdateLogDelivery, logs:DeleteLogDelivery, logs:ListLogDeliveries]
                Resource: '*'
              # ECR - Authorization Token (requires '*')
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: '*'

              # ECR - Push/Pull/Scan images
              - Effect: Allow
                Action: [ecr:BatchCheckLayerAvailability, ecr:GetDownloadUrlForLayer, ecr:BatchGetImage, ecr:PutImage, ecr:InitiateLayerUpload, ecr:UploadLayerPart, ecr:CompleteLayerUpload, ecr:DescribeRepositories, ecr:DescribeImages, ecr:StartImageScan, ecr:DescribeImageScanFindings]
                Resource: !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/${ProjectName}-*'
              # CloudWatch Metrics
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: 'Aura/CICD/Foundation'
              # S3 - Foundation artifacts
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket]
                Resource: [!GetAtt FoundationArtifactsBucket.Arn, !Sub '${FoundationArtifactsBucket.Arn}/*']
              # CloudFormation - Foundation stacks (consolidated wildcard)
              - Effect: Allow
                Action: [cloudformation:CreateStack, cloudformation:UpdateStack, cloudformation:DeleteStack, cloudformation:CreateChangeSet, cloudformation:ExecuteChangeSet, cloudformation:DeleteChangeSet, cloudformation:DescribeChangeSet, cloudformation:DescribeStacks, cloudformation:DescribeStackEvents, cloudformation:DescribeStackResources, cloudformation:GetTemplate, cloudformation:ValidateTemplate, cloudformation:GetTemplateSummary]
                Resource: !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-*-${Environment}/*'

              # VPC + VPC Endpoints Management (Networking stack)
              - Effect: Allow
                Action: [ec2:CreateVpc, ec2:DeleteVpc, ec2:ModifyVpcAttribute, ec2:CreateSubnet, ec2:DeleteSubnet, ec2:ModifySubnetAttribute, ec2:CreateRouteTable, ec2:DeleteRouteTable, ec2:CreateRoute, ec2:DeleteRoute, ec2:AssociateRouteTable, ec2:DisassociateRouteTable, ec2:CreateInternetGateway, ec2:AttachInternetGateway, ec2:DetachInternetGateway, ec2:DeleteInternetGateway, ec2:CreateNatGateway, ec2:DeleteNatGateway, ec2:AllocateAddress, ec2:ReleaseAddress, ec2:CreateTags, ec2:DeleteTags, ec2:CreateFlowLogs, ec2:DeleteFlowLogs, ec2:DescribeFlowLogs, ec2:CreateVpcEndpoint, ec2:DeleteVpcEndpoints, ec2:ModifyVpcEndpoint, ec2:DescribeVpcEndpoints, ec2:DescribeVpcEndpointServices, ec2:DescribePrefixLists]
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:RequestedRegion: !Ref AWS::Region
              # Security Groups (combined Create/Modify/Delete)
              - Effect: Allow
                Action: [ec2:DescribeSecurityGroups, ec2:CreateSecurityGroup, ec2:DeleteSecurityGroup, ec2:AuthorizeSecurityGroupIngress, ec2:AuthorizeSecurityGroupEgress, ec2:RevokeSecurityGroupIngress, ec2:RevokeSecurityGroupEgress, ec2:UpdateSecurityGroupRuleDescriptionsIngress, ec2:UpdateSecurityGroupRuleDescriptionsEgress]
                Resource: '*'
              # WAFv2 (Security stack)
              - Effect: Allow
                Action: [wafv2:CreateWebACL, wafv2:DeleteWebACL, wafv2:UpdateWebACL, wafv2:GetWebACL, wafv2:ListWebACLs, wafv2:AssociateWebACL, wafv2:DisassociateWebACL, wafv2:ListTagsForResource, wafv2:TagResource, wafv2:UntagResource]
                Resource: [!Sub 'arn:${AWS::Partition}:wafv2:${AWS::Region}:${AWS::AccountId}:regional/webacl/${ProjectName}-*/*', !Sub 'arn:${AWS::Partition}:wafv2:${AWS::Region}:${AWS::AccountId}:regional/managedruleset/*/*']
              # WAFv2 Logging (service-level, requires '*')
              - Effect: Allow
                Action: [wafv2:PutLoggingConfiguration, wafv2:GetLoggingConfiguration, wafv2:DeleteLoggingConfiguration, wafv2:ListLoggingConfigurations]
                Resource: '*'
              # Service-linked role for WAF logging
              - Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'
                Condition:
                  StringEquals:
                    iam:AWSServiceName: wafv2.amazonaws.com
              # IAM Management - scoped to project resources
              - Effect: Allow
                Action: [iam:CreateRole, iam:DeleteRole, iam:GetRole, iam:PassRole, iam:AttachRolePolicy, iam:DetachRolePolicy, iam:PutRolePolicy, iam:DeleteRolePolicy, iam:GetRolePolicy, iam:TagRole, iam:UntagRole, iam:ListAttachedRolePolicies, iam:ListRolePolicies, iam:CreateInstanceProfile, iam:DeleteInstanceProfile, iam:AddRoleToInstanceProfile, iam:RemoveRoleFromInstanceProfile, iam:CreateOpenIDConnectProvider, iam:DeleteOpenIDConnectProvider, iam:GetOpenIDConnectProvider, iam:TagOpenIDConnectProvider, iam:CreateServiceLinkedRole]
                Resource: [!Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-*', !Sub 'arn:aws:iam::${AWS::AccountId}:instance-profile/${ProjectName}-*', !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/*']
              # ECR Repository Management
              - Effect: Allow
                Action: [ecr:CreateRepository, ecr:DeleteRepository, ecr:DescribeRepositories, ecr:PutLifecyclePolicy, ecr:GetLifecyclePolicy, ecr:DeleteLifecyclePolicy, ecr:SetRepositoryPolicy, ecr:GetRepositoryPolicy, ecr:DeleteRepositoryPolicy, ecr:TagResource, ecr:UntagResource, ecr:ListTagsForResource, ecr:PutImageScanningConfiguration, ecr:PutImageTagMutability]
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${ProjectName}-*'
              # Parameter Store (includes PutParameter for K8s config generator)
              - Effect: Allow
                Action: [ssm:GetParameter, ssm:GetParameters, ssm:GetParametersByPath, ssm:PutParameter]
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/*'
              # KMS - Key creation (requires '*' with tag condition)
              - Effect: Allow
                Action: kms:CreateKey
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:RequestTag/Project': !Ref ProjectName
              # KMS - Tag operations on existing keys (no condition - key policy controls access)
              - Effect: Allow
                Action: [kms:TagResource, kms:UntagResource, kms:ListResourceTags]
                Resource: !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*'
              # KMS - Key administration
              - Effect: Allow
                Action: [kms:CreateAlias, kms:DeleteAlias, kms:UpdateAlias, kms:DescribeKey, kms:GetKeyPolicy, kms:PutKeyPolicy, kms:EnableKey, kms:DisableKey, kms:EnableKeyRotation, kms:DisableKeyRotation, kms:GetKeyRotationStatus, kms:ScheduleKeyDeletion, kms:CancelKeyDeletion, kms:ListAliases]
                Resource: [!Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*', !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/${ProjectName}-*']
                Condition:
                  StringEquals:
                    'kms:CallerAccount': !Ref AWS::AccountId
              # CodeConnections (GitHub source access - both namespaces for SDK compatibility)
              - Effect: Allow
                Action: [codeconnections:UseConnection, codeconnections:GetConnectionToken, codeconnections:GetConnection, codestar-connections:UseConnection, codestar-connections:GetConnectionToken, codestar-connections:GetConnection]
                Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'
              # PassConnection (requires PassedToService condition)
              - Effect: Allow
                Action: codeconnections:PassConnection
                Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'
                Condition:
                  StringEquals:
                    codeconnections:PassedToService: codebuild.amazonaws.com
              - Effect: Allow
                Action: codestar-connections:PassConnection
                Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'
                Condition:
                  StringEquals:
                    codestar-connections:PassedToService: codebuild.amazonaws.com
              # CodeBuild project management
              - Effect: Allow
                Action: [codebuild:CreateProject, codebuild:DeleteProject, codebuild:UpdateProject, codebuild:BatchGetProjects]
                Resource: !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/${ProjectName}-*-${Environment}'
              # CodeBuild reports (integration tests)
              - Effect: Allow
                Action: [codebuild:CreateReportGroup, codebuild:CreateReport, codebuild:UpdateReport, codebuild:BatchPutTestCases, codebuild:BatchPutCodeCoverages]
                Resource: !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:report-group/${ProjectName}-*-${Environment}-*'
              # S3 - Artifacts and build cache buckets
              - Effect: Allow
                Action: [s3:CreateBucket, s3:DeleteBucket, s3:PutBucketPolicy, s3:GetBucketPolicy, s3:DeleteBucketPolicy, s3:PutBucketVersioning, s3:PutBucketPublicAccessBlock, s3:PutBucketOwnershipControls, s3:PutEncryptionConfiguration, s3:PutLifecycleConfiguration, s3:PutBucketTagging, s3:GetBucketAcl, s3:GetBucketLocation, s3:ListBucket, s3:GetObject, s3:PutObject]
                Resource: [!Sub 'arn:aws:s3:::${ProjectName}-*-${AWS::AccountId}-${Environment}', !Sub 'arn:aws:s3:::${ProjectName}-*-${AWS::AccountId}-${Environment}/*']
              # IAM - PassRole for CodeBuild/EventBridge
              - Effect: Allow
                Action: iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-*-${Environment}'
                Condition:
                  StringEquals:
                    iam:PassedToService: [codebuild.amazonaws.com, events.amazonaws.com]
              # CloudWatch Alarms
              - Effect: Allow
                Action: [cloudwatch:PutMetricAlarm, cloudwatch:DeleteAlarms, cloudwatch:DescribeAlarms]
                Resource: !Sub 'arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${ProjectName}-*-${Environment}'

      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: foundation

  # CodeBuild Project for Foundation Layer
  FoundationCodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-foundation-deploy-${Environment}'
      Description: 'Project Aura - Foundation Layer CodeBuild Project (Layer 1: VPC, IAM, WAF, VPC Endpoints)'
      ServiceRole: !GetAtt FoundationCodeBuildRole.Arn
      Artifacts:
        Type: S3
        Location: !Ref FoundationArtifactsBucket
        Name: foundation-artifacts
        Packaging: ZIP
        EncryptionDisabled: false
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL  # 3 GB RAM, 2 vCPUs (right-sized for Foundation)
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: LAYER
            Value: foundation
      Source:
        Type: GITHUB
        Location: !Ref GitHubRepository
        BuildSpec: deploy/buildspecs/buildspec-foundation.yml
        GitCloneDepth: 1
        ReportBuildStatus: true
        Auth:
          Type: CODECONNECTIONS
          Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'
      SourceVersion: !Sub 'refs/heads/${GitHubBranch}'
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref FoundationBuildLogGroup
        S3Logs:
          Status: DISABLED
      Cache:
        Type: LOCAL
        Modes:
          - LOCAL_SOURCE_CACHE  # Cache source code
      TimeoutInMinutes: 30
      QueuedTimeoutInMinutes: 480
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: foundation
        - Key: CostCenter
          Value: Platform-Team

  # CloudWatch Alarm - Foundation Build Failures
  FoundationBuildFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-foundation-build-failures-${Environment}'
      AlarmDescription: 'Alert when Foundation Layer has 2+ failures in 1 hour'
      MetricName: FailedBuilds
      Namespace: AWS/CodeBuild
      Dimensions:
        - Name: ProjectName
          Value: !Ref FoundationCodeBuildProject
      Statistic: Sum
      Period: 3600  # 1 hour
      EvaluationPeriods: 1
      Threshold: 2
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # CloudWatch Alarm - Foundation Build Duration
  FoundationBuildDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-foundation-build-slow-${Environment}'
      AlarmDescription: 'Alert when Foundation Layer build takes longer than 10 minutes'
      MetricName: Duration
      Namespace: AWS/CodeBuild
      Dimensions:
        - Name: ProjectName
          Value: !Ref FoundationCodeBuildProject
      Statistic: Average
      Period: 300  # 5 minutes
      EvaluationPeriods: 1
      Threshold: 600000  # 10 minutes in milliseconds
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  FoundationCodeBuildProjectName:
    Description: Foundation Layer CodeBuild project name
    Value: !Ref FoundationCodeBuildProject
    Export:
      Name: !Sub '${AWS::StackName}-ProjectName'

  FoundationCodeBuildProjectArn:
    Description: Foundation Layer CodeBuild project ARN
    Value: !GetAtt FoundationCodeBuildProject.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ProjectArn'

  FoundationArtifactsBucketName:
    Description: Foundation Layer artifacts bucket name
    Value: !Ref FoundationArtifactsBucket
    Export:
      Name: !Sub '${AWS::StackName}-ArtifactsBucket'

  FoundationBuildLogGroupName:
    Description: Foundation Layer build log group name
    Value: !Ref FoundationBuildLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-LogGroup'
