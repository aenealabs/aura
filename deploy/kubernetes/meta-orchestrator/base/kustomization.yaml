# Project Aura - MetaOrchestrator Base Kustomization
#
# Base configuration for MetaOrchestrator Kubernetes resources.
# Use overlays for environment-specific configuration.
#
# Usage (via overlay):
#   kubectl apply -k deploy/kubernetes/meta-orchestrator/overlays/dev/
#   kubectl apply -k deploy/kubernetes/meta-orchestrator/overlays/qa/
#   kubectl apply -k deploy/kubernetes/meta-orchestrator/overlays/prod/
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: meta-orchestrator-base
  annotations:
    config.kubernetes.io/local-config: "true"

# Namespace for all resources
namespace: aura

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/name: meta-orchestrator
  app.kubernetes.io/part-of: aura
  app.kubernetes.io/managed-by: kustomize

# Resources to include
resources:
  - serviceaccount.yaml
  - networkpolicy.yaml
  # Note: job-template.yaml is a template, not directly applied
  # Jobs are created dynamically by the dispatcher Lambda

# Images configuration (base name - overlays set full ECR path)
images:
  - name: meta-orchestrator
    newName: meta-orchestrator
    newTag: latest
