AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Marketing CodeBuild Project (Layer 4.8: Marketing Site + Docs Portal)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - qa
      - prod
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

  GitHubRepository:
    Type: String
    Default: https://github.com/aenealabs/aura
    Description: GitHub repository URL

  GitHubBranch:
    Type: String
    Default: main
    AllowedValues:
      - main
      - develop
    Description: GitHub branch to build from

Resources:
  # S3 Bucket for Marketing Build Artifacts
  MarketingArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-marketing-artifacts-${AWS::AccountId}-${Environment}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldArtifacts
            Status: Enabled
            ExpirationInDays: 30
            NoncurrentVersionExpirationInDays: 7
          - Id: TransitionToIntelligentTiering
            Status: Enabled
            Transitions:
              - TransitionInDays: 0
                StorageClass: INTELLIGENT_TIERING
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: marketing
        - Key: CostCenter
          Value: Platform-Team

  # CloudWatch Log Group for Marketing Builds
  MarketingBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${ProjectName}-marketing-deploy-${Environment}'
      RetentionInDays: 30

  # IAM Role for Marketing CodeBuild
  MarketingCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-marketing-codebuild-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: MarketingDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudWatch Logs
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents, logs:PutRetentionPolicy]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-marketing-*:*'

              # CloudWatch Metrics
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: 'Aura/CICD/Marketing'

              # S3 - Artifacts bucket
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket]
                Resource:
                  - !GetAtt MarketingArtifactsBucket.Arn
                  - !Sub '${MarketingArtifactsBucket.Arn}/*'

              # S3 - Marketing and Docs content buckets (create + manage)
              - Effect: Allow
                Action: [s3:CreateBucket, s3:DeleteBucket, s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket, s3:GetBucketLocation, s3:PutBucketPolicy, s3:GetBucketPolicy, s3:DeleteBucketPolicy, s3:PutBucketWebsite, s3:GetBucketWebsite, s3:PutBucketPublicAccessBlock, s3:GetBucketPublicAccessBlock, s3:PutBucketVersioning, s3:GetBucketVersioning, s3:PutEncryptionConfiguration, s3:GetEncryptionConfiguration, s3:PutBucketTagging, s3:GetBucketTagging, s3:PutBucketCORS, s3:GetBucketCORS, s3:PutLifecycleConfiguration, s3:GetLifecycleConfiguration, s3:PutBucketOwnershipControls, s3:GetBucketOwnershipControls]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-marketing-${AWS::AccountId}-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-marketing-${AWS::AccountId}-${Environment}/*'
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-docs-${AWS::AccountId}-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-docs-${AWS::AccountId}-${Environment}/*'

              # CloudFormation - Marketing and Docs stacks
              - Effect: Allow
                Action: [cloudformation:CreateStack, cloudformation:UpdateStack, cloudformation:DeleteStack, cloudformation:DescribeStacks, cloudformation:DescribeStackEvents, cloudformation:DescribeStackResources, cloudformation:GetTemplate, cloudformation:ValidateTemplate, cloudformation:GetTemplateSummary, cloudformation:CreateChangeSet, cloudformation:DescribeChangeSet, cloudformation:ExecuteChangeSet, cloudformation:DeleteChangeSet, cloudformation:ListExports]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-marketing-${Environment}/*'
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-docs-portal-${Environment}/*'

              # CloudFormation List Exports (global)
              - Effect: Allow
                Action: cloudformation:ListExports
                Resource: '*'

              # CloudFront - Create invalidations
              - Effect: Allow
                Action: [cloudfront:CreateInvalidation, cloudfront:GetInvalidation, cloudfront:ListDistributions, cloudfront:GetDistribution]
                Resource: '*'

              # CloudFront OAC (for stack creation)
              - Effect: Allow
                Action: [cloudfront:CreateOriginAccessControl, cloudfront:DeleteOriginAccessControl, cloudfront:GetOriginAccessControl, cloudfront:UpdateOriginAccessControl]
                Resource: '*'

              # CloudFront Functions (for URL rewrite)
              - Effect: Allow
                Action: [cloudfront:CreateFunction, cloudfront:DeleteFunction, cloudfront:DescribeFunction, cloudfront:GetFunction, cloudfront:ListFunctions, cloudfront:PublishFunction, cloudfront:UpdateFunction]
                Resource: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:function/*'

              # CloudFront Distributions (create and manage)
              - Effect: Allow
                Action: [cloudfront:CreateDistribution, cloudfront:UpdateDistribution, cloudfront:DeleteDistribution, cloudfront:TagResource, cloudfront:UntagResource, cloudfront:ListTagsForResource]
                Resource: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/*'

              # CodeConnections (for GitHub access)
              - Effect: Allow
                Action: [codeconnections:UseConnection, codeconnections:GetConnectionToken]
                Resource:
                  - '{{resolve:ssm:/aura/global/codeconnections-arn}}'

              # STS (for account ID lookup)
              - Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: '*'

              # ACM (for certificate lookup)
              - Effect: Allow
                Action: [acm:DescribeCertificate, acm:ListCertificates]
                Resource: '*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: marketing

  # CodeBuild Project for Marketing
  MarketingCodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-marketing-deploy-${Environment}'
      Description: 'Project Aura - Marketing CodeBuild Project (Layer 4.8: Marketing Site + Docs Portal)'
      ServiceRole: !GetAtt MarketingCodeBuildRole.Arn
      TimeoutInMinutes: 30
      QueuedTimeoutInMinutes: 60
      ConcurrentBuildLimit: 1
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: LAYER
            Value: marketing
      Source:
        Type: GITHUB
        Location: !Ref GitHubRepository
        BuildSpec: deploy/buildspecs/buildspec-marketing.yml
        GitCloneDepth: 1
        ReportBuildStatus: true
      SourceVersion: !Ref GitHubBranch
      Artifacts:
        Type: S3
        Location: !Ref MarketingArtifactsBucket
        Name: marketing-artifacts
        Packaging: ZIP
        EncryptionDisabled: false
      Cache:
        Type: S3
        Location: !Sub '${MarketingArtifactsBucket}/cache'
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref MarketingBuildLogGroup
          StreamName: build-logs
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: marketing
        - Key: CostCenter
          Value: Platform-Team

Outputs:
  MarketingCodeBuildProjectName:
    Description: CodeBuild project name for marketing deployment
    Value: !Ref MarketingCodeBuildProject
    Export:
      Name: !Sub '${ProjectName}-marketing-codebuild-${Environment}'

  MarketingCodeBuildProjectArn:
    Description: CodeBuild project ARN for marketing deployment
    Value: !GetAtt MarketingCodeBuildProject.Arn
    Export:
      Name: !Sub '${ProjectName}-marketing-codebuild-arn-${Environment}'

  MarketingArtifactsBucketName:
    Description: S3 bucket for marketing build artifacts
    Value: !Ref MarketingArtifactsBucket
    Export:
      Name: !Sub '${ProjectName}-marketing-artifacts-bucket-${Environment}'

  MarketingCodeBuildRoleArn:
    Description: IAM role ARN for marketing CodeBuild
    Value: !GetAtt MarketingCodeBuildRole.Arn
    Export:
      Name: !Sub '${ProjectName}-marketing-codebuild-role-arn-${Environment}'
