AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Scanning Engine Layer CodeBuild Project (Layer 9: Vulnerability Scanner)'

Mappings:
  PartitionMap:
    aws:
      Partition: 'aws'
    aws-us-gov:
      Partition: 'aws-us-gov'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

  GitHubRepository:
    Type: String
    Default: https://github.com/aenealabs/aura
    Description: GitHub repository URL

  GitHubBranch:
    Type: String
    Default: main
    AllowedValues: [main, develop]
    Description: GitHub branch to build from

Resources:
  # S3 Bucket for Vuln Scan Layer Build Artifacts
  VulnScanArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-vuln-scan-build-${AWS::AccountId}-${Environment}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldArtifacts
            Status: Enabled
            ExpirationInDays: 30
            NoncurrentVersionExpirationInDays: 7
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: vuln-scan

  # CloudWatch Log Group for Vuln Scan Layer Builds
  VulnScanBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${ProjectName}-vuln-scan-deploy-${Environment}'
      RetentionInDays: 14

  # IAM Role for Vuln Scan Layer CodeBuild
  VulnScanCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-vuln-scan-codebuild-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub
          - 'arn:${Partition}:iam::aws:policy/ReadOnlyAccess'
          - Partition: !FindInMap [PartitionMap, !Ref 'AWS::Partition', Partition]
        - !Ref VulnScanKMSManagedPolicy
      Policies:
        - PolicyName: VulnScanDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudFormation Stack Management
              - Effect: Allow
                Action: [cloudformation:CreateStack, cloudformation:UpdateStack, cloudformation:DeleteStack, cloudformation:DescribeStacks, cloudformation:DescribeStackEvents, cloudformation:GetTemplate, cloudformation:CreateChangeSet, cloudformation:DescribeChangeSet, cloudformation:ExecuteChangeSet, cloudformation:DeleteChangeSet, cloudformation:SetStackPolicy, cloudformation:ValidateTemplate, cloudformation:GetTemplateSummary]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-vuln-scan-*'
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:changeSet/*/${ProjectName}-vuln-scan-*'

              # S3 Build Artifacts
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:GetBucketLocation, s3:ListBucket]
                Resource:
                  - !GetAtt VulnScanArtifactsBucket.Arn
                  - !Sub '${VulnScanArtifactsBucket.Arn}/*'

              # CloudWatch Logs
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource:
                  - !GetAtt VulnScanBuildLogGroup.Arn
                  - !Sub '${VulnScanBuildLogGroup.Arn}:*'

              # DynamoDB Table Management
              - Effect: Allow
                Action: [dynamodb:CreateTable, dynamodb:DeleteTable, dynamodb:DescribeTable, dynamodb:UpdateTable, dynamodb:DescribeTimeToLive, dynamodb:UpdateTimeToLive, dynamodb:DescribeContinuousBackups, dynamodb:UpdateContinuousBackups, dynamodb:TagResource, dynamodb:UntagResource, dynamodb:ListTagsOfResource]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-scan-*'

              # S3 Bucket Management (for scan artifacts and reports)
              - Effect: Allow
                Action: [s3:CreateBucket, s3:DeleteBucket, s3:PutBucketPolicy, s3:DeleteBucketPolicy, s3:PutBucketVersioning, s3:PutLifecycleConfiguration, s3:PutEncryptionConfiguration, s3:PutBucketPublicAccessBlock, s3:PutBucketTagging]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-scan-*'

              # SNS Topic Management
              - Effect: Allow
                Action: [sns:CreateTopic, sns:DeleteTopic, sns:GetTopicAttributes, sns:SetTopicAttributes, sns:Subscribe, sns:Unsubscribe, sns:TagResource, sns:UntagResource]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:${ProjectName}-scan-*'

              # ECS Cluster Management
              - Effect: Allow
                Action: [ecs:CreateCluster, ecs:DeleteCluster, ecs:DescribeClusters, ecs:UpdateClusterSettings, ecs:TagResource, ecs:UntagResource, ecs:PutClusterCapacityProviders]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:cluster/${ProjectName}-vuln-scanner-*'

              # EC2 Security Groups (Describe requires Resource: '*')
              - Effect: Allow
                Action: [ec2:DescribeSecurityGroups, ec2:DescribeVpcs]
                Resource: '*'

              # EC2 Security Group Management
              - Effect: Allow
                Action: [ec2:CreateSecurityGroup, ec2:DeleteSecurityGroup, ec2:AuthorizeSecurityGroupIngress, ec2:AuthorizeSecurityGroupEgress, ec2:RevokeSecurityGroupIngress, ec2:RevokeSecurityGroupEgress, ec2:CreateTags, ec2:DeleteTags]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*'
                  - !Sub 'arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:vpc/*'

              # ECR Repository Management
              - Effect: Allow
                Action: [ecr:CreateRepository, ecr:DeleteRepository, ecr:DescribeRepositories, ecr:PutLifecyclePolicy, ecr:PutImageScanningConfiguration, ecr:PutImageTagMutability, ecr:TagResource, ecr:UntagResource, ecr:SetRepositoryPolicy, ecr:DeleteLifecyclePolicy]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/${ProjectName}-scan-*'

              # Step Functions State Machine Management
              - Effect: Allow
                Action: [states:CreateStateMachine, states:DeleteStateMachine, states:DescribeStateMachine, states:UpdateStateMachine, states:TagResource, states:UntagResource]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${ProjectName}-vuln-scan-*'

              # EventBridge Event Bus and Rules Management
              - Effect: Allow
                Action: [events:CreateEventBus, events:DeleteEventBus, events:DescribeEventBus, events:PutRule, events:DeleteRule, events:DescribeRule, events:PutTargets, events:RemoveTargets, events:TagResource, events:UntagResource]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/${ProjectName}-scan-*'
                  - !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/${ProjectName}-*'

              # Lambda Function Management
              - Effect: Allow
                Action: [lambda:CreateFunction, lambda:DeleteFunction, lambda:GetFunction, lambda:GetFunctionConfiguration, lambda:UpdateFunctionCode, lambda:UpdateFunctionConfiguration, lambda:AddPermission, lambda:RemovePermission, lambda:TagResource, lambda:UntagResource, lambda:ListTags]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-vuln-scan-*'

              # CloudWatch Logs Management (for scanner and SFN log groups)
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:DeleteLogGroup, logs:PutRetentionPolicy, logs:TagResource, logs:UntagResource, logs:DescribeLogGroups, logs:PutResourcePolicy, logs:DescribeResourcePolicies, logs:DeleteResourcePolicy]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/ecs/${ProjectName}-vuln-scanner-*'
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/states/${ProjectName}-vuln-scan-*'
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-vuln-scan-*'

              # CloudWatch Dashboard and Alarms
              - Effect: Allow
                Action: [cloudwatch:PutDashboard, cloudwatch:DeleteDashboards, cloudwatch:GetDashboard, cloudwatch:PutMetricAlarm, cloudwatch:DeleteAlarms, cloudwatch:DescribeAlarms, cloudwatch:TagResource]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:cloudwatch::${AWS::AccountId}:dashboard/${ProjectName}-vuln-scanner-*'
                  - !Sub 'arn:${AWS::Partition}:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${ProjectName}-vuln-scan-*'

              # IAM Role Management for Scanner Roles
              - Effect: Allow
                Action: [iam:CreateRole, iam:DeleteRole, iam:GetRole, iam:PutRolePolicy, iam:DeleteRolePolicy, iam:GetRolePolicy, iam:AttachRolePolicy, iam:DetachRolePolicy, iam:TagRole, iam:UntagRole, iam:ListRoleTags, iam:ListAttachedRolePolicies, iam:ListRolePolicies, iam:UpdateAssumeRolePolicy]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-vuln-scan-*'

              # IAM PassRole for Scanner Roles
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-vuln-scan-*'

              # SSM Parameter Store
              - Effect: Allow
                Action: [ssm:PutParameter, ssm:GetParameter, ssm:DeleteParameter, ssm:AddTagsToResource]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/vuln-scan/*'

              # CodeConnections (GitHub source access)
              - Effect: Allow
                Action: [codeconnections:UseConnection, codeconnections:GetConnectionToken]
                Resource:
                  - '{{resolve:ssm:/aura/global/codeconnections-arn}}'

      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: vuln-scan

  # Managed Policy for KMS (separate to avoid 10KB inline policy limit)
  VulnScanKMSManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${ProjectName}-vuln-scan-kms-${Environment}'
      Description: KMS permissions for vulnerability scanner CodeBuild deployment
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: KMSKeyCreation
            Effect: Allow
            Action: kms:CreateKey
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestTag/Project: !Ref ProjectName
          - Sid: KMSKeyManagement
            Effect: Allow
            Action: [kms:DescribeKey, kms:GetKeyPolicy, kms:PutKeyPolicy, kms:EnableKeyRotation, kms:GetKeyRotationStatus, kms:ScheduleKeyDeletion, kms:TagResource, kms:UntagResource, kms:ListResourceTags, kms:CreateGrant, kms:RevokeGrant, kms:Encrypt, kms:Decrypt, kms:GenerateDataKey, kms:CreateAlias, kms:DeleteAlias, kms:UpdateAlias]
            Resource: !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*'
            Condition:
              StringEquals:
                aws:ResourceTag/Project: !Ref ProjectName
          - Sid: KMSAliasManagement
            Effect: Allow
            Action: [kms:CreateAlias, kms:DeleteAlias, kms:UpdateAlias]
            Resource: !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/${ProjectName}-vuln-scan-*'

  # CodeBuild Project for Vulnerability Scanner Layer
  VulnScanCodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-vuln-scan-deploy-${Environment}'
      Description: 'Deploys Layer 9 vulnerability scanner infrastructure (8 stacks)'
      ServiceRole: !GetAtt VulnScanCodeBuildRole.Arn
      Artifacts:
        Type: S3
        Location: !Ref VulnScanArtifactsBucket
        Name: vuln-scan-artifacts
        Packaging: ZIP
        EncryptionDisabled: false
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: LAYER
            Value: vuln-scan
      Source:
        Type: GITHUB
        Location: !Ref GitHubRepository
        BuildSpec: deploy/buildspecs/buildspec-vuln-scan.yml
        GitCloneDepth: 1
        ReportBuildStatus: true
        Auth:
          Type: CODECONNECTIONS
          Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'
      SourceVersion: !Sub 'refs/heads/${GitHubBranch}'
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref VulnScanBuildLogGroup
        S3Logs:
          Status: DISABLED
      Cache:
        Type: LOCAL
        Modes:
          - LOCAL_SOURCE_CACHE
      TimeoutInMinutes: 45
      QueuedTimeoutInMinutes: 480
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: vuln-scan

  # CloudWatch Alarm - Build Failures
  VulnScanBuildFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-vuln-scan-build-failures-${Environment}'
      AlarmDescription: Alert when vuln scan layer has 2+ build failures in 1 hour
      MetricName: FailedBuilds
      Namespace: AWS/CodeBuild
      Dimensions:
        - Name: ProjectName
          Value: !Ref VulnScanCodeBuildProject
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 2
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # CloudWatch Alarm - Build Duration
  VulnScanBuildDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-vuln-scan-build-slow-${Environment}'
      AlarmDescription: Alert when vuln scan layer build takes longer than 30 minutes
      MetricName: Duration
      Namespace: AWS/CodeBuild
      Dimensions:
        - Name: ProjectName
          Value: !Ref VulnScanCodeBuildProject
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1800000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  VulnScanCodeBuildProjectName:
    Description: Vulnerability Scanner Layer CodeBuild project name
    Value: !Ref VulnScanCodeBuildProject
    Export:
      Name: !Sub '${AWS::StackName}-ProjectName'

  VulnScanCodeBuildProjectArn:
    Description: Vulnerability Scanner Layer CodeBuild project ARN
    Value: !GetAtt VulnScanCodeBuildProject.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ProjectArn'

  VulnScanArtifactsBucketName:
    Description: Build artifacts bucket name
    Value: !Ref VulnScanArtifactsBucket
    Export:
      Name: !Sub '${AWS::StackName}-ArtifactsBucket'
