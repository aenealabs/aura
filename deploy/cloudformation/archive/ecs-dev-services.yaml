Outputs:
  DnsmasqServiceName:
    Description: dnsmasq service name
    Value: !GetAtt DnsmasqService.Name

  OrchestratorServiceName:
    Description: Orchestrator service name
    Value: !GetAtt OrchestratorService.Name

  CoderAgentServiceName:
    Description: Coder Agent service name
    Value: !GetAtt CoderAgentService.Name

  ReviewerAgentServiceName:
    Description: Reviewer Agent service name
    Value: !GetAtt ReviewerAgentService.Name

  ValidatorAgentServiceName:
    Description: Validator Agent service name
    Value: !GetAtt ValidatorAgentService.Name
