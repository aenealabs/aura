{{- if and (include "aura.isSelfHosted" .) .Values.databases.document.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aura.fullname" . }}-postgres
  labels:
    {{- include "aura.componentLabels" (dict "component" "postgres" "context" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "aura.componentSelectorLabels" (dict "component" "postgres" "context" .) | nindent 4 }}
{{- end }}
