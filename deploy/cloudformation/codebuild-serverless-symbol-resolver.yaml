AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Symbol Resolver CodeBuild Project (Layer 6.20: ADR-090 Tier 3 Async LLM Resolution)'

# Sub-layer CodeBuild project for ADR-090 Phase 4c.2.
# Deploys the symbol-resolver-tier3.yaml stack (SQS + ECS Fargate
# worker pool + DynamoDB cache + cost ceiling) plus the Phase 5.3
# ABAC kill-switch SSM parameter.
#
# Triggered by the parent serverless layer buildspec to keep the
# parent buildspec well under the CodeBuild 60-minute timeout when
# fresh stacks are creating from scratch.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]

  ProjectName:
    Type: String
    Default: aura

  GitHubRepository:
    Type: String
    Default: https://github.com/aenealabs/aura

  GitHubBranch:
    Type: String
    Default: main
    AllowedValues: [main, develop]

Resources:
  SymbolResolverBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${ProjectName}-serverless-symbol-resolver-deploy-${Environment}'
      RetentionInDays: 30

  SymbolResolverCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-serverless-symbol-resolver-codebuild-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/ReadOnlyAccess'
      Policies:
        - PolicyName: SymbolResolverDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudWatch Logs for the worker plus this build
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents, logs:PutRetentionPolicy, logs:TagResource, logs:DeleteLogGroup]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-serverless-symbol-resolver-*'
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-serverless-symbol-resolver-*:*'
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aura/symbol-resolver/*'
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aura/symbol-resolver/*:*'

              # S3 - serverless artifacts bucket (shared with parent layer)
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:ListBucket]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-serverless-artifacts-${AWS::AccountId}-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-serverless-artifacts-${AWS::AccountId}-${Environment}/*'

              # CloudFormation - symbol-resolver-tier3 stack only
              - Effect: Allow
                Action: [cloudformation:CreateStack, cloudformation:UpdateStack, cloudformation:DeleteStack, cloudformation:CreateChangeSet, cloudformation:ExecuteChangeSet, cloudformation:DeleteChangeSet, cloudformation:DescribeChangeSet, cloudformation:DescribeStacks, cloudformation:DescribeStackEvents, cloudformation:GetTemplate, cloudformation:ValidateTemplate, cloudformation:GetTemplateSummary]
                Resource: !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-symbol-resolver-*-${Environment}/*'

              # SQS - resolution queue + DLQ
              - Effect: Allow
                Action: [sqs:CreateQueue, sqs:DeleteQueue, sqs:GetQueueAttributes, sqs:SetQueueAttributes, sqs:TagQueue, sqs:UntagQueue, sqs:GetQueueUrl, sqs:ListQueueTags]
                Resource: !Sub 'arn:${AWS::Partition}:sqs:${AWS::Region}:${AWS::AccountId}:${ProjectName}-symbol-resolver-*'

              # DynamoDB - cache + cost ceiling tables
              - Effect: Allow
                Action: [dynamodb:CreateTable, dynamodb:DeleteTable, dynamodb:DescribeTable, dynamodb:UpdateTable, dynamodb:UpdateTimeToLive, dynamodb:DescribeTimeToLive, dynamodb:UpdateContinuousBackups, dynamodb:DescribeContinuousBackups, dynamodb:TagResource, dynamodb:UntagResource, dynamodb:ListTagsOfResource]
                Resource: !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-symbol-resolution-*'

              # ECS - Fargate worker service + task definition
              - Effect: Allow
                Action: [ecs:CreateService, ecs:DeleteService, ecs:UpdateService, ecs:DescribeServices, ecs:RegisterTaskDefinition, ecs:DeregisterTaskDefinition, ecs:DescribeTaskDefinition, ecs:TagResource, ecs:UntagResource, ecs:ListTagsForResource]
                Resource: !Sub 'arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:*/${ProjectName}-symbol-resolver-*'

              # Application Auto Scaling for the ECS service
              - Effect: Allow
                Action: [application-autoscaling:RegisterScalableTarget, application-autoscaling:DeregisterScalableTarget, application-autoscaling:DescribeScalableTargets, application-autoscaling:PutScalingPolicy, application-autoscaling:DeleteScalingPolicy, application-autoscaling:DescribeScalingPolicies]
                Resource: '*'

              # CloudWatch alarms for the queue + DLQ
              - Effect: Allow
                Action: [cloudwatch:PutMetricAlarm, cloudwatch:DeleteAlarms, cloudwatch:DescribeAlarms, cloudwatch:TagResource, cloudwatch:UntagResource]
                Resource: !Sub 'arn:${AWS::Partition}:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${ProjectName}-symbol-resolver-*'

              # IAM - task and execution roles for the worker
              - Effect: Allow
                Action: [iam:CreateRole, iam:DeleteRole, iam:GetRole, iam:PutRolePolicy, iam:DeleteRolePolicy, iam:GetRolePolicy, iam:AttachRolePolicy, iam:DetachRolePolicy, iam:TagRole, iam:UntagRole, iam:ListAttachedRolePolicies, iam:ListRolePolicies, iam:UpdateAssumeRolePolicy, iam:PutRolePermissionsBoundary]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-symbol-resolver-*-${Environment}'
              - Effect: Allow
                Action: iam:PassRole
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-symbol-resolver-*-${Environment}'
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com

              # SSM - Phase 5.3 ABAC kill-switch parameter
              - Effect: Allow
                Action: [ssm:PutParameter, ssm:GetParameter, ssm:GetParameters, ssm:DeleteParameter, ssm:DescribeParameters, ssm:AddTagsToResource, ssm:RemoveTagsFromResource, ssm:ListTagsForResource]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aura/symbol-resolver/*'
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aura/phase5/*'

              # CodeConnections (GitHub)
              - Effect: Allow
                Action: [codeconnections:UseConnection, codeconnections:GetConnectionToken]
                Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'

  SymbolResolverCodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-serverless-symbol-resolver-deploy-${Environment}'
      Description: 'Symbol Resolver Tier 3 deployment - SQS + ECS Fargate + DynamoDB (Layer 6.20)'
      ServiceRole: !GetAtt SymbolResolverCodeBuildRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
      Source:
        Type: GITHUB
        Location: !Ref GitHubRepository
        BuildSpec: deploy/buildspecs/buildspec-serverless-symbol-resolver.yml
        GitCloneDepth: 1
        ReportBuildStatus: true
        Auth:
          Type: CODECONNECTIONS
          Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'
      SourceVersion: !Sub 'refs/heads/${GitHubBranch}'
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref SymbolResolverBuildLogGroup
      TimeoutInMinutes: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: serverless
        - Key: ADR
          Value: ADR-090

Outputs:
  CodeBuildProjectName:
    Value: !Ref SymbolResolverCodeBuildProject
    Export:
      Name: !Sub '${ProjectName}-serverless-symbol-resolver-codebuild-project-${Environment}'

  CodeBuildProjectArn:
    Value: !GetAtt SymbolResolverCodeBuildProject.Arn
    Export:
      Name: !Sub '${ProjectName}-serverless-symbol-resolver-codebuild-arn-${Environment}'
