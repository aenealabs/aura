# Project Aura - Frontend Service
# Exposes nginx frontend within the cluster

apiVersion: v1
kind: Service
metadata:
  name: aura-frontend
  namespace: default
  labels:
    app: aura-frontend
    component: frontend
    environment: dev
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: aura-frontend
