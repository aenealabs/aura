name: Performance Benchmarks

# ADR-090 ingestion performance gates (#117).
#
# Runs the tests/performance/ suite on a pinned runner where CI variance
# is bounded. PR-blocking on regression. Separate from code-quality.yml
# so contributors do not pay the benchmark cost on every PR.

on:
  pull_request:
    branches:
      - main
      - develop
    # Only trigger when something perf-relevant changes. Documentation-
    # only PRs do not need to wait on benchmarks.
    paths:
      - 'src/agents/ast_parser_agent.py'
      - 'src/services/git_ingestion_service.py'
      - 'src/services/graph/**'
      - 'src/services/neptune_graph_service.py'
      - 'tests/performance/**'
      - 'pyproject.toml'
      - '.github/workflows/benchmarks.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ingestion-benchmarks:
    name: ADR-090 Ingestion Benchmarks
    # Runner choice trade-off (audit #185 cluster H3):
    # The original ``ubuntu-24.04-large`` runner was pinned for stable
    # CPU + memory characteristics per #117. As of 2026-05-14 that
    # runner type was not allocating -- runs queued for 13+ hours
    # without starting, effectively rendering the benchmark gate dead.
    # Switched to ``ubuntu-latest`` so the gate runs at all, at the
    # cost of higher CPU / memory variance. This is strictly better
    # than a dead gate, but it means the sub-20% regression-detection
    # accuracy claim from #117 is degraded -- prefer trend analysis
    # over single-run comparison.
    # If a future maintainer can confirm ``ubuntu-24.04-large`` is
    # available again, swap back and reference this comment.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # pytest + pytest-asyncio are pinned in requirements.txt;
          # the perf suite uses only stdlib timing primitives
          # (time.perf_counter, statistics, resource) -- no
          # pytest-benchmark or other external bench libraries.
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ingestion benchmarks
        run: |
          # --no-cov: coverage instrumentation perturbs timings.
          # -m performance: gate the suite on the marker.
          # tests/performance/: explicit path because pyproject.toml
          # addopts excludes this directory from default collection.
          pytest tests/performance/ -m performance --no-cov -v

      - name: Surface baselines on regression
        if: failure()
        run: |
          echo '::warning::Ingestion benchmark regressed beyond the configured threshold.'
          echo '::warning::See tests/performance/README.md for the rebaseline procedure.'
          echo ''
          echo 'Current baselines:'
          cat tests/performance/baselines.json
