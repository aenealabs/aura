apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aura-gpu-workloads

resources:
  - ../../base

commonLabels:
  environment: prod

patches:
  # Add IRSA role ARN to ServiceAccount
  - target:
      kind: ServiceAccount
      name: gpu-scheduler
    patch: |-
      - op: add
        path: /metadata/annotations/eks.amazonaws.com~1role-arn
        value: "arn:aws-us-gov:iam::ACCOUNT_ID:role/aura-gpu-scheduler-irsa-role-prod"

  # Increase GPU quota for production
  - target:
      kind: ResourceQuota
      name: gpu-quota
    patch: |-
      - op: replace
        path: /spec/hard/requests.nvidia.com~1gpu
        value: "16"
      - op: replace
        path: /spec/hard/limits.nvidia.com~1gpu
        value: "16"
      - op: replace
        path: /spec/hard/count~1jobs.batch
        value: "100"
