# Project Aura - Service Configuration (Production Environment)
#
# Usage:
#   kubectl apply -k deploy/kubernetes/aura-service-config/overlays/prod/
#
# Production environment uses official aenealabs.com domain.
# IMPORTANT: Verify all URLs are correct before deploying to production.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - ../../base

labels:
  - pairs:
      environment: prod
      project: aura
    includeSelectors: false

# Patch ConfigMap with prod-specific values
patches:
  - target:
      kind: ConfigMap
      name: aura-service-config
    patch: |-
      - op: replace
        path: /data/SUPPORT_EMAIL
        value: "support@aenealabs.com"
      - op: replace
        path: /data/PRICING_PAGE_URL
        value: "https://app.aenealabs.com/pricing"
      - op: replace
        path: /data/LICENSE_RENEWAL_URL
        value: "https://app.aenealabs.com/renew"
      - op: replace
        path: /data/GPU_DASHBOARD_BASE_URL
        value: "https://app.aenealabs.com"
