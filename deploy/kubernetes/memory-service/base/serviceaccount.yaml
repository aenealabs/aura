# Project Aura - Neural Memory Service Account (Base)
# Service account with IRSA (IAM Roles for Service Accounts) for AWS access
#
# This is the base service account - overlays set the IRSA role ARN.
#
# Prerequisites:
# 1. OIDC provider configured for EKS cluster
# 2. IAM role: aura-memory-service-irsa-role-{env} with trust policy
#
# The IAM role should have policies for:
# - S3: Read/Write to aura-models-* bucket for model checkpoints
# - DynamoDB: Read/Write to aura-neural-memory-* table for state persistence
# - CloudWatch: PutMetricData for custom GPU/memory metrics
# - ECR: Pull container images

apiVersion: v1
kind: ServiceAccount
metadata:
  name: aura-memory-service
  namespace: default
  labels:
    app: aura-memory-service
    component: neural-memory
  annotations:
    # IRSA annotation - role ARN set by overlay
    eks.amazonaws.com/role-arn: "PLACEHOLDER_ROLE_ARN"
    description: "Service account for Titan Neural Memory service with IRSA for AWS access"
