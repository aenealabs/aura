              Value: !Ref Environment
            - Name: AGENT_TYPE
              Value: reviewer
            - Name: CONTEXT_SERVICE
              Value: !Sub context-retrieval.${Environment}.aura.local:8080
            - Name: LLM_PROVIDER
              Value: bedrock
            - Name: LLM_MODEL
              Value: anthropic.claude-3-5-sonnet-20240620-v1:0
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub ${ClusterStackName}-LogGroupName
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: reviewer-agent
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: ProjectAura

  ReviewerAgentServiceDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: reviewer-agent
      DnsConfig:
        NamespaceId:
          Fn::ImportValue: !Sub ${ClusterStackName}-NamespaceId
        DnsRecords:
          - Type: A
            TTL: 10
