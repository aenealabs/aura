apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aura-gpu-workloads

resources:
  - ../../base

commonLabels:
  environment: qa

patches:
  # Add IRSA role ARN to ServiceAccount
  - target:
      kind: ServiceAccount
      name: gpu-scheduler
    patch: |-
      - op: add
        path: /metadata/annotations/eks.amazonaws.com~1role-arn
        value: "arn:aws:iam::ACCOUNT_ID:role/aura-gpu-scheduler-irsa-role-qa"
