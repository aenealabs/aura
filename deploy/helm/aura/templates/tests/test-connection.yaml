apiVersion: v1
kind: Pod
metadata:
  name: {{ include "aura.fullname" . }}-test-connection
  labels:
    {{- include "aura.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  {{- include "aura.imagePullSecrets" . | nindent 2 }}
  serviceAccountName: {{ include "aura.serviceAccountName" . }}
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
  containers:
    - name: api-test
      image: curlimages/curl:8.5.0
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Testing API health endpoint..."
          curl -sf{{ if .Values.global.tls.enabled }}k{{ end }} \
            {{ if .Values.global.tls.enabled }}https{{ else }}http{{ end }}://{{ include "aura.fullname" . }}-api:{{ .Values.api.service.port }}/healthz
          echo ""
          echo "API health check passed!"

          echo "Testing API readiness endpoint..."
          curl -sf{{ if .Values.global.tls.enabled }}k{{ end }} \
            {{ if .Values.global.tls.enabled }}https{{ else }}http{{ end }}://{{ include "aura.fullname" . }}-api:{{ .Values.api.service.port }}/readyz
          echo ""
          echo "API readiness check passed!"

          echo "All connection tests passed!"
  restartPolicy: Never
---
