# Project Aura - Neural Memory Service Kustomization
#
# IMPORTANT: Do not use this directory directly for deployments.
# Use environment-specific overlays instead:
#
#   DEV:  kubectl apply -k deploy/kubernetes/memory-service/overlays/dev/
#   QA:   kubectl apply -k deploy/kubernetes/memory-service/overlays/qa/
#   PROD: kubectl apply -k deploy/kubernetes/memory-service/overlays/prod/
#
# This root kustomization references the base for backward compatibility,
# but overlays should always be used for environment-specific deployments.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: memory-service

namespace: default

# Reference the base directory - overlays add environment-specific values
resources:
  - base
