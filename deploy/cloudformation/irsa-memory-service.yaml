AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Layer 4.9 - IRSA Memory Service (Neural Memory Service Account)'

Parameters:
  ProjectName:
    Type: String
    Default: aura
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
    Description: Deployment environment

  OIDCProviderArn:
    Type: String
    Description: ARN of the EKS OIDC provider

  OIDCProviderURL:
    Type: String
    Description: URL of the EKS OIDC provider (without https://)

  ServiceAccountNamespace:
    Type: String
    Default: default
    Description: Kubernetes namespace for the service account

  ServiceAccountName:
    Type: String
    Default: memory-service
    Description: Kubernetes service account name

Resources:
  # IAM Policy for memory-service with least-privilege permissions
  MemoryServicePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${ProjectName}-memory-service-policy-${Environment}'
      Description: !Sub 'Permissions for ${ProjectName} memory service in ${Environment}'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # S3 Access for model checkpoints and artifacts
          - Sid: S3ModelAccess
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetObjectVersion
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-models-${Environment}'
              - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-models-${Environment}/*'

          # DynamoDB Access for memory state persistence
          - Sid: DynamoDBMemoryState
            Effect: Allow
            Action:
              - dynamodb:DescribeTable
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:BatchGetItem
              - dynamodb:BatchWriteItem
            Resource:
              - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-neural-memory-${Environment}'
              - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-neural-memory-${Environment}/index/*'

          # CloudWatch Metrics for GPU and memory monitoring
          - Sid: CloudWatchMetricsAccess
            Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: '*'
            Condition:
              StringEquals:
                cloudwatch:namespace:
                  - 'Aura/NeuralMemory'
                  - 'Aura/GPU'

          # CloudWatch Logs for application logging
          - Sid: CloudWatchLogsAccess
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogStreams
            Resource:
              - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/eks/${ProjectName}-cluster-${Environment}/*'
              - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aura/${Environment}/memory-service/*'

          # ECR Access for pulling container images
          - Sid: ECRAccess
            Effect: Allow
            Action:
              - ecr:GetAuthorizationToken
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
            Resource: '*'

          # Secrets Manager Access for model credentials
          - Sid: SecretsManagerAccess
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource:
              - !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/memory-service/*'

  # IAM Role for IRSA with OIDC trust policy
  MemoryServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-memory-service-irsa-role-${Environment}'
      Description: !Sub 'IRSA role for ${ProjectName} memory-service Kubernetes service account'
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {
                    "Federated": "${OIDCArn}"
                  },
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${OIDCUrl}:aud": "sts.amazonaws.com",
                      "${OIDCUrl}:sub": "system:serviceaccount:${Namespace}:${SA}"
                    }
                  }
                }
              ]
            }
          - OIDCArn: !Ref OIDCProviderArn
            OIDCUrl: !Ref OIDCProviderURL
            Namespace: !Ref ServiceAccountNamespace
            SA: !Ref ServiceAccountName
      ManagedPolicyArns:
        - !Ref MemoryServicePolicy
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: IRSA
        - Key: ServiceAccount
          Value: !Sub '${ServiceAccountNamespace}/${ServiceAccountName}'

Outputs:
  RoleArn:
    Description: ARN of the IRSA role for memory-service
    Value: !GetAtt MemoryServiceRole.Arn
    Export:
      Name: !Sub '${ProjectName}-memory-service-irsa-role-arn-${Environment}'

  PolicyArn:
    Description: ARN of the IAM policy for memory-service
    Value: !Ref MemoryServicePolicy
    Export:
      Name: !Sub '${ProjectName}-memory-service-policy-arn-${Environment}'

  ServiceAccountAnnotation:
    Description: Annotation to add to Kubernetes service account
    Value: !Sub 'eks.amazonaws.com/role-arn: ${MemoryServiceRole.Arn}'
