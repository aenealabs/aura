# Project Aura - HPA Configuration Templates
#
# Horizontal Pod Autoscaler configurations for self-hosted deployments.
# Based on resource baselines defined in docs/self-hosted/RESOURCE_BASELINES.md
#
# ADR-049 Phase 0 - Self-Hosted Deployment
#
# Prerequisites:
#   - metrics-server installed
#   - prometheus-adapter for custom metrics
#   - DCGM exporter for GPU metrics (optional)
#
---
# API Service HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aura-api-hpa
  namespace: aura
  labels:
    app.kubernetes.io/name: aura-api
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: aura
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aura-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
      selectPolicy: Min

