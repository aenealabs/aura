AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Layer 1.3 - IAM (Roles and Policies)'

Mappings:
  PartitionMap:
    aws:
      Partition: 'aws'
    aws-us-gov:
      Partition: 'aws-us-gov'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - qa
      - prod
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

Resources:
  # EKS Cluster Role
  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-eks-cluster-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub
          - 'arn:${Partition}:iam::aws:policy/AmazonEKSClusterPolicy'
          - Partition: !FindInMap [PartitionMap, !Ref 'AWS::Partition', Partition]
        - !Sub
          - 'arn:${Partition}:iam::aws:policy/AmazonEKSVPCResourceController'
          - Partition: !FindInMap [PartitionMap, !Ref 'AWS::Partition', Partition]
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # EKS Node Role
  EKSNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-eks-node-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub
          - 'arn:${Partition}:iam::aws:policy/AmazonEKSWorkerNodePolicy'
          - Partition: !FindInMap [PartitionMap, !Ref 'AWS::Partition', Partition]
        - !Sub
          - 'arn:${Partition}:iam::aws:policy/AmazonEKS_CNI_Policy'
          - Partition: !FindInMap [PartitionMap, !Ref 'AWS::Partition', Partition]
        - !Sub
          - 'arn:${Partition}:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly'
          - Partition: !FindInMap [PartitionMap, !Ref 'AWS::Partition', Partition]
        - !Sub
          - 'arn:${Partition}:iam::aws:policy/CloudWatchAgentServerPolicy'
          - Partition: !FindInMap [PartitionMap, !Ref 'AWS::Partition', Partition]
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Aura Service Role (for application pods)
  ServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-service-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
          - Effect: Allow
            Principal:
              Federated: !Sub
                - 'arn:${Partition}:iam::${AWS::AccountId}:oidc-provider/oidc.eks.${AWS::Region}.amazonaws.com/id/EXAMPLED539D4633E53DE1B71EXAMPLE'
                - Partition: !FindInMap [PartitionMap, !Ref 'AWS::Partition', Partition]
            Action: sts:AssumeRoleWithWebIdentity
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Allow model invocation for approved models only
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-5-sonnet-20241022-v1:0'
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0'
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0'
              # Read-only operations for discovery (scoped by condition)
              - Effect: Allow
                Action:
                  - bedrock:ListFoundationModels
                  - bedrock:GetFoundationModel
                Resource: '*'
                Condition:
                  StringLike:
                    'bedrock:modelId':
                      - 'anthropic.claude-3-5-sonnet*'
                      - 'anthropic.claude-3-haiku*'
                      - 'amazon.titan-embed-text*'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/*'
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-*-${Environment}'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-*-${Environment}/index/*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectName}-*-${Environment}'
                  - !Sub 'arn:aws:s3:::${ProjectName}-*-${Environment}/*'
        - PolicyName: CloudWatchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    'cloudwatch:namespace':
                      - !Sub '${ProjectName}/${Environment}'
                      - 'AWS/EKS'
                      - 'AWS/Neptune'
                      - 'AWS/ES'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/${ProjectName}/*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/eks/${ProjectName}-*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/neptune/${ProjectName}-*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/opensearch/${ProjectName}-*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Neptune Access Role
  NeptuneAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-neptune-access-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3BulkLoadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectName}-*-${Environment}'
                  - !Sub 'arn:aws:s3:::${ProjectName}-*-${Environment}/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # CodeBuild Service Role
  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-codebuild-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildBasePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectName}-*-${Environment}'
                  - !Sub 'arn:aws:s3:::${ProjectName}-*-${Environment}/*'
              - Effect: Allow
                Action:
                  - cloudformation:*
                Resource:
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-*'
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-*/*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-*'
                Condition:
                  StringEquals:
                    'iam:PassedToService':
                      - cloudformation.amazonaws.com
                      - codebuild.amazonaws.com
                      - ecs-tasks.amazonaws.com
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: '*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # CloudFormation Service Role
  CloudFormationServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-cfn-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudFormationDeploymentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Infrastructure Services (scoped to current region)
              - Effect: Allow
                Action:
                  - ec2:*
                  - eks:*
                  - rds:*  # Neptune uses RDS service namespace
                  - es:*  # OpenSearch uses 'es' service prefix
                  - dynamodb:*
                  - s3:*
                  - kms:*
                  - logs:*
                  - cloudwatch:*
                  - elasticloadbalancing:*
                  - autoscaling:*
                  - ecs:*
                  - ecr:*
                  - elasticfilesystem:*
                  - rds:*
                  - servicediscovery:*
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:RequestedRegion': !Ref AWS::Region

              # IAM - Scoped to Project Resources Only
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:UpdateRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PassRole
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:CreateServiceLinkedRole
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-*'
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:instance-profile/${ProjectName}-*'
                  - 'arn:aws:iam::*:role/aws-service-role/*'

              # CloudFormation Stack Management
              # IAM Remediation: Explicit actions instead of cloudformation:* (architecture review Dec 2025)
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStackResources
                  - cloudformation:SetStackPolicy
                  - cloudformation:ValidateTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:ListChangeSets
                  - cloudformation:GetStackPolicy
                  - cloudformation:TagResource
                  - cloudformation:UntagResource
                  - cloudformation:ContinueUpdateRollback
                  - cloudformation:CancelUpdateStack
                  - cloudformation:SignalResource
                Resource:
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-*'
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-*/*'
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:changeSet/${ProjectName}-*/*'
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:aws:transform/*'

              # Secrets Manager - Project Scoped
              - Effect: Allow
                Action:
                  - secretsmanager:*
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/*'

              # Bedrock Guardrails - Create/manage guardrails via CloudFormation
              # Required for AWS::Bedrock::Guardrail and AWS::Bedrock::GuardrailVersion resources
              - Effect: Allow
                Action:
                  - bedrock:CreateGuardrail
                  - bedrock:DeleteGuardrail
                  - bedrock:GetGuardrail
                  - bedrock:UpdateGuardrail
                  - bedrock:ListGuardrails
                  - bedrock:CreateGuardrailVersion
                  - bedrock:DeleteGuardrailVersion
                  - bedrock:GetGuardrailVersion
                  - bedrock:ListGuardrailVersions
                  - bedrock:TagResource
                  - bedrock:UntagResource
                  - bedrock:ListTagsForResource
                Resource:
                  - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:guardrail/*'

              # SSM Parameter Store - For Guardrail config parameters
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:AddTagsToResource
                  - ssm:RemoveTagsFromResource
                  - ssm:ListTagsForResource
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/*'
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aura/*'

              # CodeConnections - Required to create CodeBuild projects with GitHub source
              # Note: Both 'codeconnections' and legacy 'codestar-connections' namespaces needed
              # because AWS APIs may use either depending on the operation and SDK version
              - Effect: Allow
                Action:
                  - codeconnections:UseConnection
                  - codeconnections:GetConnectionToken
                  - codeconnections:GetConnection
                  - codestar-connections:UseConnection
                  - codestar-connections:GetConnectionToken
                  - codestar-connections:GetConnection
                Resource:
                  - '{{resolve:ssm:/aura/global/codeconnections-arn}}'

              # PassConnection allows CloudFormation to configure CodeBuild projects
              # CRITICAL: PassedToService condition is required for PassConnection to work
              - Effect: Allow
                Action:
                  - codeconnections:PassConnection
                Resource:
                  - '{{resolve:ssm:/aura/global/codeconnections-arn}}'
                Condition:
                  StringEquals:
                    codeconnections:PassedToService: codebuild.amazonaws.com
              - Effect: Allow
                Action:
                  - codestar-connections:PassConnection
                Resource:
                  - '{{resolve:ssm:/aura/global/codeconnections-arn}}'
                Condition:
                  StringEquals:
                    codestar-connections:PassedToService: codebuild.amazonaws.com

              # DENY Dangerous Operations (defense in depth)
              - Effect: Deny
                Action:
                  - iam:DeleteUser
                  - iam:DeleteGroup
                  - iam:CreateAccessKey
                  - iam:UpdateAccessKey
                  - iam:AttachUserPolicy
                  - iam:AttachGroupPolicy
                  - organizations:*
                  - account:*
                Resource: '*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Lambda Execution Role (for custom resources)
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-execution-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub
          - 'arn:${Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
          - Partition: !FindInMap [PartitionMap, !Ref 'AWS::Partition', Partition]
      Policies:
        - PolicyName: CustomResourcePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - eks:DescribeCluster
                  - rds:DescribeDBClusters  # Neptune uses RDS service namespace
                  - es:DescribeDomain  # OpenSearch uses 'es' service prefix
                Resource: '*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

Outputs:
  EKSClusterRoleArn:
    Description: EKS cluster role ARN
    Value: !GetAtt EKSClusterRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EKSClusterRoleArn'

  EKSNodeRoleArn:
    Description: EKS node role ARN
    Value: !GetAtt EKSNodeRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EKSNodeRoleArn'

  ServiceRoleArn:
    Description: Aura service role ARN
    Value: !GetAtt ServiceRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ServiceRoleArn'

  NeptuneAccessRoleArn:
    Description: Neptune access role ARN
    Value: !GetAtt NeptuneAccessRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-NeptuneAccessRoleArn'

  CodeBuildServiceRoleArn:
    Description: CodeBuild service role ARN
    Value: !GetAtt CodeBuildServiceRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CodeBuildServiceRoleArn'

  CloudFormationServiceRoleArn:
    Description: CloudFormation service role ARN
    Value: !GetAtt CloudFormationServiceRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CloudFormationServiceRoleArn'

  LambdaExecutionRoleArn:
    Description: Lambda execution role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaExecutionRoleArn'
