# Gradle IntelliJ Plugin configuration
kotlin.stdlib.default.dependency = false
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m

# Plugin metadata
pluginVersion = 2.0.0
pluginSinceBuild = 232
pluginUntilBuild = 251.*

# Platform settings
platformType = PC
platformVersion = 2023.2.5

# Java home is auto-detected by Gradle from JAVA_HOME at build time, AND
# the build.gradle.kts declares a Java 17 toolchain so Gradle will provision
# the correct JDK if the local one differs. Do NOT add `org.gradle.java.home`
# here -- machine-specific paths (e.g., /opt/homebrew/...) break CI runners
# that don't have that path. If you need to override Java home locally, set
# it in your own ~/.gradle/gradle.properties (per-user, not per-project).
