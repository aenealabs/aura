AWSTemplateFormatVersion: "2010-09-09"
Description: 'Project Aura - Layer 2.2 - S3 (Object Storage)'

Parameters:
  SecondaryRegion:
    Type: String
    Default: us-west-2
    Description: |
      Secondary AWS region for S3 CRR (DR-5 / #148). The replica buckets
      (created by deploy/cloudformation/s3-replica.yaml in the secondary
      region) must already exist before this stack creates the
      ReplicationConfiguration. Used here only for documentation and
      tagging; the destination bucket ARN is constructed from the
      naming convention since S3 ARNs are region-less.

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]

Resources:
  # Artifacts Bucket
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-artifacts-${AWS::AccountId}-${Environment}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      # DR-5 (#148): Tier 3 customer artifacts replicate to the
      # secondary region via S3 CRR in production. Destination bucket
      # is created by deploy/cloudformation/s3-replica.yaml deployed
      # in ${SecondaryRegion}; bucket ARNs are region-less so the
      # name pattern resolves cleanly.
      ReplicationConfiguration: !If
        - IsProduction
        - Role: !GetAtt S3ReplicationRole.Arn
          Rules:
            - Id: ReplicateArtifactsToSecondary
              Status: Enabled
              Priority: 1
              Filter:
                Prefix: ''
              DeleteMarkerReplication:
                Status: Disabled
              Destination:
                Bucket: !Sub "arn:${AWS::Partition}:s3:::${ProjectName}-artifacts-${AWS::AccountId}-${Environment}-dr"
                StorageClass: STANDARD
        - !Ref AWS::NoValue
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: STANDARD_IA
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        DestinationBucketName: !Ref LoggingBucket
        LogFilePrefix: artifacts-logs/
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-artifacts-${Environment}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Code Repository Bucket
  CodeRepositoryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-code-repo-${AWS::AccountId}-${Environment}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      # DR-5 (#148): Tier 3 customer code copies replicate to the
      # secondary region via S3 CRR in production.
      ReplicationConfiguration: !If
        - IsProduction
        - Role: !GetAtt S3ReplicationRole.Arn
          Rules:
            - Id: ReplicateCodeRepoToSecondary
              Status: Enabled
              Priority: 1
              Filter:
                Prefix: ''
              DeleteMarkerReplication:
                Status: Disabled
              Destination:
                Bucket: !Sub "arn:${AWS::Partition}:s3:::${ProjectName}-code-repo-${AWS::AccountId}-${Environment}-dr"
                StorageClass: STANDARD
        - !Ref AWS::NoValue
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        DestinationBucketName: !Ref LoggingBucket
        LogFilePrefix: code-repo-logs/
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-code-repo-${Environment}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Neptune Bulk Load Bucket
  NeptuneBulkLoadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-neptune-load-${AWS::AccountId}-${Environment}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldData
            Status: Enabled
            ExpirationInDays: 7
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-neptune-load-${Environment}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Logging Bucket
  LoggingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-logs-${AWS::AccountId}-${Environment}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: !If [IsProduction, 90, 30]
          - Id: TransitionToGlacier
            Status: !If [IsProduction, Enabled, Disabled]
            Transitions:
              - TransitionInDays: 60
                StorageClass: GLACIER
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-logs-${Environment}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Logging Bucket Policy (allow S3 to write logs)
  LoggingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LoggingBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: S3ServerAccessLogsPolicy
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action:
              - s3:PutObject
            Resource: !Sub "${LoggingBucket.Arn}/*"
            Condition:
              StringEquals:
                "aws:SourceAccount": !Ref AWS::AccountId

  # Backup Bucket (for production only)
  BackupBucket:
    Type: AWS::S3::Bucket
    Condition: IsProduction
    Properties:
      BucketName: !Sub "${ProjectName}-backups-${AWS::AccountId}-${Environment}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: GLACIER
              - TransitionInDays: 90
                StorageClass: DEEP_ARCHIVE
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-backups-${Environment}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ===========================================================================
  # S3 CRR Replication Role (DR-5 / #148, prod only)
  # ===========================================================================
  # IAM role assumed by S3 to replicate ArtifactsBucket and CodeRepositoryBucket
  # to their -dr counterparts in ${SecondaryRegion}. The destination buckets are
  # created by deploy/cloudformation/s3-replica.yaml deployed in the secondary
  # region (manual deploy until DR-7 / #150 lands an orchestration pipeline).
  S3ReplicationRole:
    Type: AWS::IAM::Role
    Condition: IsProduction
    Properties:
      RoleName: !Sub "${ProjectName}-s3-replication-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        # Source ARNs constructed by name pattern (not !GetAtt) to avoid the
        # circular dependency: the bucket's ReplicationConfiguration.Role
        # references this role, so this role cannot reference the bucket via
        # GetAtt without forming a cycle. S3 ARNs are region-less so the
        # constructed pattern matches exactly what !GetAtt would yield.
        - PolicyName: ReplicationSourceRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetReplicationConfiguration, s3:ListBucket]
                Resource:
                  - !Sub "arn:${AWS::Partition}:s3:::${ProjectName}-artifacts-${AWS::AccountId}-${Environment}"
                  - !Sub "arn:${AWS::Partition}:s3:::${ProjectName}-code-repo-${AWS::AccountId}-${Environment}"
              - Effect: Allow
                Action:
                  - s3:GetObjectVersionForReplication
                  - s3:GetObjectVersionAcl
                  - s3:GetObjectVersionTagging
                Resource:
                  - !Sub "arn:${AWS::Partition}:s3:::${ProjectName}-artifacts-${AWS::AccountId}-${Environment}/*"
                  - !Sub "arn:${AWS::Partition}:s3:::${ProjectName}-code-repo-${AWS::AccountId}-${Environment}/*"
        - PolicyName: ReplicationDestinationWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ReplicateObject
                  - s3:ReplicateDelete
                  - s3:ReplicateTags
                Resource:
                  - !Sub "arn:${AWS::Partition}:s3:::${ProjectName}-artifacts-${AWS::AccountId}-${Environment}-dr/*"
                  - !Sub "arn:${AWS::Partition}:s3:::${ProjectName}-code-repo-${AWS::AccountId}-${Environment}-dr/*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ReplicationDestinationRegion
          Value: !Ref SecondaryRegion

Outputs:
  ArtifactsBucketName:
    Description: Artifacts bucket name
    Value: !Ref ArtifactsBucket
    Export:
      Name: !Sub "${AWS::StackName}-ArtifactsBucketName"

  ArtifactsBucketArn:
    Description: Artifacts bucket ARN
    Value: !GetAtt ArtifactsBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ArtifactsBucketArn"

  CodeRepositoryBucketName:
    Description: Code repository bucket name
    Value: !Ref CodeRepositoryBucket
    Export:
      Name: !Sub "${AWS::StackName}-CodeRepositoryBucketName"

  NeptuneBulkLoadBucketName:
    Description: Neptune bulk load bucket name
    Value: !Ref NeptuneBulkLoadBucket
    Export:
      Name: !Sub "${AWS::StackName}-NeptuneBulkLoadBucketName"

  LoggingBucketName:
    Description: Logging bucket name
    Value: !Ref LoggingBucket
    Export:
      Name: !Sub "${AWS::StackName}-LoggingBucketName"

  BackupBucketName:
    Description: Backup bucket name
    Condition: IsProduction
    Value: !Ref BackupBucket
    Export:
      Name: !Sub "${AWS::StackName}-BackupBucketName"
