# Project Aura - dnsmasq Development Configuration
#
# Purpose: Development environment DNS configuration with enhanced debugging
# Environment: Development
# Last Updated: 2025-11-12
#
# Features enabled for development:
#   - Verbose query logging
#   - Lower cache size (faster cache invalidation)
#   - Permissive security settings for testing
#   - Mock service endpoints for local development

# ============================================================================
# CORE DNS SETTINGS
# ============================================================================

# Do not read system DNS configuration
no-resolv
no-hosts

# Listen on all interfaces
listen-address=0.0.0.0
bind-interfaces

# DNS port (use 5353 to avoid conflicts with system DNS)
port=5353

# Smaller cache for development (1000 entries)
cache-size=1000

# Short negative caching TTL (5 minutes for faster iteration)
neg-ttl=300

# Verbose logging for debugging
log-queries
log-facility=/var/log/dnsmasq/dnsmasq.log
log-async=10

# ============================================================================
# UPSTREAM DNS SERVERS
# ============================================================================

# AWS VPC DNS resolver (if running in AWS)
# server=10.0.0.2

# Cloudflare DNS (primary for development)
server=1.1.1.1
server=1.0.0.1

# Google DNS (fallback)
server=8.8.8.8

# ============================================================================
# CUSTOM DOMAIN RESOLUTION (.aura.local)
# ============================================================================

# Local domain for Project Aura services
local=/aura.local/
domain=aura.local
expand-hosts

# Development-specific domain
local=/aura.dev/
domain=aura.dev

# ============================================================================
# SERVICE DISCOVERY - DEVELOPMENT MOCK ENDPOINTS
# ============================================================================
# Mock endpoints for local development without AWS infrastructure

# Mock Neptune (point to local graph DB or simulator)
address=/neptune.aura.local/127.0.0.1
address=/neptune-reader.aura.local/127.0.0.1

# Mock OpenSearch (point to local Elasticsearch)
address=/opensearch.aura.local/127.0.0.1

# Mock services (all point to localhost for local dev)
address=/context-retrieval.aura.local/127.0.0.1
address=/bedrock-llm.aura.local/127.0.0.1
address=/orchestrator.aura.local/127.0.0.1
address=/ast-parser.aura.local/127.0.0.1
address=/monitoring.aura.local/127.0.0.1

# Frontend (local development server)
address=/api.aura.local/127.0.0.1
address=/frontend.aura.local/127.0.0.1

# Development aliases
address=/localhost.aura.local/127.0.0.1
address=/dev.aura.local/127.0.0.1

# ============================================================================
# CONDITIONAL FORWARDING
# ============================================================================

# Forward Kubernetes DNS (if using local Kubernetes)
# server=/cluster.local/10.100.0.10

# Forward AWS service queries to real AWS DNS (if needed)
# server=/amazonaws.com/1.1.1.1

# ============================================================================
# SECURITY SETTINGS (Enabled for dev/prod parity)
# ============================================================================

# Enable DNSSEC validation (same as production for parity)
dnssec
dnssec-check-unsigned
trust-anchor=.,20326,8,2,E06D44B80B8F1D39A95C0B0D7C65D08458E880409BBC683457104237C7F8EC8D

# Allow DNS rebinding for local development (permissive for localhost testing)
# stop-dns-rebind  # Disabled for local dev convenience

# Allow private IPs from DNS (needed for local services)
# bogus-priv  # Disabled for local development

# ============================================================================
# PERFORMANCE TUNING (Development optimized)
# ============================================================================

# Standard DNS packet size
edns-packet-max=1232

# Query upstream servers sequentially (easier debugging)
# all-servers

# Short timeout for faster failure detection
timeout=2

# Lower concurrent query limit
dns-forward-max=100

# ============================================================================
# DEVELOPMENT HELPERS
# ============================================================================

# Wildcard for development subdomains
address=/dev.aura.local/127.0.0.1
address=/.dev.aura.local/127.0.0.1

# Test domains for development
address=/test1.aura.local/127.0.0.1
address=/test2.aura.local/127.0.0.1
address=/test3.aura.local/127.0.0.1

# Sandbox domains
address=/sandbox-001.aura.local/172.16.0.10
address=/sandbox-002.aura.local/172.16.0.11

# ============================================================================
# MONITORING & HEALTH CHECKS
# ============================================================================

# Health check endpoint
address=/health.aura.local/127.0.0.1

# Status endpoint for development monitoring
address=/status.aura.local/127.0.0.1

# ============================================================================
# DEBUGGING OPTIONS
# ============================================================================

# Log all queries (HIGH VERBOSITY - disable if too noisy)
log-queries

# Log DHCP (if testing DHCP features)
# log-dhcp

# Query trace for debugging specific issues
# log-debug

# ============================================================================
# NOTES FOR DEVELOPERS
# ============================================================================

# To test this configuration locally:
# 1. Install dnsmasq: brew install dnsmasq (macOS) or apt install dnsmasq (Linux)
# 2. Copy this file to /usr/local/etc/dnsmasq.conf (macOS) or /etc/dnsmasq.conf (Linux)
# 3. Start dnsmasq: sudo brew services start dnsmasq (macOS) or sudo systemctl start dnsmasq (Linux)
# 4. Test DNS resolution: nslookup -port=5353 neptune.aura.local 127.0.0.1
# 5. View logs: tail -f /var/log/dnsmasq/dnsmasq.log

# To use this DNS server for all queries:
# - macOS: System Preferences > Network > Advanced > DNS > Add 127.0.0.1
# - Linux: Edit /etc/resolv.conf > Add nameserver 127.0.0.1

# To test specific queries:
# dig @127.0.0.1 -p 5353 neptune.aura.local
# nslookup -port=5353 opensearch.aura.local 127.0.0.1
