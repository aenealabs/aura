apiVersion: v2
name: aura
description: Project Aura - Autonomous AI SaaS Platform for Enterprise Code Intelligence
type: application
version: 1.0.0
appVersion: "1.3.0"
home: https://aenealabs.com
icon: https://aenealabs.com/logo.png
sources:
  - https://github.com/aenealabs/aura
maintainers:
  - name: Aenea Labs
    email: support@aenealabs.com
keywords:
  - ai
  - code-intelligence
  - graphrag
  - security
  - autonomous-agents
  - llm
annotations:
  category: AI/ML
  licenses: Apache-2.0
kubeVersion: ">=1.25.0-0"
dependencies:
  - name: neo4j
    version: "5.x.x"
    repository: "https://helm.neo4j.com/neo4j"
    condition: databases.graph.neo4j.enabled
  - name: opensearch
    version: "2.x.x"
    repository: "https://opensearch-project.github.io/helm-charts"
    condition: databases.vector.opensearch.enabled
  - name: postgresql
    version: "13.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: databases.document.postgres.enabled
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: minio
    version: "5.x.x"
    repository: "https://charts.min.io/"
    condition: storage.minio.enabled
