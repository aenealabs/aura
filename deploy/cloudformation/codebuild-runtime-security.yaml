AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Runtime Security Layer CodeBuild Project (Layer 8.6-8.9: ADR-083 Interceptor, Discovery, Baselines, Correlation)'

Metadata:
  Version: '1.0'
  LastUpdated: '2026-02-19'
  Layer: 8
  LayerName: Security/RuntimeSecurity
  Purpose: |
    Sub-layer of Layer 8 for ADR-083 Runtime Agent Security Platform.
    Deploys interceptor tables/buckets, discovery EventBridge rules,
    behavioral baseline tables/alarms, and correlation service resources.
  Dependencies:
    - Layer 1 (Foundation) - VPC and networking
    - Layer 2 (Data) - Neptune, OpenSearch
    - Layer 8 (Security) - Existing runtime security stacks (ADR-077)
  Deploys:
    - aura-runtime-security-interceptor-{env} - DynamoDB, S3, IAM for traffic capture
    - aura-runtime-security-discovery-{env} - EventBridge, SNS for agent discovery
    - aura-runtime-security-baselines-{env} - DynamoDB, CloudWatch for baselines
    - aura-runtime-security-correlation-{env} - DynamoDB, IAM, SNS for correlation

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

  GitHubRepository:
    Type: String
    Default: https://github.com/aenealabs/aura
    Description: GitHub repository URL

  GitHubBranch:
    Type: String
    Default: main
    AllowedValues: [main, develop]
    Description: GitHub branch to build from

Resources:
  # S3 Bucket for Runtime Security Artifacts
  RuntimeSecurityArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-runtime-sec-artifacts-${AWS::AccountId}-${Environment}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldArtifacts
            Status: Enabled
            ExpirationInDays: 90
            NoncurrentVersionExpirationInDays: 30
          - Id: TransitionToIntelligentTiering
            Status: Enabled
            Transitions:
              - TransitionInDays: 0
                StorageClass: INTELLIGENT_TIERING
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: runtime-security

  # CloudWatch Log Group for Runtime Security Builds
  RuntimeSecurityBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${ProjectName}-runtime-security-deploy-${Environment}'
      RetentionInDays: 90

  # IAM Role for Runtime Security CodeBuild
  RuntimeSecurityCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-runtime-sec-codebuild-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/ReadOnlyAccess'
      Policies:
        - PolicyName: RuntimeSecurityDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudWatch Logs for CodeBuild
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents, logs:PutRetentionPolicy]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-runtime-security-*:*'

              # CloudWatch Metrics
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: 'Aura/CICD/RuntimeSecurity'

              # S3 - Artifacts bucket
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket]
                Resource:
                  - !GetAtt RuntimeSecurityArtifactsBucket.Arn
                  - !Sub '${RuntimeSecurityArtifactsBucket.Arn}/*'

              # CloudFormation - Runtime security stacks only
              - Effect: Allow
                Action: [cloudformation:CreateStack, cloudformation:UpdateStack, cloudformation:DeleteStack, cloudformation:CreateChangeSet, cloudformation:ExecuteChangeSet, cloudformation:DeleteChangeSet, cloudformation:DescribeChangeSet, cloudformation:DescribeStacks, cloudformation:DescribeStackEvents, cloudformation:DescribeStackResources, cloudformation:GetTemplate, cloudformation:ValidateTemplate, cloudformation:GetTemplateSummary]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-runtime-security-interceptor-${Environment}/*'
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-runtime-security-discovery-${Environment}/*'
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-runtime-security-baselines-${Environment}/*'
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-runtime-security-correlation-${Environment}/*'

              # DynamoDB - Runtime security tables
              - Effect: Allow
                Action: [dynamodb:CreateTable, dynamodb:DeleteTable, dynamodb:DescribeTable, dynamodb:UpdateTable, dynamodb:UpdateTimeToLive, dynamodb:DescribeTimeToLive, dynamodb:UpdateContinuousBackups, dynamodb:DescribeContinuousBackups, dynamodb:TagResource, dynamodb:UntagResource, dynamodb:ListTagsOfResource]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-traffic-events-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-behavioral-profiles-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-drift-alerts-083-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-correlation-results-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-remediation-plans-${Environment}'

              # S3 - Traffic payloads bucket
              - Effect: Allow
                Action: [s3:CreateBucket, s3:DeleteBucket, s3:PutBucketPolicy, s3:DeleteBucketPolicy, s3:GetBucketPolicy, s3:PutBucketVersioning, s3:GetBucketVersioning, s3:PutEncryptionConfiguration, s3:GetEncryptionConfiguration, s3:PutLifecycleConfiguration, s3:GetLifecycleConfiguration, s3:PutBucketPublicAccessBlock, s3:GetBucketPublicAccessBlock, s3:PutBucketTagging, s3:GetBucketTagging, s3:GetBucketAcl, s3:ListBucket]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-traffic-payloads-${AWS::AccountId}-${Environment}'

              # SNS - Alert topics
              - Effect: Allow
                Action: [sns:CreateTopic, sns:DeleteTopic, sns:Subscribe, sns:Unsubscribe, sns:SetTopicAttributes, sns:GetTopicAttributes, sns:TagResource, sns:UntagResource, sns:AddPermission, sns:RemovePermission]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:${ProjectName}-shadow-agent-alerts-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:${ProjectName}-discovery-alerts-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:${ProjectName}-behavioral-drift-alerts-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:${ProjectName}-remediation-alerts-${Environment}'

              # EventBridge - Runtime security rules
              - Effect: Allow
                Action: [events:PutRule, events:DeleteRule, events:DescribeRule, events:EnableRule, events:DisableRule, events:PutTargets, events:RemoveTargets, events:ListTargetsByRule, events:TagResource, events:UntagResource]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/${ProjectName}-shadow-agent-*'
                  - !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/${ProjectName}-topology-*'
                  - !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/${ProjectName}-correlation-*'

              # CloudWatch Alarms
              - Effect: Allow
                Action: [cloudwatch:PutMetricAlarm, cloudwatch:DeleteAlarms, cloudwatch:DescribeAlarms, cloudwatch:EnableAlarmActions, cloudwatch:DisableAlarmActions, cloudwatch:TagResource, cloudwatch:UntagResource]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${ProjectName}-shadow-agents-*'
                  - !Sub 'arn:${AWS::Partition}:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${ProjectName}-critical-behavioral-*'
                  - !Sub 'arn:${AWS::Partition}:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${ProjectName}-high-drift-*'
                  - !Sub 'arn:${AWS::Partition}:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${ProjectName}-low-correlation-*'

              # IAM Role Management - Service roles
              - Effect: Allow
                Action: [iam:CreateRole, iam:DeleteRole, iam:GetRole, iam:PutRolePolicy, iam:DeleteRolePolicy, iam:GetRolePolicy, iam:AttachRolePolicy, iam:DetachRolePolicy, iam:TagRole, iam:UntagRole]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-interceptor-service-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-discovery-service-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-correlation-service-${Environment}'

              # IAM Pass Role
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-interceptor-service-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-discovery-service-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-correlation-service-${Environment}'
                Condition:
                  StringEquals:
                    iam:PassedToService: [ecs-tasks.amazonaws.com, lambda.amazonaws.com, states.amazonaws.com]

              # KMS - Key management for interceptor encryption
              - Effect: Allow
                Action: kms:CreateKey
                Resource: '*'
                Condition:
                  StringEquals:
                    'kms:CallerAccount': !Ref AWS::AccountId

              - Effect: Allow
                Action: [kms:DescribeKey, kms:GetKeyPolicy, kms:PutKeyPolicy, kms:EnableKeyRotation, kms:ScheduleKeyDeletion, kms:CancelKeyDeletion, kms:TagResource, kms:UntagResource, kms:ListResourceTags, kms:CreateGrant, kms:ListGrants, kms:Encrypt, kms:Decrypt, kms:GenerateDataKey]
                Resource: !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*'
                Condition:
                  StringEquals:
                    'kms:CallerAccount': !Ref AWS::AccountId

              - Effect: Allow
                Action: [kms:CreateAlias, kms:DeleteAlias, kms:UpdateAlias]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/${ProjectName}-interceptor-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*'

              # CodeConnections (for GitHub source access)
              - Effect: Allow
                Action: [codeconnections:UseConnection, codeconnections:GetConnectionToken]
                Resource:
                  - '{{resolve:ssm:/aura/global/codeconnections-arn}}'

  # CodeBuild Project
  RuntimeSecurityCodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-runtime-security-deploy-${Environment}'
      Description: 'Project Aura - Runtime Security Layer (ADR-083: Interceptor, Discovery, Baselines, Correlation)'
      ServiceRole: !GetAtt RuntimeSecurityCodeBuildRole.Arn
      Artifacts:
        Type: S3
        Location: !Ref RuntimeSecurityArtifactsBucket
        Name: runtime-security-artifacts
        Packaging: ZIP
        EncryptionDisabled: false
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: LAYER
            Value: runtime-security
      Source:
        Type: GITHUB
        Location: !Ref GitHubRepository
        BuildSpec: deploy/buildspecs/buildspec-runtime-security.yml
        GitCloneDepth: 1
        ReportBuildStatus: true
        Auth:
          Type: CODECONNECTIONS
          Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'
      SourceVersion: !Sub 'refs/heads/${GitHubBranch}'
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref RuntimeSecurityBuildLogGroup
        S3Logs:
          Status: DISABLED
      Cache:
        Type: LOCAL
        Modes:
          - LOCAL_SOURCE_CACHE
      TimeoutInMinutes: 30
      QueuedTimeoutInMinutes: 480
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: runtime-security
        - Key: ADR
          Value: ADR-083

  # CloudWatch Alarm - Build Failures
  RuntimeSecurityBuildFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-runtime-security-build-failures-${Environment}'
      AlarmDescription: 'Alert when Runtime Security Layer has 2+ failures in 1 hour'
      MetricName: FailedBuilds
      Namespace: AWS/CodeBuild
      Dimensions:
        - Name: ProjectName
          Value: !Ref RuntimeSecurityCodeBuildProject
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 2
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  RuntimeSecurityCodeBuildProjectName:
    Description: Runtime Security Layer CodeBuild project name
    Value: !Ref RuntimeSecurityCodeBuildProject
    Export:
      Name: !Sub '${AWS::StackName}-ProjectName'

  RuntimeSecurityCodeBuildProjectArn:
    Description: Runtime Security Layer CodeBuild project ARN
    Value: !GetAtt RuntimeSecurityCodeBuildProject.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ProjectArn'

  RuntimeSecurityArtifactsBucketName:
    Description: Runtime Security artifacts bucket name
    Value: !Ref RuntimeSecurityArtifactsBucket
    Export:
      Name: !Sub '${AWS::StackName}-ArtifactsBucket'

  DeployedStacks:
    Description: Stacks deployed by this CodeBuild project
    Value: !Sub '${ProjectName}-runtime-security-interceptor-${Environment}, ${ProjectName}-runtime-security-discovery-${Environment}, ${ProjectName}-runtime-security-baselines-${Environment}, ${ProjectName}-runtime-security-correlation-${Environment}'
