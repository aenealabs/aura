AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Layer 5.1 - Secrets Manager (Credentials Store)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

  NeptuneEndpoint:
    Type: String
    Description: Neptune cluster endpoint

  OpenSearchEndpoint:
    Type: String
    Description: OpenSearch domain endpoint

  SecondaryRegion:
    Type: String
    Default: us-west-2
    Description: |
      Secondary AWS region for Tier 1 secret replication (DR-6 / #149).
      Native Secrets Manager replicas are created in this region for
      production environments only. Replicas use the region's
      AWS-managed default key (aws/secretsmanager) consistent with the
      primary-region encryption setup; per-region customer-managed
      CMKs are tracked as a separate hardening pass.

Conditions:
  # DR-6 (#149): replicate Tier 1 secrets to the secondary region in
  # production only. dev/qa environments do not have RTO commitments
  # and would pay $0.40/secret/month for unused replicas otherwise.
  IsProduction: !Equals [!Ref Environment, prod]

Resources:
  # Bedrock Configuration Secret
  BedrockConfigSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/bedrock-config'
      Description: Bedrock API configuration
      # DR-6 (#149): Tier 1 -- replicate to secondary region in prod.
      ReplicaRegions: !If
        - IsProduction
        - - Region: !Ref SecondaryRegion
        - !Ref AWS::NoValue
      SecretString: !Sub |
        {
          "region": "${AWS::Region}",
          "model_id": "anthropic.claude-3-sonnet-20240229-v1:0",
          "max_tokens": 4096,
          "temperature": 0.7,
          "timeout": 300
        }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Neptune Connection Secret
  NeptuneConnectionSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/neptune-connection'
      Description: Neptune graph database connection details
      SecretString: !Sub |
        {
          "host": "${NeptuneEndpoint}",
          "port": 8182,
          "ssl": true,
          "connection_timeout": 30000,
          "max_retries": 3
        }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # OpenSearch Connection Secret
  OpenSearchConnectionSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/opensearch-connection'
      Description: OpenSearch connection details and credentials
      SecretString: !Sub |
        {
          "host": "${OpenSearchEndpoint}",
          "port": 443,
          "username": "admin",
          "password": "${GeneratePassword}",
          "use_ssl": true,
          "verify_certs": true
        }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # OpenSearch Password (separate for easier rotation)
  OpenSearchPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/opensearch'
      Description: OpenSearch admin password
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
        RequireEachIncludedType: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # API Keys Secret
  APIKeysSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/api-keys'
      Description: API keys for external integrations
      # DR-6 (#149): Tier 1 -- external API keys must be available
      # in the secondary region for the failover Lambdas to function.
      ReplicaRegions: !If
        - IsProduction
        - - Region: !Ref SecondaryRegion
        - !Ref AWS::NoValue
      SecretString: !Sub |
        {
          "github_token": "REPLACE_ME",
          "gitlab_token": "REPLACE_ME",
          "slack_webhook": "REPLACE_ME"
        }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Database Encryption Key Secret
  DBEncryptionKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/db-encryption-key'
      Description: Encryption key for sensitive database fields
      # DR-6 (#149): Tier 1 -- DB field encryption key must match
      # across regions; otherwise replicated DynamoDB rows in the
      # secondary region cannot be decrypted post-failover.
      ReplicaRegions: !If
        - IsProduction
        - - Region: !Ref SecondaryRegion
        - !Ref AWS::NoValue
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: key
        PasswordLength: 64
        ExcludeCharacters: ''
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # JWT Secret
  JWTSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/jwt-secret'
      Description: JWT signing secret
      # DR-6 (#149): Tier 1 -- JWT signing secret must be the same
      # cross-region or in-flight tokens issued in primary will be
      # rejected after secondary takes over auth.
      ReplicaRegions: !If
        - IsProduction
        - - Region: !Ref SecondaryRegion
        - !Ref AWS::NoValue
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: secret
        PasswordLength: 64
        ExcludeCharacters: ''
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Secret Rotation Lambda Role
  SecretRotationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-secret-rotation-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerRotation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecretVersionStage
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Custom Resource to Generate Random Password
  GeneratePassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/opensearch-init-password'
      GenerateSecretString:
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
        RequireEachIncludedType: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

Outputs:
  BedrockConfigSecretArn:
    Description: Bedrock configuration secret ARN
    Value: !Ref BedrockConfigSecret
    Export:
      Name: !Sub '${AWS::StackName}-BedrockConfigSecretArn'

  NeptuneConnectionSecretArn:
    Description: Neptune connection secret ARN
    Value: !Ref NeptuneConnectionSecret
    Export:
      Name: !Sub '${AWS::StackName}-NeptuneConnectionSecretArn'

  OpenSearchConnectionSecretArn:
    Description: OpenSearch connection secret ARN
    Value: !Ref OpenSearchConnectionSecret
    Export:
      Name: !Sub '${AWS::StackName}-OpenSearchConnectionSecretArn'

  OpenSearchPasswordSecretArn:
    Description: OpenSearch password secret ARN
    Value: !Ref OpenSearchPasswordSecret
    Export:
      Name: !Sub '${AWS::StackName}-OpenSearchPasswordSecretArn'

  APIKeysSecretArn:
    Description: API keys secret ARN
    Value: !Ref APIKeysSecret
    Export:
      Name: !Sub '${AWS::StackName}-APIKeysSecretArn'

  DBEncryptionKeySecretArn:
    Description: Database encryption key secret ARN
    Value: !Ref DBEncryptionKeySecret
    Export:
      Name: !Sub '${AWS::StackName}-DBEncryptionKeySecretArn'

  JWTSecretArn:
    Description: JWT secret ARN
    Value: !Ref JWTSecret
    Export:
      Name: !Sub '${AWS::StackName}-JWTSecretArn'
