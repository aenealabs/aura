# Project Aura - Agent Orchestrator Kustomization (Base)
# Base configuration for the multi-agent orchestrator service
#
# This base provides environment-agnostic resources.
# Use overlays (dev/qa/prod) to set environment-specific values.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: aura-agent-orchestrator-base

namespace: default

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - rbac.yaml

labels:
  - pairs:
      app.kubernetes.io/name: aura-agent-orchestrator
      app.kubernetes.io/component: agents
      app.kubernetes.io/part-of: aura
    includeSelectors: false
    includeTemplates: true
