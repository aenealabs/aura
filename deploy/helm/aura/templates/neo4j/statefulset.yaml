{{- if and (include "aura.isSelfHosted" .) .Values.databases.graph.neo4j.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "aura.fullname" . }}-neo4j
  labels:
    {{- include "aura.componentLabels" (dict "component" "neo4j" "context" .) | nindent 4 }}
spec:
  serviceName: {{ include "aura.fullname" . }}-neo4j
  replicas: 1
  selector:
    matchLabels:
      {{- include "aura.componentSelectorLabels" (dict "component" "neo4j" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aura.componentSelectorLabels" (dict "component" "neo4j" "context" .) | nindent 8 }}
    spec:
      {{- include "aura.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "aura.serviceAccountName" . }}
      securityContext:
        fsGroup: 7474
        runAsNonRoot: true
        runAsUser: 7474
        runAsGroup: 7474
      containers:
        - name: neo4j
          image: neo4j:{{ .Values.databases.graph.neo4j.edition }}-5
          imagePullPolicy: {{ include "aura.imagePullPolicy" . }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 7474
              protocol: TCP
            - name: https
              containerPort: {{ .Values.databases.graph.neo4j.tls.httpsPort }}
              protocol: TCP
            - name: bolt
              containerPort: {{ .Values.databases.graph.neo4j.tls.boltPort }}
              protocol: TCP
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databases.graph.neo4j.existingPasswordSecret | default (printf "%s-neo4j" (include "aura.fullname" .)) }}
                  key: {{ .Values.databases.graph.neo4j.existingPasswordSecretKey | default "neo4j-password" }}
            - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
              value: "yes"
            - name: NEO4J_dbms_memory_heap_initial__size
              value: "1G"
            - name: NEO4J_dbms_memory_heap_max__size
              value: "2G"
            - name: NEO4J_dbms_memory_pagecache_size
              value: "1G"
            {{- if .Values.databases.graph.neo4j.tls.enabled }}
            - name: NEO4J_dbms_ssl_policy_bolt_enabled
              value: "true"
            - name: NEO4J_dbms_ssl_policy_bolt_base__directory
              value: "/var/lib/neo4j/certificates/bolt"
            - name: NEO4J_dbms_ssl_policy_bolt_private__key
              value: "tls.key"
            - name: NEO4J_dbms_ssl_policy_bolt_public__certificate
              value: "tls.crt"
            - name: NEO4J_dbms_ssl_policy_https_enabled
              value: "true"
            - name: NEO4J_dbms_ssl_policy_https_base__directory
              value: "/var/lib/neo4j/certificates/https"
            - name: NEO4J_dbms_ssl_policy_https_private__key
              value: "tls.key"
            - name: NEO4J_dbms_ssl_policy_https_public__certificate
              value: "tls.crt"
            - name: NEO4J_dbms_connector_bolt_tls__level
              value: "REQUIRED"
            - name: NEO4J_dbms_connector_https_enabled
              value: "true"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ if .Values.databases.graph.neo4j.tls.enabled }}https{{ else }}http{{ end }}
              scheme: {{ if .Values.databases.graph.neo4j.tls.enabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: {{ if .Values.databases.graph.neo4j.tls.enabled }}https{{ else }}http{{ end }}
              scheme: {{ if .Values.databases.graph.neo4j.tls.enabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.databases.graph.neo4j.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
            {{- if .Values.databases.graph.neo4j.tls.enabled }}
            - name: tls-certs
              mountPath: /var/lib/neo4j/certificates/bolt
              readOnly: true
            - name: tls-certs
              mountPath: /var/lib/neo4j/certificates/https
              readOnly: true
            {{- end }}
      volumes:
        - name: logs
          emptyDir: {}
        {{- if .Values.databases.graph.neo4j.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.databases.graph.neo4j.tls.existingSecret | default (printf "%s-neo4j-tls" (include "aura.fullname" .)) }}
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.databases.graph.neo4j.persistence.accessMode }}
        {{- if .Values.databases.graph.neo4j.persistence.storageClass }}
        storageClassName: {{ .Values.databases.graph.neo4j.persistence.storageClass }}
        {{- else if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.databases.graph.neo4j.persistence.size }}
{{- end }}
