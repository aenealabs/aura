version: 0.2

# Serverless Sublayer: Documentation Agent Infrastructure (ADR-056)
# Cloud Discovery (IAM roles, DynamoDB cache) and Calibration Pipeline (DynamoDB, Lambda, S3)
# Environment variables (ENVIRONMENT, PROJECT_NAME, AWS_ACCOUNT_ID, AWS_DEFAULT_REGION)
# are provided by CodeBuild project from CloudFormation parameters

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing build dependencies..."
      - pip3 install cfn-lint

  pre_build:
    commands:
      - echo "=========================================="
      - echo "Serverless Sublayer - Documentation Agent (ADR-056)"
      - echo "=========================================="
      - echo "Environment $ENVIRONMENT | Project $PROJECT_NAME | Region $AWS_DEFAULT_REGION"

      - echo "Retrieving KMS key from Foundation layer..."
      - export KMS_KEY_ARN=$(aws cloudformation describe-stacks --stack-name ${PROJECT_NAME}-kms-${ENVIRONMENT} --query 'Stacks[0].Outputs[?OutputKey==`DataKMSKeyArn`].OutputValue' --output text --region $AWS_DEFAULT_REGION 2>/dev/null || echo "")
      - |
        if [ -z "$KMS_KEY_ARN" ] || [ "$KMS_KEY_ARN" = "None" ]; then
          echo "WARNING: KMS key not found, cloud-discovery will be skipped"
          export SKIP_CLOUD_DISCOVERY=true
        else
          echo "KMS Key ARN = $KMS_KEY_ARN"
          export SKIP_CLOUD_DISCOVERY=false
        fi

      - echo "Validating templates..."
      - cfn-lint deploy/cloudformation/cloud-discovery.yaml --ignore-checks W3002,W1020 || echo "cfn-lint warnings (non-blocking)"
      - cfn-lint deploy/cloudformation/calibration-pipeline.yaml --ignore-checks W3002,W1020 || echo "cfn-lint warnings (non-blocking)"
      - echo "Template validation complete"
      - DEPLOY_TIMESTAMP=$(date +%Y%m%d-%H%M%S)
      - echo "Deploy Timestamp = $DEPLOY_TIMESTAMP"

  build:
    commands:
      - echo "=== Deploying Documentation Agent Infrastructure ==="

      - echo "Deploying Cloud Discovery Infrastructure..."
      - |
        if [ "$SKIP_CLOUD_DISCOVERY" = "true" ]; then
          echo "Skipping cloud-discovery deployment (KMS key not available)"
        else
          aws cloudformation deploy \
            --stack-name ${PROJECT_NAME}-cloud-discovery-${ENVIRONMENT} \
            --template-file deploy/cloudformation/cloud-discovery.yaml \
            --parameter-overrides \
              Environment=$ENVIRONMENT \
              ProjectName=$PROJECT_NAME \
              KMSKeyArn=$KMS_KEY_ARN \
            --capabilities CAPABILITY_NAMED_IAM \
            --tags Project=$PROJECT_NAME Environment=$ENVIRONMENT Layer=serverless ADR=ADR-056 DeployTimestamp=$DEPLOY_TIMESTAMP \
            --no-fail-on-empty-changeset \
            --region $AWS_DEFAULT_REGION
          echo "Cloud Discovery deployment complete"
        fi

      - echo "Deploying Calibration Pipeline..."
      - aws cloudformation deploy --stack-name ${PROJECT_NAME}-calibration-pipeline-${ENVIRONMENT} --template-file deploy/cloudformation/calibration-pipeline.yaml --parameter-overrides Environment=$ENVIRONMENT ProjectName=$PROJECT_NAME --capabilities CAPABILITY_NAMED_IAM --tags Project=$PROJECT_NAME Environment=$ENVIRONMENT Layer=serverless ADR=ADR-056 DeployTimestamp=$DEPLOY_TIMESTAMP --no-fail-on-empty-changeset --region $AWS_DEFAULT_REGION
      - echo "Calibration Pipeline deployment complete"

  post_build:
    commands:
      - echo "=========================================="
      - echo "Documentation Agent Deployment Complete"
      - echo "=========================================="

      - echo "=== Cloud Discovery Stack Outputs ==="
      - aws cloudformation describe-stacks --stack-name ${PROJECT_NAME}-cloud-discovery-${ENVIRONMENT} --query 'Stacks[0].Outputs' --region $AWS_DEFAULT_REGION --output table 2>/dev/null || echo "Stack not available"

      - echo "=== Calibration Pipeline Stack Outputs ==="
      - aws cloudformation describe-stacks --stack-name ${PROJECT_NAME}-calibration-pipeline-${ENVIRONMENT} --query 'Stacks[0].Outputs' --region $AWS_DEFAULT_REGION --output table 2>/dev/null || echo "Stack not available"

      - echo "=== Calibration DynamoDB Table ==="
      - aws dynamodb describe-table --table-name ${PROJECT_NAME}-documentation-feedback-${ENVIRONMENT} --query 'Table.{Name:TableName,Status:TableStatus,ItemCount:ItemCount}' --output table --region $AWS_DEFAULT_REGION 2>/dev/null || echo "Table not available"

      - echo "=== Calibration Lambda ==="
      - aws lambda get-function --function-name ${PROJECT_NAME}-calibration-runner-${ENVIRONMENT} --query 'Configuration.{Name:FunctionName,Runtime:Runtime,Memory:MemorySize,Timeout:Timeout}' --output table --region $AWS_DEFAULT_REGION 2>/dev/null || echo "Lambda not available"

      - echo "Publishing build metrics..."
      - aws cloudwatch put-metric-data --namespace "Aura/CICD/Serverless" --metric-name "DocumentationDeployments" --value 1 --unit Count --dimensions Environment=$ENVIRONMENT --region $AWS_DEFAULT_REGION || echo "Failed to publish metrics"

artifacts:
  files:
    - deploy/cloudformation/cloud-discovery.yaml
    - deploy/cloudformation/calibration-pipeline.yaml
  name: documentation-infrastructure-artifacts
  discard-paths: no

cache:
  paths:
    - '/root/.cache/pip/**/*'
