        Fn::ImportValue: !Sub ${ClusterStackName}-TaskExecutionRoleArn
      TaskRoleArn:
        Fn::ImportValue: !Sub ${ClusterStackName}-TaskRoleArn
      ContainerDefinitions:
        - Name: reviewer-agent
          Image: !Sub ${ECRRepositoryURI}/reviewer-agent:${ImageTag}
          Essential: true
          PortMappings:
