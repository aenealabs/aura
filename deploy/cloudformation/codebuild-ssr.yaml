AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - SSR Training CodeBuild Project (Layer 7.2-7.3: Self-Play SWE-RL Infrastructure)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - qa
      - prod
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

  GitHubRepository:
    Type: String
    Default: https://github.com/aenealabs/aura
    Description: GitHub repository URL

  GitHubBranch:
    Type: String
    Default: main
    AllowedValues:
      - main
      - develop
    Description: GitHub branch to build from

Resources:
  # CloudWatch Log Group for SSR Builds
  SSRBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${ProjectName}-ssr-deploy-${Environment}'
      RetentionInDays: 30

  # IAM Role for SSR CodeBuild
  SSRCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-ssr-codebuild-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: SSRDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudWatch Logs - All SSR log group patterns
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents, logs:PutRetentionPolicy, logs:TagResource, logs:UntagResource, logs:DeleteLogGroup]
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-ssr-*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-ssr-*:*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/states/${ProjectName}-ssr-*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/states/${ProjectName}-ssr-*:*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/${ProjectName}/ssr-*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/${ProjectName}/ssr-*:*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aura/ssr-training-${Environment}'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aura/ssr-training-${Environment}:*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${ProjectName}-ssr-*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${ProjectName}-ssr-*:*'

              # CloudWatch Metrics
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: 'Aura/CICD/SSR'

              # CloudWatch Alarms - SSR alarms
              - Effect: Allow
                Action: [cloudwatch:PutMetricAlarm, cloudwatch:DeleteAlarms, cloudwatch:DescribeAlarms, cloudwatch:SetAlarmState, cloudwatch:EnableAlarmActions, cloudwatch:DisableAlarmActions, cloudwatch:TagResource, cloudwatch:UntagResource]
                Resource:
                  - !Sub 'arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${ProjectName}-ssr-*'

              # CloudFormation - SSR stacks only
              - Effect: Allow
                Action: [cloudformation:CreateStack, cloudformation:UpdateStack, cloudformation:DeleteStack, cloudformation:CreateChangeSet, cloudformation:ExecuteChangeSet, cloudformation:DeleteChangeSet, cloudformation:DescribeChangeSet, cloudformation:DescribeStacks, cloudformation:DescribeStackEvents, cloudformation:DescribeStackResources, cloudformation:GetTemplate, cloudformation:ValidateTemplate, cloudformation:GetTemplateSummary]
                Resource:
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-ssr-training-${Environment}/*'
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-ssr-training-pipeline-${Environment}/*'

              # S3 - SSR bucket
              - Effect: Allow
                Action: [s3:CreateBucket, s3:DeleteBucket, s3:PutBucketPolicy, s3:DeleteBucketPolicy, s3:GetBucketPolicy, s3:PutBucketEncryption, s3:GetBucketEncryption, s3:PutEncryptionConfiguration, s3:GetEncryptionConfiguration, s3:PutBucketVersioning, s3:GetBucketVersioning, s3:PutLifecycleConfiguration, s3:GetLifecycleConfiguration, s3:PutBucketPublicAccessBlock, s3:GetBucketPublicAccessBlock, s3:PutBucketTagging, s3:GetBucketTagging, s3:ListBucket, s3:GetObject, s3:PutObject]
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectName}-ssr-training-*-${Environment}'
                  - !Sub 'arn:aws:s3:::${ProjectName}-ssr-training-*-${Environment}/*'

              # DynamoDB - SSR table
              - Effect: Allow
                Action: [dynamodb:CreateTable, dynamodb:DeleteTable, dynamodb:DescribeTable, dynamodb:UpdateTable, dynamodb:UpdateTimeToLive, dynamodb:DescribeTimeToLive, dynamodb:TagResource, dynamodb:UntagResource, dynamodb:DescribeContinuousBackups, dynamodb:UpdateContinuousBackups]
                Resource:
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-ssr-*-${Environment}'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ProjectName}-ssr-*-${Environment}/index/*'

              # KMS - CreateKey with RequestTag condition
              - Effect: Allow
                Action: kms:CreateKey
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:RequestTag/Project: !Ref ProjectName

              # KMS - Management after creation with ResourceTag condition
              - Effect: Allow
                Action: [kms:DescribeKey, kms:GetKeyPolicy, kms:PutKeyPolicy, kms:EnableKeyRotation, kms:GetKeyRotationStatus, kms:ScheduleKeyDeletion, kms:TagResource, kms:UntagResource, kms:CreateGrant, kms:RevokeGrant, kms:Encrypt, kms:Decrypt, kms:GenerateDataKey, kms:GenerateDataKeyWithoutPlaintext]
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/Project: !Ref ProjectName

              # KMS - Alias operations
              - Effect: Allow
                Action: [kms:CreateAlias, kms:DeleteAlias, kms:UpdateAlias]
                Resource:
                  - !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/${ProjectName}-ssr-*'
                  - !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*'

              - Effect: Allow
                Action: kms:ListAliases
                Resource: '*'

              # ECR - SSR repositories
              - Effect: Allow
                Action: [ecr:CreateRepository, ecr:DeleteRepository, ecr:DescribeRepositories, ecr:PutLifecyclePolicy, ecr:GetLifecyclePolicy, ecr:DeleteLifecyclePolicy, ecr:PutImageScanningConfiguration, ecr:PutImageTagMutability, ecr:TagResource, ecr:UntagResource, ecr:ListTagsForResource, ecr:SetRepositoryPolicy, ecr:DeleteRepositoryPolicy, ecr:GetRepositoryPolicy]
                Resource:
                  - !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${ProjectName}-ssr-*'

              # ECS - Cluster operations
              - Effect: Allow
                Action: [ecs:CreateCluster, ecs:DeleteCluster, ecs:DescribeClusters, ecs:UpdateCluster, ecs:TagResource, ecs:UntagResource, ecs:PutClusterCapacityProviders]
                Resource:
                  - !Sub 'arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:cluster/${ProjectName}-ssr-*'

              # ECS - Task definition operations require Resource: '*'
              - Effect: Allow
                Action: [ecs:RegisterTaskDefinition, ecs:DeregisterTaskDefinition, ecs:DescribeTaskDefinition, ecs:ListTaskDefinitions, ecs:TagResource, ecs:UntagResource]
                Resource: '*'

              # Step Functions - State machine operations
              - Effect: Allow
                Action: [states:CreateStateMachine, states:DeleteStateMachine, states:DescribeStateMachine, states:UpdateStateMachine, states:TagResource, states:UntagResource]
                Resource:
                  - !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${ProjectName}-ssr-*'

              # Step Functions - ListStateMachines requires Resource: '*'
              - Effect: Allow
                Action: states:ListStateMachines
                Resource: '*'

              # IAM Role Management
              - Effect: Allow
                Action: [iam:CreateRole, iam:DeleteRole, iam:GetRole, iam:PutRolePolicy, iam:DeleteRolePolicy, iam:GetRolePolicy, iam:AttachRolePolicy, iam:DetachRolePolicy, iam:TagRole, iam:UntagRole, iam:ListAttachedRolePolicies, iam:ListRolePolicies]
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-ssr-*-${Environment}'

              # IAM Pass Role - includes lambda.amazonaws.com for SSRServiceRole
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-ssr-*-${Environment}'
                Condition:
                  StringEquals:
                    iam:PassedToService: [ecs-tasks.amazonaws.com, states.amazonaws.com, lambda.amazonaws.com]

              # SSM Parameter Store
              - Effect: Allow
                Action: [ssm:GetParameter, ssm:GetParameters]
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/*'

              # SNS - Alerts
              - Effect: Allow
                Action: [sns:CreateTopic, sns:DeleteTopic, sns:GetTopicAttributes, sns:SetTopicAttributes, sns:Subscribe, sns:Unsubscribe, sns:TagResource, sns:UntagResource]
                Resource:
                  - !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:${ProjectName}-ssr-*'

              # AWS Budgets - SSR training budget
              - Effect: Allow
                Action: [budgets:CreateBudget, budgets:ModifyBudget, budgets:ViewBudget, budgets:DeleteBudget, budgets:TagResource, budgets:UntagResource]
                Resource:
                  - !Sub 'arn:aws:budgets::${AWS::AccountId}:budget/${ProjectName}-ssr-training-${Environment}'

              # CodeConnections
              - Effect: Allow
                Action: [codeconnections:UseConnection, codeconnections:GetConnectionToken]
                Resource:
                  - '{{resolve:ssm:/aura/global/codeconnections-arn}}'

              # EC2 - Describe operations require Resource: '*' without conditions
              - Effect: Allow
                Action: [ec2:DescribeSecurityGroups, ec2:DescribeVpcs, ec2:DescribeSubnets]
                Resource: '*'

              # EC2 - Security group creation with request tag
              - Effect: Allow
                Action: [ec2:CreateSecurityGroup, ec2:CreateTags]
                Resource:
                  - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*'
                  - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:vpc/*'

              # EC2 - Security group management after creation
              - Effect: Allow
                Action: [ec2:DeleteSecurityGroup, ec2:AuthorizeSecurityGroupIngress, ec2:AuthorizeSecurityGroupEgress, ec2:RevokeSecurityGroupIngress, ec2:RevokeSecurityGroupEgress]
                Resource:
                  - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/Project: !Ref ProjectName

  # CodeBuild Project
  SSRCodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-ssr-deploy-${Environment}'
      Description: 'Project Aura - SSR Training CodeBuild (Layer 7.2-7.3: Self-Play SWE-RL)'
      ServiceRole: !GetAtt SSRCodeBuildRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: LAYER
            Value: ssr-training
      Source:
        Type: GITHUB
        Location: !Ref GitHubRepository
        BuildSpec: deploy/buildspecs/buildspec-ssr.yml
        GitCloneDepth: 1
        ReportBuildStatus: true
        Auth:
          Type: CODECONNECTIONS
          Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'
      SourceVersion: !Sub 'refs/heads/${GitHubBranch}'
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref SSRBuildLogGroup
        S3Logs:
          Status: DISABLED
      Cache:
        Type: LOCAL
        Modes:
          - LOCAL_SOURCE_CACHE
          - LOCAL_CUSTOM_CACHE
      TimeoutInMinutes: 30
      QueuedTimeoutInMinutes: 480
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: ssr-training

  # Build Failure Alarm
  SSRBuildFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-ssr-build-failures-${Environment}'
      AlarmDescription: 'Alert when SSR Training build has 2+ failures in 1 hour'
      MetricName: FailedBuilds
      Namespace: AWS/CodeBuild
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: ProjectName
          Value: !Ref SSRCodeBuildProject
      TreatMissingData: notBreaching

Outputs:
  CodeBuildProjectName:
    Description: SSR CodeBuild Project Name
    Value: !Ref SSRCodeBuildProject
    Export:
      Name: !Sub '${ProjectName}-ssr-codebuild-project-${Environment}'

  CodeBuildProjectArn:
    Description: SSR CodeBuild Project ARN
    Value: !GetAtt SSRCodeBuildProject.Arn
    Export:
      Name: !Sub '${ProjectName}-ssr-codebuild-arn-${Environment}'

  CodeBuildRoleArn:
    Description: IAM Role ARN for SSR CodeBuild
    Value: !GetAtt SSRCodeBuildRole.Arn
    Export:
      Name: !Sub '${ProjectName}-ssr-codebuild-role-arn-${Environment}'
