# Project Aura - dnsmasq Production Configuration
#
# Purpose: Production-grade DNS caching and forwarding for Project Aura platform
# Environment: Production
# Last Updated: 2025-11-12
#
# This configuration provides:
#   - High-performance DNS caching
#   - DNSSEC validation for security
#   - Custom .aura.local domain resolution
#   - Conditional forwarding to AWS services
#   - Security hardening (DNS rebinding prevention, bogus filtering)

# ============================================================================
# CORE DNS SETTINGS
# ============================================================================

# Do not read system DNS configuration
no-resolv
no-hosts

# Listen on all interfaces
listen-address=0.0.0.0
bind-interfaces

# DNS port
port=53

# Large cache for production (50,000 entries for microservices workload)
cache-size=50000

# Negative caching TTL (1 hour)
neg-ttl=3600

# Log settings (minimal logging for production)
# Enable log-queries only for debugging
# log-queries
log-facility=/var/log/dnsmasq/dnsmasq.log
log-async=50

# ============================================================================
# UPSTREAM DNS SERVERS
# ============================================================================

# AWS VPC DNS resolver (primary)
# Template: Replace 10.0.0.2 with actual VPC DNS IP (.2 in VPC CIDR)
server=10.0.0.2

# Cloudflare DNS (high performance, privacy-focused)
server=1.1.1.1
server=1.0.0.1

# Google DNS (fallback)
server=8.8.8.8
server=8.8.4.4

# Quad9 DNS (malware blocking)
server=9.9.9.9

# ============================================================================
# CUSTOM DOMAIN RESOLUTION (.aura.local)
# ============================================================================

# Local domain for Project Aura services
local=/aura.local/
domain=aura.local
expand-hosts

# Authoritative for local domain
auth-server=aura.local
auth-zone=aura.local

# ============================================================================
# SERVICE DISCOVERY ENTRIES
# ============================================================================
# Static DNS entries for core Project Aura services
# Update these IPs based on actual deployment

# Neptune Graph Database
address=/neptune.aura.local/10.0.3.50
address=/neptune-reader.aura.local/10.0.3.51

# OpenSearch Service
address=/opensearch.aura.local/10.0.3.60
address=/opensearch-dashboard.aura.local/10.0.3.61

# Context Retrieval Service
address=/context-retrieval.aura.local/10.0.3.100

# Bedrock LLM Service
address=/bedrock-llm.aura.local/10.0.3.101

# Agent Orchestrator
address=/orchestrator.aura.local/10.0.3.102

# AST Parser Agent
address=/ast-parser.aura.local/10.0.3.103

# Monitoring Service
address=/monitoring.aura.local/10.0.3.110

# Frontend API
address=/api.aura.local/10.0.3.120
address=/frontend.aura.local/10.0.3.121

# ============================================================================
# CONDITIONAL FORWARDING
# ============================================================================

# Forward Kubernetes cluster DNS to CoreDNS
server=/cluster.local/10.100.0.10
server=/svc.cluster.local/10.100.0.10

# Forward AWS service queries to VPC DNS
server=/amazonaws.com/10.0.0.2
server=/aws.internal/10.0.0.2

# Forward specific AWS services
server=/execute-api.us-east-1.amazonaws.com/10.0.0.2
server=/bedrock-runtime.us-east-1.amazonaws.com/10.0.0.2

# ============================================================================
# SECURITY SETTINGS
# ============================================================================

# DNSSEC validation (CRITICAL for production)
dnssec
dnssec-check-unsigned

# Trust anchor for DNSSEC root
trust-anchor=.,20326,8,2,E06D44B80B8F1D39A95C0B0D7C65D08458E880409BBC683457104237C7F8EC8D

# Prevent DNS rebinding attacks
stop-dns-rebind
rebind-localhost-ok

# Reject private IP addresses from public DNS
bogus-priv

# Filter bogus private reverse lookups
domain-needed

# Prevent DNS amplification attacks
dns-rr-flag=4

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================

# Increase DNS packet size for DNSSEC
edns-packet-max=4096

# Query all upstream servers in parallel for fastest response
# Note: all-servers queries all upstreams simultaneously, uses fastest response
all-servers

# DNS query timeout (reduced to 2s for faster failover)
timeout=2

# Number of concurrent DNS queries (increased for high-traffic workloads)
dns-forward-max=2000

# Cache performance tuning
min-cache-ttl=300      # Minimum 5 minutes cache TTL
max-cache-ttl=86400    # Maximum 24 hours cache TTL

# DNS loop detection for security
dns-loop-detect

# ============================================================================
# SECURITY BLACKLIST
# ============================================================================
# Block known malicious domains
# Add more entries as threat intelligence is updated

address=/malware.example.com/0.0.0.0
address=/phishing.example.com/0.0.0.0
address=/cryptomining.example.com/0.0.0.0

# Block common ad/tracking domains (optional)
# address=/ads.example.com/0.0.0.0
# address=/tracking.example.com/0.0.0.0

# ============================================================================
# MONITORING & HEALTH CHECKS
# ============================================================================

# Enable DNS statistics
# bind-dynamic

# Health check endpoint (responds to health.aura.local)
address=/health.aura.local/127.0.0.1

# ============================================================================
# HIGH AVAILABILITY
# ============================================================================

# Fast failover already configured above (timeout=2)

# Cache failed queries briefly for fast retry
neg-ttl=300

# Enable cache statistics for monitoring
cache-stats=100  # Log cache stats every 100 queries

# ============================================================================
# COMPLIANCE & AUDIT
# ============================================================================

# Log all DNS queries for audit (enable if required for compliance)
# WARNING: High disk I/O and storage requirements
# log-queries

# Log DHCP operations (not used in DNS-only mode)
# log-dhcp

# ============================================================================
# ADVANCED FEATURES (Optional)
# ============================================================================

# Enable IPv6 (if VPC supports it)
# listen-address=::

# Enable DNS over TLS to upstream servers (if supported)
# server-tls=1.1.1.1#cloudflare-dns.com

# Rate limiting to prevent abuse
# dns-loop-detect
