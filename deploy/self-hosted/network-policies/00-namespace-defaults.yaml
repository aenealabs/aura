---
# Allow DNS resolution for all namespaces
# This is a common requirement - without DNS, pods cannot resolve service names
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: aura
  labels:
    app.kubernetes.io/name: allow-dns
    app.kubernetes.io/component: network-security
    app.kubernetes.io/part-of: aura
    security.aura.io/policy-type: baseline-allow
  annotations:
    description: "Allow DNS resolution to CoreDNS"
spec:
  podSelector: {}  # Applies to all pods
  policyTypes:
    - Egress
  egress:
    # Allow DNS to kube-dns/CoreDNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

