# Project Aura - MetaOrchestrator Service Account (Base)
#
# IRSA-enabled service account for MetaOrchestrator jobs.
# Provides AWS permissions for Neptune, OpenSearch, Bedrock, DynamoDB, and SQS access.
#
# The IAM role ARN is configured via the annotation and must be created
# in CloudFormation before deploying this manifest.
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: meta-orchestrator
  namespace: aura
  labels:
    app: meta-orchestrator
    app.kubernetes.io/name: meta-orchestrator
    app.kubernetes.io/component: serviceaccount
    app.kubernetes.io/part-of: aura
  annotations:
    # IRSA annotation - role ARN set by overlay
    eks.amazonaws.com/role-arn: PLACEHOLDER_ROLE_ARN
    # Audience for token projection
    eks.amazonaws.com/audience: sts.amazonaws.com
    # STS regional endpoint for lower latency
    eks.amazonaws.com/sts-regional-endpoints: "true"
---
# RBAC: Allow MetaOrchestrator to create/manage pods for agent spawning
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: meta-orchestrator-role
  namespace: aura
  labels:
    app: meta-orchestrator
rules:
  # Allow creating pods for spawned agents
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # Allow creating jobs for sub-tasks
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # Allow reading configmaps for configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

  # Allow reading secrets for credentials
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

  # Allow reading service endpoints for discovery
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]

  # Allow reading pod logs for debugging
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

  # Allow exec into pods for agent communication (if needed)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: meta-orchestrator-rolebinding
  namespace: aura
  labels:
    app: meta-orchestrator
subjects:
  - kind: ServiceAccount
    name: meta-orchestrator
    namespace: aura
roleRef:
  kind: Role
  name: meta-orchestrator-role
  apiGroup: rbac.authorization.k8s.io
