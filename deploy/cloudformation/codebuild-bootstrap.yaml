AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Bootstrap Layer CodeBuild Project (Layer 0: Deploys All 18 CodeBuild Projects)'

# =============================================================================
# BOOTSTRAP LAYER - ONE-TIME MANUAL DEPLOYMENT
# =============================================================================
# This template creates a CodeBuild project that deploys all other CodeBuild
# projects. It solves the chicken-and-egg problem for fresh account deployments.
#
# DEPLOYMENT SEQUENCE:
#   1. Manual: Deploy this template (codebuild-bootstrap.yaml) - ONE TIME
#   2. Manual: Create SSM parameter /aura/global/codeconnections-arn
#   3. Trigger: aura-bootstrap-deploy-{env} - deploys all 18 CodeBuild projects
#   4. Trigger: aura-foundation-deploy-{env} - deploys Foundation infrastructure
#   5. Trigger: Remaining layers (data, compute, application, etc.)
#
# IDEMPOTENT: Safe to run multiple times - uses --no-fail-on-empty-changeset
# =============================================================================

Mappings:
  PartitionMap:
    aws:
      Partition: 'aws'
    aws-us-gov:
      Partition: 'aws-us-gov'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

  GitHubRepository:
    Type: String
    Default: https://github.com/aenealabs/aura
    Description: GitHub repository URL

  GitHubBranch:
    Type: String
    Default: main
    AllowedValues: [main, develop]
    Description: GitHub branch to build from

Resources:
  # S3 Bucket for Bootstrap Artifacts
  BootstrapArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-bootstrap-artifacts-${AWS::AccountId}-${Environment}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldBootstrapArtifacts
            Status: Enabled
            ExpirationInDays: 90
            NoncurrentVersionExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: bootstrap

  # CloudWatch Log Group
  BootstrapBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${ProjectName}-bootstrap-deploy-${Environment}'
      RetentionInDays: 90

  # IAM Role for Bootstrap CodeBuild
  # This role needs permissions to deploy ALL CodeBuild project templates
  BootstrapCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-bootstrap-codebuild-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub
          - 'arn:${Partition}:iam::aws:policy/ReadOnlyAccess'
          - Partition: !FindInMap [PartitionMap, !Ref 'AWS::Partition', Partition]
      Policies:
        - PolicyName: BootstrapDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudWatch Logs - Build logs and CodeBuild log groups
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents, logs:DeleteLogGroup, logs:PutRetentionPolicy, logs:DescribeLogGroups, logs:TagResource, logs:UntagResource]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-*'
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-*:*'

              # CloudFormation - Deploy CodeBuild stacks
              - Effect: Allow
                Action: [cloudformation:CreateStack, cloudformation:UpdateStack, cloudformation:DeleteStack, cloudformation:CreateChangeSet, cloudformation:ExecuteChangeSet, cloudformation:DeleteChangeSet, cloudformation:DescribeChangeSet, cloudformation:DescribeStacks, cloudformation:DescribeStackEvents, cloudformation:DescribeStackResources, cloudformation:GetTemplate, cloudformation:ValidateTemplate, cloudformation:GetTemplateSummary]
                Resource: !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-codebuild-*-${Environment}/*'

              # IAM - Create CodeBuild roles for all layers
              - Effect: Allow
                Action: [iam:CreateRole, iam:DeleteRole, iam:GetRole, iam:PassRole, iam:AttachRolePolicy, iam:DetachRolePolicy, iam:PutRolePolicy, iam:DeleteRolePolicy, iam:GetRolePolicy, iam:TagRole, iam:UntagRole, iam:ListAttachedRolePolicies, iam:ListRolePolicies, iam:UpdateAssumeRolePolicy]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-*-codebuild-role-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-*-build-role-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-*-test-role-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-*-deploy-role-${Environment}'

              # IAM - Create managed policies for CodeBuild roles (to stay under 10KB inline policy limit)
              - Effect: Allow
                Action: [iam:CreatePolicy, iam:DeletePolicy, iam:GetPolicy, iam:GetPolicyVersion, iam:ListPolicyVersions, iam:CreatePolicyVersion, iam:DeletePolicyVersion, iam:TagPolicy, iam:UntagPolicy]
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/${ProjectName}-*-${Environment}'

              # CodeBuild - Create/Update/Delete projects
              - Effect: Allow
                Action: [codebuild:CreateProject, codebuild:DeleteProject, codebuild:UpdateProject, codebuild:BatchGetProjects]
                Resource: !Sub 'arn:${AWS::Partition}:codebuild:${AWS::Region}:${AWS::AccountId}:project/${ProjectName}-*-${Environment}'

              # S3 - Artifacts buckets for all layers
              - Effect: Allow
                Action: [s3:CreateBucket, s3:DeleteBucket, s3:PutBucketPolicy, s3:GetBucketPolicy, s3:DeleteBucketPolicy, s3:PutBucketVersioning, s3:PutBucketPublicAccessBlock, s3:PutBucketOwnershipControls, s3:PutEncryptionConfiguration, s3:PutLifecycleConfiguration, s3:PutBucketTagging, s3:GetBucketAcl, s3:GetBucketLocation, s3:ListBucket, s3:GetObject, s3:PutObject]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-*-artifacts-${AWS::AccountId}-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-*-artifacts-${AWS::AccountId}-${Environment}/*'

              # CloudWatch Alarms - Build failure alarms
              - Effect: Allow
                Action: [cloudwatch:PutMetricAlarm, cloudwatch:DeleteAlarms, cloudwatch:DescribeAlarms]
                Resource: !Sub 'arn:${AWS::Partition}:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${ProjectName}-*-${Environment}'

              # CodeConnections - GitHub access
              - Effect: Allow
                Action: [codeconnections:UseConnection, codeconnections:GetConnectionToken, codeconnections:GetConnection, codestar-connections:UseConnection, codestar-connections:GetConnectionToken, codestar-connections:GetConnection]
                Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'
              - Effect: Allow
                Action: codeconnections:PassConnection
                Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'
                Condition:
                  StringEquals:
                    codeconnections:PassedToService: codebuild.amazonaws.com
              - Effect: Allow
                Action: codestar-connections:PassConnection
                Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'
                Condition:
                  StringEquals:
                    codestar-connections:PassedToService: codebuild.amazonaws.com

              # SSM - Read parameters for codeconnections-arn
              - Effect: Allow
                Action: [ssm:GetParameter, ssm:GetParameters]
                Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/*'

              # EventBridge - Build notifications
              - Effect: Allow
                Action: [events:PutRule, events:DeleteRule, events:PutTargets, events:RemoveTargets, events:DescribeRule]
                Resource: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/${ProjectName}-*-${Environment}'

              # SNS - Build notifications
              - Effect: Allow
                Action: [sns:CreateTopic, sns:DeleteTopic, sns:Subscribe, sns:Unsubscribe, sns:GetTopicAttributes, sns:SetTopicAttributes, sns:TagResource]
                Resource: !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:${ProjectName}-*-${Environment}'

              # EKS - Access entries for CodeBuild projects that need cluster access
              - Effect: Allow
                Action: [eks:CreateAccessEntry, eks:DeleteAccessEntry, eks:DescribeAccessEntry, eks:ListAccessEntries, eks:TagResource, eks:UntagResource]
                Resource:
                  - !Sub 'arn:${AWS::Partition}:eks:${AWS::Region}:${AWS::AccountId}:cluster/${ProjectName}-cluster-${Environment}'
                  - !Sub 'arn:${AWS::Partition}:eks:${AWS::Region}:${AWS::AccountId}:access-entry/${ProjectName}-cluster-${Environment}/*'
              - Effect: Allow
                Action: [eks:AssociateAccessPolicy, eks:DisassociateAccessPolicy, eks:ListAssociatedAccessPolicies]
                Resource: !Sub 'arn:${AWS::Partition}:eks:${AWS::Region}:${AWS::AccountId}:access-entry/${ProjectName}-cluster-${Environment}/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: bootstrap

  # CodeBuild Project for Bootstrap Layer
  BootstrapCodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-bootstrap-deploy-${Environment}'
      Description: 'Project Aura - Bootstrap Layer (Layer 0: Deploys All 18 CodeBuild Projects)'
      ServiceRole: !GetAtt BootstrapCodeBuildRole.Arn
      Artifacts:
        Type: S3
        Location: !Ref BootstrapArtifactsBucket
        Name: bootstrap-artifacts
        Packaging: ZIP
        EncryptionDisabled: false
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: LAYER
            Value: bootstrap
      Source:
        Type: GITHUB
        Location: !Ref GitHubRepository
        BuildSpec: deploy/buildspecs/buildspec-bootstrap.yml
        GitCloneDepth: 1
        ReportBuildStatus: true
        Auth:
          Type: CODECONNECTIONS
          Resource: '{{resolve:ssm:/aura/global/codeconnections-arn}}'
      SourceVersion: !Sub 'refs/heads/${GitHubBranch}'
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref BootstrapBuildLogGroup
        S3Logs:
          Status: DISABLED
      Cache:
        Type: LOCAL
        Modes:
          - LOCAL_SOURCE_CACHE
      TimeoutInMinutes: 45
      QueuedTimeoutInMinutes: 480
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: bootstrap

  # CloudWatch Alarm - Bootstrap Build Failures
  BootstrapBuildFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-bootstrap-build-failures-${Environment}'
      AlarmDescription: 'Alert when Bootstrap Layer has build failures'
      MetricName: FailedBuilds
      Namespace: AWS/CodeBuild
      Dimensions:
        - Name: ProjectName
          Value: !Ref BootstrapCodeBuildProject
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  BootstrapCodeBuildProjectName:
    Description: Bootstrap Layer CodeBuild project name
    Value: !Ref BootstrapCodeBuildProject
    Export:
      Name: !Sub '${AWS::StackName}-ProjectName'

  BootstrapCodeBuildProjectArn:
    Description: Bootstrap Layer CodeBuild project ARN
    Value: !GetAtt BootstrapCodeBuildProject.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ProjectArn'

  BootstrapArtifactsBucketName:
    Description: Bootstrap Layer artifacts bucket name
    Value: !Ref BootstrapArtifactsBucket
    Export:
      Name: !Sub '${AWS::StackName}-ArtifactsBucket'

  BootstrapBuildLogGroupName:
    Description: Bootstrap Layer build log group name
    Value: !Ref BootstrapBuildLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-LogGroup'
