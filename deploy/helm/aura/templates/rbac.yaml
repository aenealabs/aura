{{- if .Values.rbac.create }}
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aura.serviceAccountName" . }}
  labels:
    {{- include "aura.labels" . | nindent 4 }}
  {{- with .Values.rbac.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
# Role for namespace-scoped permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "aura.fullname" . }}
  labels:
    {{- include "aura.labels" . | nindent 4 }}
rules:
  # ConfigMaps and Secrets (read-only for app config)
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  # Pods (for health checks and debugging)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Events (for monitoring)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create"]
  # Endpoints (for service discovery)
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "aura.fullname" . }}
  labels:
    {{- include "aura.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aura.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "aura.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- if .Values.rbac.clusterRole.create }}
---
# ClusterRole for cross-namespace access (optional)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aura.fullname" . }}
  labels:
    {{- include "aura.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.clusterRole.rules | nindent 2 }}
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aura.fullname" . }}
  labels:
    {{- include "aura.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aura.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "aura.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
