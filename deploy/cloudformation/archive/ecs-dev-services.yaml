        FailureThreshold: 1

  ReviewerAgentService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub reviewer-agent-${Environment}
      Cluster:
        Fn::ImportValue: !Sub ${ClusterStackName}-ClusterName
      TaskDefinition: !Ref ReviewerAgentTaskDefinition
      DesiredCount: 2
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - Fn::ImportValue: !Sub ${ClusterStackName}-AgentSecurityGroup
      ServiceRegistries:
        - RegistryArn: !GetAtt ReviewerAgentServiceDiscovery.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment
