{{- if and .Values.global.tls.enabled .Values.global.tls.certManager.enabled }}
# Certificate for API service
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "aura.fullname" . }}-api-tls
  labels:
    {{- include "aura.componentLabels" (dict "component" "api" "context" .) | nindent 4 }}
spec:
  secretName: {{ include "aura.fullname" . }}-api-tls
  duration: 2160h  # 90 days
  renewBefore: 360h  # 15 days
  subject:
    organizations:
      - Aenea Labs
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
    - {{ include "aura.fullname" . }}-api
    - {{ include "aura.fullname" . }}-api.{{ .Release.Namespace }}
    - {{ include "aura.fullname" . }}-api.{{ .Release.Namespace }}.svc
    - {{ include "aura.fullname" . }}-api.{{ .Release.Namespace }}.svc.cluster.local
    {{- range .Values.api.ingress.hosts }}
    - {{ .host }}
    {{- end }}
  issuerRef:
    {{- if .Values.global.tls.certManager.clusterIssuer }}
    kind: ClusterIssuer
    {{- else }}
    kind: Issuer
    {{- end }}
    name: {{ .Values.global.tls.certManager.issuer }}
---
