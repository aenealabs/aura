version: 0.2

# Application Sublayer: Multi-IdP Authentication Infrastructure (ADR-054)
# DynamoDB tables for IdP configuration, domain mappings, and audit logs
# Environment variables (ENVIRONMENT, PROJECT_NAME, AWS_ACCOUNT_ID, AWS_DEFAULT_REGION)
# are provided by CodeBuild project from CloudFormation parameters

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing build dependencies..."
      - pip3 install cfn-lint

  pre_build:
    commands:
      - echo "=========================================="
      - echo "Application Sublayer - Multi-IdP Authentication (ADR-054)"
      - echo "=========================================="
      - echo "Environment $ENVIRONMENT | Project $PROJECT_NAME | Region $AWS_DEFAULT_REGION"
      - echo "Validating IdP infrastructure template..."
      - cfn-lint deploy/cloudformation/idp-infrastructure.yaml --ignore-checks W3002,W1020 || echo "cfn-lint warnings (non-blocking)"
      - echo "Template validation complete"
      - DEPLOY_TIMESTAMP=$(date +%Y%m%d-%H%M%S)
      - echo "Deploy Timestamp = $DEPLOY_TIMESTAMP"

  build:
    commands:
      - echo "Deploying Multi-IdP Infrastructure..."
      - aws cloudformation deploy --stack-name ${PROJECT_NAME}-idp-infrastructure-${ENVIRONMENT} --template-file deploy/cloudformation/idp-infrastructure.yaml --parameter-overrides Environment=$ENVIRONMENT ProjectName=$PROJECT_NAME --capabilities CAPABILITY_NAMED_IAM --tags Project=$PROJECT_NAME Environment=$ENVIRONMENT Layer=application ADR=ADR-054 DeployTimestamp=$DEPLOY_TIMESTAMP --no-fail-on-empty-changeset --region $AWS_DEFAULT_REGION
      - echo "Multi-IdP Infrastructure deployment complete"

  post_build:
    commands:
      - echo "=========================================="
      - echo "Multi-IdP Authentication Deployment Complete"
      - echo "=========================================="
      - echo "=== IdP Infrastructure Stack Outputs ==="
      - aws cloudformation describe-stacks --stack-name ${PROJECT_NAME}-idp-infrastructure-${ENVIRONMENT} --query 'Stacks[0].Outputs' --region $AWS_DEFAULT_REGION --output table 2>/dev/null || echo "Stack not available"
      - echo "=== IdP Configurations DynamoDB Table ==="
      - aws dynamodb describe-table --table-name ${PROJECT_NAME}-idp-configurations-${ENVIRONMENT} --query 'Table.{Name:TableName,Status:TableStatus,ItemCount:ItemCount}' --output table --region $AWS_DEFAULT_REGION 2>/dev/null || echo "Table not available"
      - echo "=== Domain Mappings DynamoDB Table ==="
      - aws dynamodb describe-table --table-name ${PROJECT_NAME}-idp-domain-mappings-${ENVIRONMENT} --query 'Table.{Name:TableName,Status:TableStatus,ItemCount:ItemCount}' --output table --region $AWS_DEFAULT_REGION 2>/dev/null || echo "Table not available"
      - echo "=== Auth Audit Logs DynamoDB Table ==="
      - aws dynamodb describe-table --table-name ${PROJECT_NAME}-auth-audit-logs-${ENVIRONMENT} --query 'Table.{Name:TableName,Status:TableStatus,ItemCount:ItemCount}' --output table --region $AWS_DEFAULT_REGION 2>/dev/null || echo "Table not available"
      - echo "Publishing build metrics..."
      - aws cloudwatch put-metric-data --namespace "Aura/CICD/Application" --metric-name "IdentityDeployments" --value 1 --unit Count --dimensions Environment=$ENVIRONMENT --region $AWS_DEFAULT_REGION || echo "Failed to publish metrics"

artifacts:
  files:
    - deploy/cloudformation/idp-infrastructure.yaml
  name: identity-infrastructure-artifacts
  discard-paths: no

cache:
  paths:
    - '/root/.cache/pip/**/*'
