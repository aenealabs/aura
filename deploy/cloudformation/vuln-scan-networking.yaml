AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Layer 9.3 - Vuln Scan Networking (Security Groups, ECS Cluster)'

# =============================================================================
# Network isolation for ADR-084 vulnerability scanner.
# Scanner uses Fargate (not EKS) — unaffected by DEV cost scheduler.
#
# Resources:
# - ECS Fargate cluster for scan workers
# - Zero-egress security group (4-layer isolation model)
# - CloudWatch log group for scanner tasks
# =============================================================================

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
    Description: Environment name

  ProjectName:
    Type: String
    Default: aura
    Description: Project name

  VpcId:
    Type: String
    Description: VPC ID for scanner resources (from networking stack)
    Default: ''

  PrivateSubnetIds:
    Type: String
    Description: Comma-separated private subnet IDs for Fargate tasks
    Default: ''

Conditions:
  HasVpc: !Not [!Equals [!Ref VpcId, '']]

Resources:
  # ===========================================================================
  # ECS Cluster (Fargate-only, separate from EKS)
  # ===========================================================================
  # Uses Fargate launch type — not managed by dev-cost-scheduler.yaml
  # which only controls EKS nodegroups. Scanner runs independently.
  ScannerECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${ProjectName}-vuln-scanner-${Environment}'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Configuration:
        ExecuteCommandConfiguration:
          Logging: DEFAULT
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vuln-scanner-${Environment}'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: '9'

  # ===========================================================================
  # Scanner Security Group - Zero Egress (ADR-084 Layer 3 Isolation)
  # ===========================================================================
  # Scanner containers have NO outbound internet access.
  # All AWS service access is via VPC endpoints (S3 gateway, DynamoDB gateway,
  # Bedrock interface, Neptune, OpenSearch — provisioned in Layer 1).
  ScannerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: HasVpc
    Properties:
      GroupName: !Sub '${ProjectName}-vuln-scanner-isolated-${Environment}'
      GroupDescription: Zero-egress security group for vulnerability scanner isolation (ADR-084)
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        # DNS resolution (required for VPC endpoint resolution)
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 0.0.0.0/0
          Description: DNS resolution for VPC endpoints
        # HTTPS for VPC interface endpoints only (Bedrock, Neptune, etc.)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS for VPC interface endpoints (Bedrock, Secrets Manager)
        # Neptune (port 8182) for graph queries
        - IpProtocol: tcp
          FromPort: 8182
          ToPort: 8182
          CidrIp: 0.0.0.0/0
          Description: Neptune graph database
        # OpenSearch (port 9200) for semantic search
        - IpProtocol: tcp
          FromPort: 9200
          ToPort: 9200
          CidrIp: 0.0.0.0/0
          Description: OpenSearch vector search
      # No inbound rules — scanner containers accept no incoming traffic
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vuln-scanner-isolated-${Environment}'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: '9'
        - Key: Purpose
          Value: vuln-scanner-isolation

  # ===========================================================================
  # CloudWatch Log Group for Scanner Tasks
  # ===========================================================================
  ScannerTaskLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/ecs/${ProjectName}-vuln-scanner-${Environment}'
      RetentionInDays: 90
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: '9'

  # ===========================================================================
  # CloudWatch Log Group for Step Functions
  # ===========================================================================
  ScannerSFNLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/states/${ProjectName}-vuln-scan-pipeline-${Environment}'
      RetentionInDays: 90
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: '9'

Outputs:
  ScannerECSClusterName:
    Description: ECS cluster name for vulnerability scanner
    Value: !Ref ScannerECSCluster
    Export:
      Name: !Sub '${ProjectName}-vuln-scan-cluster-${Environment}'

  ScannerECSClusterArn:
    Description: ECS cluster ARN for vulnerability scanner
    Value: !GetAtt ScannerECSCluster.Arn
    Export:
      Name: !Sub '${ProjectName}-vuln-scan-cluster-arn-${Environment}'

  ScannerSecurityGroupId:
    Condition: HasVpc
    Description: Security group ID for scanner containers
    Value: !Ref ScannerSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-vuln-scan-sg-${Environment}'

  ScannerTaskLogGroupArn:
    Description: CloudWatch log group ARN for scanner tasks
    Value: !GetAtt ScannerTaskLogGroup.Arn
    Export:
      Name: !Sub '${ProjectName}-vuln-scan-task-log-arn-${Environment}'

  ScannerSFNLogGroupArn:
    Description: CloudWatch log group ARN for Step Functions
    Value: !GetAtt ScannerSFNLogGroup.Arn
    Export:
      Name: !Sub '${ProjectName}-vuln-scan-sfn-log-arn-${Environment}'

  PrivateSubnetIdsOutput:
    Description: Private subnet IDs passed through for downstream stacks
    Value: !Ref PrivateSubnetIds
    Export:
      Name: !Sub '${ProjectName}-vuln-scan-subnets-${Environment}'
