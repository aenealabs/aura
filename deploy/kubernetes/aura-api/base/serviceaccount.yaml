# Project Aura - API Service Account (Base)
# Service account with IRSA (IAM Roles for Service Accounts) for AWS access
#
# IMPORTANT: The IRSA role ARN is set via Kustomize overlays per environment.
#
# Prerequisites:
# 1. OIDC provider configured for EKS cluster
# 2. IAM role with trust policy for this service account
#
# The IAM role should have policies for:
# - DynamoDB: Read/Write to aura-* tables
# - Bedrock: InvokeModel for Claude and Titan
# - Secrets Manager: GetSecretValue for aura-* secrets

apiVersion: v1
kind: ServiceAccount
metadata:
  name: aura-api
  namespace: default
  labels:
    app: aura-api
    component: api
  annotations:
    description: "Service account for Aura API with IRSA for AWS service access"
