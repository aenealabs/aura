# Project Aura - Neural Memory Service Configuration (Development)
# Configuration for Titan/MIRAS neural memory service in dev environment
#
# Usage:
#   - Loaded by memory_service_config.py based on ENVIRONMENT env var
#   - Can be used with kustomize overlays for environment-specific configs
#
# Related files:
#   - src/config/memory_service_config.py (Python config loader)
#   - deploy/kubernetes/memory-service/configmap.yaml (K8s ConfigMap)

# =============================================================================
# Service Identity
# =============================================================================
service:
  name: "memory-service"
  version: "1.0.0"
  environment: "development"

# =============================================================================
# Server Configuration
# =============================================================================
server:
  grpc_port: 50051
  health_port: 8080
  metrics_port: 9090
  log_level: "DEBUG"
  worker_threads: 2

# =============================================================================
# AWS Configuration
# =============================================================================
# Note: account_id is resolved at runtime from AWS_ACCOUNT_ID environment variable
# or retrieved from AWS STS. Do not hardcode account IDs.
aws:
  region: "${AWS_REGION:-us-east-1}"

# =============================================================================
# Neural Memory Architecture (Titans/MIRAS - ADR-024)
# =============================================================================
memory:
  # Memory type: titans (Deep MLP), miras (multi-input recursive), hybrid
  type: "titans"

  # Model architecture
  architecture:
    dimension: 1024
    layers: 3
    heads: 8
    max_sequence_length: 8192

  # Test-time training (TTT) parameters
  # Enables memory updates during inference
  ttt:
    enabled: true
    learning_rate: 0.001
    momentum: 0.9
    steps_per_update: 1

  # Surprise-driven memorization (from Titans paper)
  # Memorize only when prediction error exceeds threshold
  surprise:
    enabled: true
    threshold: 0.5
    decay_factor: 0.99

# =============================================================================
# Model Checkpoint Storage (S3)
# =============================================================================
storage:
  s3:
    bucket: "${S3_MODELS_BUCKET:-aura-models-${ENVIRONMENT:-dev}}"
    prefix: "neural-memory/checkpoints"
    checkpoint_interval_seconds: 3600  # 1 hour

  local:
    model_cache_dir: "/var/lib/memory-service/models"
    state_dir: "/var/lib/memory-service/state"

# =============================================================================
# State Persistence (DynamoDB)
# =============================================================================
persistence:
  dynamodb:
    table_name: "${DYNAMODB_MEMORY_TABLE:-aura-neural-memory-${ENVIRONMENT:-dev}}"
    sync_interval_seconds: 300  # 5 minutes
    ttl_days: 90

# =============================================================================
# Performance Configuration
# =============================================================================
performance:
  # Inference batching
  max_batch_size: 32
  batch_timeout_ms: 100

  # GPU memory management
  gpu_memory_fraction: 0.8
  enable_memory_pool: true

  # gRPC settings
  grpc:
    max_message_size_bytes: 104857600  # 100MB
    keepalive_time_ms: 30000
    keepalive_timeout_ms: 10000
    max_concurrent_streams: 100

# =============================================================================
# Observability
# =============================================================================
observability:
  metrics:
    namespace: "Aura/NeuralMemory"
    publish_interval_seconds: 60

  tracing:
    enabled: true
    sample_rate: 1.0  # 100% in dev
    exporter: "otlp"
    endpoint: "http://otel-collector:4317"

# =============================================================================
# Resource Limits (Development - Smaller)
# =============================================================================
resources:
  cpu_limit: "2000m"
  memory_limit: "8Gi"
  gpu_count: 1

# =============================================================================
# Feature Flags
# =============================================================================
features:
  # Enable experimental features in dev
  async_memorization: true
  adaptive_learning_rate: true
  memory_compression: false
  distributed_memory: false
