AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project Aura - Layer 2.6 - Repository Onboarding DynamoDB Tables'

Parameters:
  ProjectName:
    Type: String
    Default: aura
    Description: Project name for resource naming
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
    Description: Deployment environment

  SecondaryRegion:
    Type: String
    Default: us-west-2
    Description: |
      Secondary AWS region for Tier 1 DynamoDB Global Tables replication
      (DR-1 / #144). Production environments only; dev/qa do not pay
      replica costs.

  DRAlertTopicArn:
    Type: String
    Default: ''
    Description: |
      Optional SNS topic ARN for DR alert routing (DR-9 / #152).

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]
  HasDRAlertTopic: !Not [!Equals [!Ref DRAlertTopicArn, '']]

Resources:
  # Repositories Table - Stores connected repository metadata
  RepositoriesTable:
    Type: AWS::DynamoDB::GlobalTable
    # DR-1 PR4 (#144): Tier 1 GlobalTable. Customer repo configurations.
    # AWS-managed encryption (no CMK) since this is configuration metadata,
    # not auth credentials.
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: !If [IsProduction, Retain, Delete]
    Properties:
      TableName: !Sub '${ProjectName}-repositories-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: repository_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: provider
          AttributeType: S
      KeySchema:
        - AttributeName: repository_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: user-provider-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: provider
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      SSESpecification:
        SSEEnabled: true
      Replicas:
        - Region: !Ref AWS::Region
          PointInTimeRecoverySpecification:
            PointInTimeRecoveryEnabled: true
          Tags:
            - Key: Project
              Value: !Ref ProjectName
            - Key: Environment
              Value: !Ref Environment
            - Key: Component
              Value: repository-onboarding
        - !If
          - IsProduction
          - Region: !Ref SecondaryRegion
            PointInTimeRecoverySpecification:
              PointInTimeRecoveryEnabled: true
            Tags:
              - Key: Project
                Value: !Ref ProjectName
              - Key: Environment
                Value: !Ref Environment
              - Key: Component
                Value: repository-onboarding
              - Key: Role
                Value: dr-replica
          - !Ref AWS::NoValue

  # ===========================================================================
  # Replication-lag alarm for RepositoriesTable (DR-9 partial / #152)
  # ===========================================================================
  RepositoriesReplicationLagAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProduction
    Properties:
      AlarmName: !Sub '${ProjectName}-repositories-replication-lag-${Environment}'
      AlarmDescription: 'RepositoriesTable cross-region replication latency exceeded 5min threshold'
      Namespace: AWS/DynamoDB
      MetricName: ReplicationLatency
      Dimensions:
        - Name: TableName
          Value: !Sub '${ProjectName}-repositories-${Environment}'
        - Name: ReceivingRegion
          Value: !Ref SecondaryRegion
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 300000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasDRAlertTopic
        - - !Ref DRAlertTopicArn
        - !Ref AWS::NoValue
      OKActions: !If
        - HasDRAlertTopic
        - - !Ref DRAlertTopicArn
        - !Ref AWS::NoValue

  # OAuth Connections Table - Stores OAuth provider connections
  OAuthConnectionsTable:
    Type: AWS::DynamoDB::GlobalTable
    # DR-1 PR4 (#144): Tier 1 GlobalTable holding GitHub/GitLab OAuth tokens.
    # Per-region customer-managed CMKs (DR-1.0) for auth-credential encryption
    # per Sally's SC-12 guidance. TTL stays at top level (TTL deletes
    # propagate as deletes across replicas, billed; expected behavior for
    # token expiry).
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: !If [IsProduction, Retain, Delete]
    Properties:
      TableName: !Sub '${ProjectName}-oauth-connections-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connection_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: provider
          AttributeType: S
      KeySchema:
        - AttributeName: connection_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user-provider-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: provider
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      SSESpecification:
        SSEEnabled: true
      Replicas:
        - Region: !Ref AWS::Region
          PointInTimeRecoverySpecification:
            PointInTimeRecoveryEnabled: true
          SSESpecification:
            KMSMasterKeyId: !Sub 'alias/${ProjectName}-auth-credentials-${Environment}'
          Tags:
            - Key: Project
              Value: !Ref ProjectName
            - Key: Environment
              Value: !Ref Environment
            - Key: Component
              Value: repository-onboarding
            - Key: DataClassification
              Value: Restricted
        - !If
          - IsProduction
          - Region: !Ref SecondaryRegion
            PointInTimeRecoverySpecification:
              PointInTimeRecoveryEnabled: true
            SSESpecification:
              KMSMasterKeyId: !Sub 'alias/${ProjectName}-auth-credentials-${Environment}-dr'
            Tags:
              - Key: Project
                Value: !Ref ProjectName
              - Key: Environment
                Value: !Ref Environment
              - Key: Component
                Value: repository-onboarding
              - Key: DataClassification
                Value: Restricted
              - Key: Role
                Value: dr-replica
          - !Ref AWS::NoValue

  # ===========================================================================
  # Replication-lag alarm for OAuthConnectionsTable (DR-9 partial / #152)
  # ===========================================================================
  OAuthConnectionsReplicationLagAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProduction
    Properties:
      AlarmName: !Sub '${ProjectName}-oauth-connections-replication-lag-${Environment}'
      AlarmDescription: 'OAuthConnectionsTable cross-region replication latency exceeded 5min threshold'
      Namespace: AWS/DynamoDB
      MetricName: ReplicationLatency
      Dimensions:
        - Name: TableName
          Value: !Sub '${ProjectName}-oauth-connections-${Environment}'
        - Name: ReceivingRegion
          Value: !Ref SecondaryRegion
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 300000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasDRAlertTopic
        - - !Ref DRAlertTopicArn
        - !Ref AWS::NoValue
      OKActions: !If
        - HasDRAlertTopic
        - - !Ref DRAlertTopicArn
        - !Ref AWS::NoValue

  # Repository Ingestion Jobs Table - Tracks repository ingestion job status
  RepositoryIngestionJobsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: !If [IsProduction, Retain, Delete]
    Properties:
      TableName: !Sub '${ProjectName}-repo-ingestion-jobs-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: repository_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user-status-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: repository-index
          KeySchema:
            - AttributeName: repository_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: repository-onboarding

Outputs:
  RepositoriesTableName:
    Description: Name of the repositories DynamoDB table
    Value: !Ref RepositoriesTable
    Export:
      Name: !Sub '${ProjectName}-repositories-table-${Environment}'

  RepositoriesTableArn:
    Description: ARN of the repositories DynamoDB table
    Value: !GetAtt RepositoriesTable.Arn
    Export:
      Name: !Sub '${ProjectName}-repositories-table-arn-${Environment}'

  OAuthConnectionsTableName:
    Description: Name of the OAuth connections DynamoDB table
    Value: !Ref OAuthConnectionsTable
    Export:
      Name: !Sub '${ProjectName}-oauth-connections-table-${Environment}'

  OAuthConnectionsTableArn:
    Description: ARN of the OAuth connections DynamoDB table
    Value: !GetAtt OAuthConnectionsTable.Arn
    Export:
      Name: !Sub '${ProjectName}-oauth-connections-table-arn-${Environment}'

  RepoIngestionJobsTableName:
    Description: Name of the repository ingestion jobs DynamoDB table
    Value: !Ref RepositoryIngestionJobsTable
    Export:
      Name: !Sub '${ProjectName}-repo-ingestion-jobs-table-${Environment}'

  RepoIngestionJobsTableArn:
    Description: ARN of the repository ingestion jobs DynamoDB table
    Value: !GetAtt RepositoryIngestionJobsTable.Arn
    Export:
      Name: !Sub '${ProjectName}-repo-ingestion-jobs-table-arn-${Environment}'
